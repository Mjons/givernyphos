      function directorTick(realDt) {
        if (!director.enabled) return;
        // Clamp dt for all director-internal time bookkeeping. Breathing
        // phase, mood/accent cooldowns, and transition-watchdog clocks
        // should never leap forward when a frame drops or the tab
        // refocuses — every spike would otherwise land as visible judder.
        const dt = Math.min(realDt, 0.05);
        const idle = (performance.now() - lastUserInputTime) / 1000;
        const userActive = idle < 8;
        applyBreathing(dt);

        // If the scene changed underneath us (user scrolled through the
        // browser, hit a number key, etc.), restart the dwell cycle.
        if (
          director.lastSceneKey &&
          director.lastSceneKey !== currentSceneKey &&
          director.state === "DWELL" &&
          !transitionRaf
        ) {
          cineBeginDwell();
        }

        if (userActive) return;
        switch (director.state) {
          case "IDLE":
            cineBeginDwell();
            break;
          case "DWELL":
            director.stateTimer += dt;
            // §5: if the tab is hidden nobody is watching, so don't fire
            // new moods/accents/pulses. We still tick stateTimer so the
            // dwell completes on schedule — coming back to the tab just
            // shouldn't surface a fresh mood cross-fade that already
            // "happened" while hidden.
            if (!document.hidden) {
              tickMood(dt);
              tickAccent(dt);
              tickPulse(dt);
            }
            // §4: sample kinetic energy and short-circuit the dwell if
            // the scene has flatlined. Once a second is plenty — stats.ke
            // only refreshes on that cadence anyway.
            director.keSampleClock += dt;
            if (director.keSampleClock >= 1.0) {
              director.keSampleClock = 0;
              if (isFinite(stats.ke) && stats.ke > 0) {
                director.keSamples.push(stats.ke);
                if (director.keSamples.length > 20) director.keSamples.shift();
              }
            }
            if (
              director.keSamples.length >= 20 &&
              director.stateTimer > 0.4 * director.dwellDuration
            ) {
              // Coefficient of variation is scale-free so the threshold
              // means the same thing across scenes whose KE magnitudes
              // can span orders of magnitude.
              const s = director.keSamples;
              let mean = 0;
              for (const v of s) mean += v;
              mean /= s.length;
              let sq = 0;
              for (const v of s) sq += (v - mean) * (v - mean);
              const stddev = Math.sqrt(sq / s.length);
              const cv = mean > 0 ? stddev / mean : 0;
              const thresh = sceneCineCfg().minInterestVar ?? 0.02;
              if (cv < thresh) {
                console.info(
                  `[director] scene-energy gate fired on ${currentSceneKey}: cv=${cv.toFixed(4)} < ${thresh}; cutting to transition`,
                );
                dlog("quiesce", {
                  scene: currentSceneKey,
                  cv: +cv.toFixed(4),
                });
                director.quiesceEvents++;
                cineBeginTransition();
                break;
              }
            }
            if (director.stateTimer >= director.dwellDuration) {
              cineBeginTransition();
            }
            break;
          case "TRANSITION":
            if (!transitionRaf) {
              cineBeginDwell();
            } else {
              director.stateTimer += dt;
              if (director.stateTimer > director.transitionDeadline) {
                console.warn(
                  `[director] transition watchdog fired: ${director.stateTimer.toFixed(1)}s > ${director.transitionDeadline.toFixed(1)}s deadline; recovering to DWELL`,
                );
                dlog("watchdog", {
                  stateTimer: +director.stateTimer.toFixed(1),
                  deadline: +director.transitionDeadline.toFixed(1),
                });
                cancelAnimationFrame(transitionRaf);
                transitionRaf = null;
                restoreBaseline();
                cineBeginDwell();
              }
            }
            break;
        }
      }
      function toggleCinematic() {
        // Turning the director off while it's following? End that cleanly.
        if (director.followOwned) cancelDirectorFollow("cinematic off");
        // Same for an in-flight param pulse — snap back to baseline.
        cancelPulse(true);
        director.enabled = !director.enabled;
        director.move = null;
        director.moveCooldown = 0;
        director.mood = null;
        director.accent = null;
        if (director.enabled) {
          director.state = "IDLE";
          director.stateTimer = 0;
          captureBaseline();
          showToast("Cinematic", currentFlavour().label);
        } else {
          director.state = "IDLE";
          restoreBaseline();
          // Reset any in-flight mood cross-fade state on the shader
          pointMat.uniforms.uChannelMix.value = 0.0;
          showToast("Cinematic", "off");
        }
        reflectCinematicOnRail();
        reflectCinematicOnHud();
        if (activePanel === "camera") buildPanel("camera");
      }
      function reflectCinematicOnRail() {
        const b = document.querySelector('.rail-btn[data-id="camera"]');
        if (b) b.classList.toggle("cinematic", director.enabled);
      }
      function reflectCinematicOnHud() {
        const c = $("#hud-cine");
        if (c) c.classList.toggle("on", director.enabled);
        const f = $("#hud-flavour");
        if (f) {
          f.textContent = currentFlavour().label;
          f.classList.toggle("on", director.enabled);
        }
      }

      // --- §12 Debug overlay (Shift+D) ------------------------------------
      let _debugOverlayVisible = false;
      function toggleDebugOverlay() {
        _debugOverlayVisible = !_debugOverlayVisible;
        const el = $("#debug-overlay");
        if (el) el.classList.toggle("hidden", !_debugOverlayVisible);
        if (_debugOverlayVisible) updateDebugOverlay();
      }
      function _fmtSecs(s) {
        if (!isFinite(s)) return "—";
        if (s < 0) s = 0;
        return s.toFixed(1) + "s";
      }
      function _fmtList(arr, n) {
        if (!arr || arr.length === 0) return "—";
        return arr.slice(0, n).join(" ← ");
      }
      function updateDebugOverlay() {
        if (!_debugOverlayVisible) return;
        const el = $("#debug-overlay");
        if (!el) return;
        const d = director;
        const dwellLeft = Math.max(0, d.dwellDuration - d.stateTimer);
        const txLeft =
          d.state === "TRANSITION"
            ? Math.max(0, d.transitionDeadline - d.stateTimer)
            : null;
        const mv = d.move;
        const moveLine = mv
          ? `${mv.type} ${(mv.elapsed || 0).toFixed(1)}/${(mv.duration || 0).toFixed(1)}s`
          : `— (next in ${_fmtSecs(d.moveCooldown)})`;
        const moodLine = d.mood
          ? `${d.mood.type || "?"} active`
          : `— (next in ${_fmtSecs(d.moodCooldown)})`;
        const accentLine = d.accent
          ? `${d.accent.type || "?"} active`
          : `— (next in ${_fmtSecs(d.accentCooldown)})`;
        const pulseLine = d.pulse
          ? `${d.pulse.name} ${(d.pulse.elapsed || 0).toFixed(1)}/${(d.pulse.duration || 0).toFixed(1)}s`
          : `— (next in ${_fmtSecs(d.pulseCooldown)})`;
        el.textContent =
          `flavour   ${d.flavour}${d.enabled ? "" : "  (off)"}${d.rehearse ? "  REHEARSAL 10×" : ""}\n` +
          `pace      ${d.pace}\n` +
          `state     ${d.state}  t=${_fmtSecs(d.stateTimer)}${d.wakeT > 0 ? `  wake=${_fmtSecs(d.wakeT)}` : ""}\n` +
          `dwell     ${_fmtSecs(dwellLeft)} left / ${_fmtSecs(d.dwellDuration)}\n` +
          (txLeft != null ? `tx-deadln ${_fmtSecs(txLeft)} left\n` : "") +
          `scene     ${currentSceneKey}\n` +
          `recent.sc ${_fmtList(d.recentScenes, 3)}\n` +
          `recent.pl ${_fmtList(d.recentPalettes, 3)}\n` +
          `recent.ch ${_fmtList(d.recentChannels, 3)}\n` +
          `move      ${moveLine}\n` +
          `mood      ${moodLine}\n` +
          `accent    ${accentLine}\n` +
          `pulse     ${pulseLine}\n` +
          `rejected  ${d.rejectedMoves}  quiesce  ${d.quiesceEvents}\n` +
          `audio     e=${audioReact.energy.toFixed(2)} ${audioReact.onset ? "● onset" : ""}`;
      }

      let _toastTimer = null;
      function showToast(accent, body) {
        const t = $("#toast");
        if (!t) return;
        t.innerHTML = `<span class="accent">${accent}</span>${body}`;
        t.classList.add("show");
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => t.classList.remove("show"), 1400);
      }
      function cycleCinematicPace() {
        const i = PACE_ORDER.indexOf(director.pace);
        director.pace = PACE_ORDER[(i + 1) % PACE_ORDER.length];
        showToast("Pace", director.pace);
        saveDirectorState();
        if (activePanel === "camera") buildPanel("camera");
      }
      function setCinematicFlavour(name) {
        if (!FLAVOURS[name]) return;
        director.flavour = name;
        // Reset in-flight timers so the new flavour takes hold next frame
        director.moveCooldown = 0;
        director.moodCooldown = 0;
        director.accentCooldown = 0;
        if (director.state === "DWELL") {
          // Re-pick dwell duration against new flavour range
          director.dwellDuration = pickDwellSeconds();
        }
        showToast("Flavour", currentFlavour().label);
        reflectCinematicOnHud();
        saveDirectorState();
        if (activePanel === "camera") buildPanel("camera");
      }
      function cycleCinematicFlavour() {
        const i = FLAVOUR_ORDER.indexOf(director.flavour);
        const next = FLAVOUR_ORDER[(i + 1) % FLAVOUR_ORDER.length];
        // If cinematic is off, turn it on too — Shift+C always leaves cine running.
        if (!director.enabled) {
          director.flavour = next;
          toggleCinematic();
        } else {
          setCinematicFlavour(next);
        }
      }

      // ------- Module 1: camera move repertoire ------------------------

      // Framing sanity: reject moves whose end pose doesn't actually contain
      // the scene. Cheap — at most 24 body projections through one scratch
      // camera per rejected candidate, zero allocations per call.
      const _framingCam = new THREE.PerspectiveCamera();
      const _framingVec = new THREE.Vector3();
      function sampleKeyBodyIndices(limit = 24) {
        const n = Math.min(state.count, 128);
        if (n === 0) return [];
        const pairs = [];
        for (let i = 0; i < n; i++) {
          const m = state.positions[i * 4 + 3];
          if (m > 0) pairs.push([i, m]);
        }
        pairs.sort((a, b) => b[1] - a[1]);
        const out = new Array(Math.min(limit, pairs.length));
        for (let i = 0; i < out.length; i++) out[i] = pairs[i][0];
        return out;
      }
      function framesMajorityOfBodies(endPos, endTgt, endFov) {
        const idx = sampleKeyBodyIndices();
        if (idx.length === 0) return true; // empty scene — nothing to frame
        const tmp = _framingCam;
        tmp.position.copy(endPos);
        tmp.fov = endFov;
        tmp.aspect = innerWidth / Math.max(1, innerHeight);
        tmp.near = camera.near;
        tmp.far = camera.far;
        tmp.up.copy(camera.up);
        tmp.lookAt(endTgt);
        tmp.updateMatrixWorld(true);
        tmp.updateProjectionMatrix();
        const v = _framingVec;
        let hit = 0;
        for (let k = 0; k < idx.length; k++) {
          const i = idx[k];
          v.set(
            state.positions[i * 4 + 0],
            state.positions[i * 4 + 1],
            state.positions[i * 4 + 2],
          );
          v.project(tmp);
          // Accept if inside the central 60% rect and in front of the camera.
          // After .project(), points behind the camera wrap to |z| > 1.
          if (
            Math.abs(v.x) < 0.6 &&
            Math.abs(v.y) < 0.6 &&
            v.z > -1 &&
            v.z < 1
          ) {
            hit++;
          }
        }
        return hit / idx.length >= 0.3;
      }
      const _sphericalEndPos = new THREE.Vector3();
      function framingOkForMove(mv) {
        switch (mv.type) {
          case "pan":
            return framesMajorityOfBodies(mv.endPos, mv.endTgt, camera.fov);
          case "dolly":
          case "tilt":
            return framesMajorityOfBodies(
              mv.endPos,
              controls.target,
              camera.fov,
            );
          case "grand-arc":
          case "spiral-in":
          case "arc-pull": {
            // Reconstruct the end pose from the move's spherical terminus
            // so the framing check knows where the camera will end up.
            const sinT = Math.sin(mv.endTheta);
            _sphericalEndPos.set(
              controls.target.x + mv.endR * sinT * Math.cos(mv.endPhi),
              controls.target.y + mv.endR * Math.cos(mv.endTheta),
              controls.target.z + mv.endR * sinT * Math.sin(mv.endPhi),
            );
            return framesMajorityOfBodies(
              _sphericalEndPos,
              controls.target,
              camera.fov,
            );
          }
          default:
            // orbit / counter / follow always look at a body or at
            // controls.target; fov / hold don't move. All safe by
            // construction.
            return true;
        }
      }

      // Release any director-owned follow and clear the move. Safe to call
      // unconditionally — no-op when no follow is in flight.
      function cancelDirectorFollow(reason) {
        if (!director.followOwned) return;
        followCamRelease(reason || "director");
        director.followOwned = false;
        if (director.move && director.move.type === "follow") {
          director.move = null;
        }
      }

      // Picks a bright, well-placed body for the "follow" move. Prefers
      // top-mass bodies that sit in the central shell of the current view
      // (not too close — would whip the camera; not too far — would frame
      // poorly). Returns -1 if nothing qualifies.
      function pickFollowTarget() {
        if (state.count === 0) return -1;
        const cands = sampleKeyBodyIndices(32);
        if (cands.length === 0) return -1;
        const viewDist = camera.position.distanceTo(controls.target);
        const minD2 = (viewDist * 0.15) ** 2;
        const maxD2 = (viewDist * 2.5) ** 2;
        const tx = controls.target.x,
          ty = controls.target.y,
          tz = controls.target.z;
        for (const i of cands) {
          const dx = state.positions[i * 4 + 0] - tx;
          const dy = state.positions[i * 4 + 1] - ty;
          const dz = state.positions[i * 4 + 2] - tz;
          const d2 = dx * dx + dy * dy + dz * dz;
          if (d2 >= minD2 && d2 <= maxD2) return i;
        }
        // No body in the sweet spot — fall back to the brightest.
        return cands[0];
      }

      function pickCameraMove() {
        for (let attempt = 0; attempt < 3; attempt++) {
          const mv = _pickCameraMoveOnce();
          if (framingOkForMove(mv)) return mv;
          director.rejectedMoves++;
          dlog("move-rejected", { type: mv.type, attempt });
        }
        // All three attempts failed — settle for a hold; never freezes the
        // director, and the next dwell tick will try again.
        return { type: "hold", duration: 3 + Math.random() * 5, elapsed: 0 };
      }

      function _pickCameraMoveOnce() {
        const flav = currentFlavour();
        const flavMoves = flav.moves || MOVE_TYPES;
        const bannedRecent = new Set(director.moveHistory.slice(-2));
        let choices = flavMoves.filter((m) => !bannedRecent.has(m));
        // Hold should come ≤ once every 4 moves to keep things alive
        if (director.moveHistory.slice(-3).includes("hold")) {
          choices = choices.filter((m) => m !== "hold");
        }
        if (choices.length === 0) choices = flavMoves.slice();
        const type = choices[Math.floor(Math.random() * choices.length)];
        const startPos = camera.position.clone();
        const startTgt = controls.target.clone();
        const startFov = camera.fov;
        const dist = startPos.distanceTo(startTgt);
        const sc = SCENES[currentSceneKey];
        const baseFov = (sc && sc.camera && sc.camera.fov) || 55;

        switch (type) {
          case "orbit":
          case "counter": {
            const dir = type === "counter" ? -1 : 1;
            const rate = (0.03 + Math.random() * 0.04) * dir; // 0.03..0.07 rad/s
            return {
              type,
              duration: 8 + Math.random() * 10,
              elapsed: 0,
              rate,
              axis: Math.random() < 0.82 ? "y" : "free",
            };
          }
          case "pan": {
            // Compute camera-right and camera-up in world space
            const fwd = startTgt.clone().sub(startPos).normalize();
            const worldUp = new THREE.Vector3(0, 1, 0);
            const right = new THREE.Vector3()
              .crossVectors(fwd, worldUp)
              .normalize();
            const up = new THREE.Vector3().crossVectors(right, fwd).normalize();
            const mag = dist * (0.08 + Math.random() * 0.2);
            const ang = Math.random() * 2 * Math.PI;
            const offset = right
              .multiplyScalar(Math.cos(ang))
              .add(up.multiplyScalar(Math.sin(ang) * 0.5))
              .multiplyScalar(mag);
            return {
              type,
              duration: 6 + Math.random() * 6,
              elapsed: 0,
              startPos,
              endPos: startPos.clone().add(offset),
              startTgt,
              endTgt: startTgt.clone().add(offset),
            };
          }
          case "dolly": {
            const factor = 0.7 + Math.random() * 0.6; // 0.7..1.3
            const inward = startTgt.clone().sub(startPos).normalize();
            const newDist = Math.max(30, dist * factor);
            const endPos = startTgt
              .clone()
              .add(inward.multiplyScalar(-newDist));
            return {
              type,
              duration: 5 + Math.random() * 5,
              elapsed: 0,
              startPos,
              endPos,
            };
          }
          case "tilt": {
            const rel = startPos.clone().sub(startTgt);
            const r = rel.length();
            const theta = Math.acos(clamp(rel.y / r, -1, 1));
            const phi = Math.atan2(rel.z, rel.x);
            const dTheta = (Math.random() - 0.5) * 0.7; // ±20°
            const newTheta = clamp(theta + dTheta, 0.22, Math.PI - 0.22);
            const endRel = new THREE.Vector3(
              r * Math.sin(newTheta) * Math.cos(phi),
              r * Math.cos(newTheta),
              r * Math.sin(newTheta) * Math.sin(phi),
            );
            return {
              type,
              duration: 8 + Math.random() * 6,
              elapsed: 0,
              startPos,
              endPos: startTgt.clone().add(endRel),
            };
          }
          case "fov": {
            // Target a new FOV within a reasonable band around scene's baseline
            const low = clamp(baseFov - 14, 24, 62);
            const high = clamp(baseFov + 14, 30, 78);
            let target;
            do {
              target = low + Math.random() * (high - low);
            } while (Math.abs(target - startFov) < 4.0);
            return {
              type,
              duration: 4 + Math.random() * 4,
              elapsed: 0,
              startFov,
              endFov: target,
            };
          }
          case "follow": {
            // Pick a bright body and chase it via the existing follow-cam.
            // If no good target, fall back to hold rather than emitting a
            // follow move that'll immediately bail. Also: don't attach
            // during the first half of a wake ramp — the shader pulse /
            // lock SFX would read as a jarring pounce right after release.
            if (director.wakeT > 3) {
              return {
                type: "hold",
                duration: 3 + Math.random() * 5,
                elapsed: 0,
              };
            }
            const bodyIdx = pickFollowTarget();
            if (bodyIdx < 0) {
              return {
                type: "hold",
                duration: 3 + Math.random() * 5,
                elapsed: 0,
              };
            }
            return {
              type: "follow",
              duration: 14 + Math.random() * 10, // 14–24 s
              elapsed: 0,
              bodyIdx,
              attached: false,
            };
          }
          // Sweeping spherical shots — all three track controls.target
          // and differ in what they sweep: grand-arc changes angles at
          // fixed radius; spiral-in sweeps angle while pulling in;
          // arc-pull sweeps angle while pulling out, with elevation.
          case "grand-arc": {
            const rel = startPos.clone().sub(startTgt);
            const r = rel.length();
            const theta = Math.acos(clamp(rel.y / r, -1, 1));
            const phi = Math.atan2(rel.z, rel.x);
            const sweepDir = Math.random() < 0.5 ? -1 : 1;
            const phiSweep = Math.PI * (0.5 + Math.random() * 0.5) * sweepDir; // 90°–180°
            const dTheta = (Math.random() - 0.5) * 0.4; // ±~11° elevation
            const endTheta = clamp(theta + dTheta, 0.22, Math.PI - 0.22);
            return {
              type,
              duration: 25 + Math.random() * 20, // 25–45 s
              elapsed: 0,
              startTheta: theta,
              endTheta,
              startPhi: phi,
              endPhi: phi + phiSweep,
              startR: r,
              endR: r,
            };
          }
          case "spiral-in": {
            const rel = startPos.clone().sub(startTgt);
            const r0 = rel.length();
            const theta = Math.acos(clamp(rel.y / r0, -1, 1));
            const phi = Math.atan2(rel.z, rel.x);
            const sweepDir = Math.random() < 0.5 ? -1 : 1;
            const phiSweep = Math.PI * (1.0 + Math.random() * 0.8) * sweepDir; // 180°–324°
            const radiusMul = 0.45 + Math.random() * 0.2; // 0.45..0.65
            const r1 = Math.max(40, r0 * radiusMul);
            return {
              type,
              duration: 20 + Math.random() * 15, // 20–35 s
              elapsed: 0,
              startTheta: theta,
              endTheta: theta,
              startPhi: phi,
              endPhi: phi + phiSweep,
              startR: r0,
              endR: r1,
            };
          }
          case "arc-pull": {
            const rel = startPos.clone().sub(startTgt);
            const r0 = rel.length();
            const theta = Math.acos(clamp(rel.y / r0, -1, 1));
            const phi = Math.atan2(rel.z, rel.x);
            const sweepDir = Math.random() < 0.5 ? -1 : 1;
            const phiSweep = Math.PI * (0.4 + Math.random() * 0.3) * sweepDir; // 72°–126°
            const pullMul = 1.5 + Math.random() * 0.6; // 1.5..2.1
            const r1 = r0 * pullMul;
            const dTheta = (Math.random() - 0.5) * 0.3;
            const endTheta = clamp(theta + dTheta, 0.22, Math.PI - 0.22);
            return {
              type,
              duration: 25 + Math.random() * 15, // 25–40 s
              elapsed: 0,
              startTheta: theta,
              endTheta,
              startPhi: phi,
              endPhi: phi + phiSweep,
              startR: r0,
              endR: r1,
            };
          }
          case "hold":
          default:
            return {
              type: "hold",
              duration: 3 + Math.random() * 5,
              elapsed: 0,
            };
        }
      }

      function tickCameraMove(realDt) {
        if (!director.move) {
          if (director.moveCooldown > 0) {
            director.moveCooldown -= realDt;
            return;
          }
          director.move = pickCameraMove();
          return;
        }
        const mv = director.move;

        // "follow" is a handoff to the existing follow-cam. We don't
        // write the camera here — updateFollowCam does that every frame.
        // Just manage the attach/release lifecycle and the elapsed timer.
        if (mv.type === "follow") {
          if (!mv.attached) {
            if (!followCamAttachByIndex(mv.bodyIdx)) {
              // Body went away between pick and attach. Cancel without
              // recording history so we try a different move next tick.
              director.move = null;
              director.moveCooldown = 1.0;
              director.rejectedMoves++;
              return;
            }
            mv.attached = true;
            director.followOwned = true;
          }
          mv.elapsed += realDt;
          if (mv.elapsed >= mv.duration) {
            followCamRelease("director");
            director.followOwned = false;
            director.moveHistory.push("follow");
            if (director.moveHistory.length > 4) director.moveHistory.shift();
            director.move = null;
            director.moveCooldown = rangeSample(currentFlavour().moveCooldown);
          }
          return;
        }

        mv.elapsed += realDt;
        const t = clamp(mv.elapsed / mv.duration, 0, 1);
        const e = easeInOutQuint(t);

        // §11: wake ramp. wakeT starts at 6 on user release and decays
        // linearly; smoothstep on the remaining fraction gives a soft
        // S-curve from 0 (just released) to 1 (fully awake). Applied
        // multiplicatively to each move's effective amplitude.
        let wakeScale = 1;
        if (director.wakeT > 0) {
          const x = 1 - director.wakeT / 6;
          wakeScale = x * x * (3 - 2 * x);
        }
        const eW = e * wakeScale;

        switch (mv.type) {
          case "orbit":
          case "counter": {
            const rate = mv.rate * wakeScale;
            const rel = camera.position.clone().sub(controls.target);
            const cosA = Math.cos(rate * realDt);
            const sinA = Math.sin(rate * realDt);
            const nx = rel.x * cosA - rel.z * sinA;
            const nz = rel.x * sinA + rel.z * cosA;
            camera.position.x = controls.target.x + nx;
            camera.position.z = controls.target.z + nz;
            camera.lookAt(controls.target);
            break;
          }
          case "pan":
            controls.target.lerpVectors(mv.startTgt, mv.endTgt, eW);
            camera.position.lerpVectors(mv.startPos, mv.endPos, eW);
            break;
          case "dolly":
            camera.position.lerpVectors(mv.startPos, mv.endPos, eW);
            camera.lookAt(controls.target);
            break;
          case "tilt":
            camera.position.lerpVectors(mv.startPos, mv.endPos, eW);
            camera.lookAt(controls.target);
            break;
          case "fov":
            // Modulate baseline so breathing rides the moving FOV
            if (director.baseline) {
              director.baseline.fov = lerp(mv.startFov, mv.endFov, eW);
            }
            break;
          // Spherical sweep moves — all three share this tick. Lerps
          // theta / phi / radius independently then reconstructs camera
          // position on a sphere centered on controls.target.
          case "grand-arc":
          case "spiral-in":
          case "arc-pull": {
            const theta = lerp(mv.startTheta, mv.endTheta, eW);
            const phi = lerp(mv.startPhi, mv.endPhi, eW);
            const r = lerp(mv.startR, mv.endR, eW);
            const sinT = Math.sin(theta);
            camera.position.set(
              controls.target.x + r * sinT * Math.cos(phi),
              controls.target.y + r * Math.cos(theta),
              controls.target.z + r * sinT * Math.sin(phi),
            );
            camera.lookAt(controls.target);
            break;
          }
          case "hold":
            break;
        }

        if (t >= 1) {
          director.moveHistory.push(mv.type);
          if (director.moveHistory.length > 4) director.moveHistory.shift();
          director.move = null;
          director.moveCooldown = rangeSample(currentFlavour().moveCooldown);
        }
      }

      function applyDrift(realDt) {
        // Layered on top of any camera move — adds a subtle breathing offset.
        if (!(params.cameraDrift || director.enabled)) return;
        const dist = camera.position.distanceTo(controls.target);
        const amp = dist * (director.enabled ? 0.008 : 0.004);
        const t = simTime;
        const dx = Math.sin(t * 0.21 + driftState.phaseX) * amp;
        const dy = Math.sin(t * 0.17 + driftState.phaseY) * amp * 0.6;
        const dz = Math.sin(t * 0.13 + driftState.phaseZ) * amp;
        camera.position.x += dx * realDt;
        camera.position.y += dy * realDt;
        camera.position.z += dz * realDt;
      }

      // ------- Module 3: mood shifts ----------------------------------
      const PALETTE_FAMILY = {
        ice: ["bone", "vaporwv", "aurora"],
        ember: ["sunset", "nebula"],
        aurora: ["ice", "vaporwv"],
        nebula: ["ember", "sunset", "vaporwv"],
        mono: ["bone"],
        sunset: ["ember", "nebula", "aurora"],
        bone: ["ice", "mono", "vaporwv"],
        vaporwv: ["aurora", "nebula", "ice"],
      };
      const CHANNEL_VALUES = [0, 1, 2, 3, 4]; // mass, speed, kind, density, age
      function channelNameFor(v) {
        const names = ["mass", "speed", "kind", "density", "age"];
        return names[Math.round(v)] || "speed";
      }

      function snapshotPaletteStops() {
        const arr = pointMat.uniforms.uPalette.value;
        return arr.map((v) => v.clone());
      }
      function palettToStops(name) {
        const src = PALETTES[name] || PALETTES.ice;
        const out = [];
        for (let i = 0; i < 8; i++) {
          const s = src[Math.min(i, src.length - 1)];
          out.push(new THREE.Vector3(s[0], s[1], s[2]));
        }
        return { stops: out, count: src.length };
      }

      function pickMood() {
        if (sceneCineCfg().allowMoods === false) return null;
        const r = Math.random();
        const currentCh = pointMat.uniforms.uChannel.value;
        if (r < 0.5) {
          // Channel swap — pick a different channel
          let target;
          do {
            target =
              CHANNEL_VALUES[Math.floor(Math.random() * CHANNEL_VALUES.length)];
          } while (Math.abs(target - Math.round(currentCh)) < 0.5);
          return {
            type: "channel",
            duration: 2.0,
            elapsed: 0,
            target,
          };
        } else if (r < 0.85) {
          // Palette drift — pick a family-adjacent palette
          const curName = params.palette;
          const family = PALETTE_FAMILY[curName] || [];
          if (family.length === 0) return null;
          const target = family[Math.floor(Math.random() * family.length)];
          return {
            type: "palette",
            duration: 3.5,
            elapsed: 0,
            fromStops: snapshotPaletteStops(),
            targetName: target,
            toStops: palettToStops(target).stops,
            toCount: palettToStops(target).count,
          };
        } else {
          // Contrast pulse — brief exposure drop + bloom boost
          return {
            type: "contrast",
            duration: 5.5,
            elapsed: 0,
          };
        }
      }

      function tickMood(realDt) {
        if (!director.mood) {
          if (director.moodCooldown > 0) {
            // Onset accelerates the clock so the next mood lands near a beat.
            director.moodCooldown -= realDt * (audioReact.onset ? 2.5 : 1);
            return;
          }
          director.mood = pickMood();
          if (director.mood) {
            dlog("mood", { type: director.mood.type });
          } else {
            director.moodCooldown = rangeSample(currentFlavour().moodCooldown);
          }
          return;
        }
        const m = director.mood;
        m.elapsed += realDt;
        const t = clamp(m.elapsed / m.duration, 0, 1);
        switch (m.type) {
          case "channel": {
            pointMat.uniforms.uChannel2.value = m.target;
            // Smoothstep for a gentler blend
            const s = t * t * (3 - 2 * t);
            pointMat.uniforms.uChannelMix.value = s;
            if (t >= 1) {
              pointMat.uniforms.uChannel.value = m.target;
              pointMat.uniforms.uChannelMix.value = 0;
              params.channel = channelNameFor(m.target);
            }
            break;
          }
          case "palette": {
            const s = t * t * (3 - 2 * t);
            const live = pointMat.uniforms.uPalette.value;
            for (let i = 0; i < 8; i++) {
              live[i].lerpVectors(m.fromStops[i], m.toStops[i], s);
            }
            pointMat.uniforms.uPaletteStops.value = m.toCount;
            if (t >= 1) {
              params.palette = m.targetName;
              // Snap to exactly the target to wipe out lerp residue
              applyPalette(m.targetName);
            }
            break;
          }
          case "contrast": {
            // 0.4s ramp-in, 4s hold, 1.1s ramp-out (values as fractions)
            const inEnd = 0.4 / m.duration;
            const outStart = 1 - 1.1 / m.duration;
            let k;
            if (t < inEnd) k = t / inEnd;
            else if (t < outStart) k = 1;
            else k = 1 - (t - outStart) / (1 - outStart);
            k = clamp(k, 0, 1);
            if (director.baseline) {
              const b = director.baseline;
              bloom.strength = b.bloom * (1 + 0.25 * k);
              renderer.toneMappingExposure = b.exposure - 0.25 * k;
            }
            break;
          }
        }
        if (t >= 1) {
          director.mood = null;
          // Long cadence so the scene gets time to be read before the next re-interpretation
          director.moodCooldown = rangeSample(currentFlavour().moodCooldown);
        }
      }

      // ------- Module 4: physics accents ------------------------------
      const ACCENT_WEIGHTS = {
        gravity: 15,
        perturb: 25,
        flock: 15,
        radiation: 15,
      };
      function pickAccent() {
        if (sceneCineCfg().allowAccents === false) return null;
        // Weighted random
        const entries = Object.entries(ACCENT_WEIGHTS);
        let total = 0;
        for (const [k, w] of entries) total += w;
        let r = Math.random() * total;
        for (const [k, w] of entries) {
          r -= w;
          if (r <= 0) return startAccent(k);
        }
        return null;
      }
      function startAccent(type) {
        switch (type) {
          case "gravity":
            return {
              type,
              duration: 14,
              elapsed: 0,
              baseG: params.G,
              targetMul: Math.random() < 0.5 ? 0.92 : 1.08, // ±8%
            };
          case "perturb":
            // One-shot — apply immediately, short "active" window
            rollDice();
            return { type, duration: 1.0, elapsed: 0, oneShot: true };
          case "flock":
            return {
              type,
              duration: 10,
              elapsed: 0,
              baseF: params.flock,
              targetMul: 2.0,
            };
          case "radiation":
            return {
              type,
              duration: 10,
              elapsed: 0,
              baseR: params.radiation,
              targetMul: 2.0,
            };
        }
        return null;
      }
      function tickAccent(realDt) {
        if (!director.accent) {
          if (director.accentCooldown > 0) {
            // Onset accelerates the clock so accents land near a beat.
            director.accentCooldown -= realDt * (audioReact.onset ? 2.5 : 1);
            return;
          }
          const flav = currentFlavour();
          const paceMul = PACE_ACCENT_MUL[director.pace] || 1.0;
          // Try probabilistic fire — flavour sets the base chance
          if (Math.random() < (flav.accentFireChance || 0.35) * paceMul) {
            director.accent = pickAccent();
            if (director.accent) {
              sfx.play("accent");
              dlog("accent", { type: director.accent.type });
            }
          }
          director.accentCooldown = rangeSample(flav.accentCooldown);
          return;
        }
        const a = director.accent;
        a.elapsed += realDt;
        const t = clamp(a.elapsed / a.duration, 0, 1);
        // Triangle envelope: ramp in over first 30%, hold 40%, ramp out 30%
        const env = t < 0.3 ? t / 0.3 : t < 0.7 ? 1.0 : 1 - (t - 0.7) / 0.3;
        const shaped = Math.max(0, env);
        switch (a.type) {
          case "gravity": {
            const mul = 1 + (a.targetMul - 1) * shaped;
            velVar.material.uniforms.uG.value = a.baseG * mul;
            if (t >= 1) velVar.material.uniforms.uG.value = a.baseG;
            break;
          }
          case "flock": {
            const mul = 1 + (a.targetMul - 1) * shaped;
            velVar.material.uniforms.uFlock.value = a.baseF * mul;
            if (t >= 1) velVar.material.uniforms.uFlock.value = a.baseF;
            break;
          }
          case "radiation": {
            const mul = 1 + (a.targetMul - 1) * shaped;
            velVar.material.uniforms.uRadiation.value = a.baseR * mul;
            if (t >= 1) velVar.material.uniforms.uRadiation.value = a.baseR;
            break;
          }
          case "perturb":
            // One-shot already applied; just wait out the duration
            break;
        }
        if (t >= 1) {
          director.accent = null;
          // Cooldown already set when we kicked off the next attempt
        }
      }

      // ------- Module 5: parameter pulses -----------------------------
      // Triangle-enveloped excursions on visual / time parameters. Each
      // pulse captures a baseline at start, ramps toward a target, holds,
      // ramps back, and snaps to the exact baseline at t=1 so there's no
      // drift from repeated fires. Pulses compose with accents (physics)
      // and with breathing (bloom/exp/CA/FOV); conflicts are avoided by
      // picking params breathing doesn't touch.
      const PULSE_DEFS = {
        "time-dip": {
          duration: 9,
          targetMul: 0.45,
          minAbs: 0.15,
          get: () => params.speed,
          set: (v) => {
            params.speed = v;
          },
        },
        "time-push": {
          duration: 6,
          targetMul: 1.7,
          maxAbs: 2.0,
          get: () => params.speed,
          set: (v) => {
            params.speed = v;
          },
        },
        "trail-smear": {
          duration: 12,
          targetAbs: 0.92,
          get: () => trailsPass.uniforms.damp.value,
          set: (v) => {
            trailsPass.uniforms.damp.value = v;
            trailsPass.enabled = v > 0.001;
          },
        },
        "doppler-bloom": {
          duration: 8,
          targetAbs: 0.65,
          get: () => pointMat.uniforms.uDoppler.value,
          set: (v) => {
            pointMat.uniforms.uDoppler.value = v;
          },
        },
        "lens-warp": {
          duration: 7,
          targetAbs: 0.55,
          get: () => lensPass.uniforms.uStrength.value,
          set: (v) => {
            lensPass.uniforms.uStrength.value = v;
            lensPass.enabled = v > 0.001;
          },
        },
        "bloom-widen": {
          duration: 9,
          targetAbs: 1.2,
          get: () => bloom.radius,
          set: (v) => {
            bloom.radius = v;
          },
        },
        "grain-up": {
          duration: 8,
          targetMul: 2.2,
          maxAbs: 0.12,
          get: () => vigGrainPass.uniforms.uGrain.value,
          set: (v) => {
            vigGrainPass.uniforms.uGrain.value = v;
          },
        },
        // reverse-beat is a toggle — flip time direction at pulse start,
        // flip back at t=1. No interpolation; 4 s is dramatic but short
        // enough that the simulation doesn't drift far from its forward
        // trajectory.
        "reverse-beat": {
          duration: 4,
          toggle: true,
          get: () => params.reverse,
          set: (v) => {
            params.reverse = v;
          },
        },
      };
      function startPulse(name) {
        const def = PULSE_DEFS[name];
        if (!def) return null;
        const pulse = {
          name,
          duration: def.duration,
          elapsed: 0,
          base: def.get(),
        };
        // Toggle pulses flip immediately. tickPulse's t>=1 branch restores
        // to base via def.set(p.base), so nothing else is needed.
        if (def.toggle) def.set(!pulse.base);
        return pulse;
      }
      function pickPulse() {
        // Pulses follow the same per-scene gate as moods (so quiet scenes
        // stay quiet).
        if (sceneCineCfg().allowMoods === false) return null;
        const flav = currentFlavour();
        const weights = flav.pulseWeights;
        if (!weights) return null;
        const entries = Object.entries(weights);
        let total = 0;
        for (const [, w] of entries) total += w;
        if (total <= 0) return null;
        let r = Math.random() * total;
        for (const [k, w] of entries) {
          r -= w;
          if (r <= 0) return startPulse(k);
        }
        return null;
      }
      function cancelPulse(snapToBase) {
        if (!director.pulse) return;
        if (snapToBase) {
          const def = PULSE_DEFS[director.pulse.name];
          if (def) def.set(director.pulse.base);
        }
        director.pulse = null;
      }
      function tickPulse(realDt) {
        if (!director.pulse) {
          if (director.pulseCooldown > 0) {
            // Onset-bias the clock like moods/accents so pulses land near beats.
            director.pulseCooldown -= realDt * (audioReact.onset ? 2.5 : 1);
            return;
          }
          const flav = currentFlavour();
          if (Math.random() < (flav.pulseFireChance || 0.3)) {
            director.pulse = pickPulse();
            if (director.pulse) dlog("pulse", { name: director.pulse.name });
          }
          director.pulseCooldown = rangeSample(flav.pulseCooldown || [60, 120]);
          return;
        }
        const p = director.pulse;
        p.elapsed += realDt;
        const t = clamp(p.elapsed / p.duration, 0, 1);
        // Triangle envelope: ramp in 30%, hold 40%, ramp out 30%.
        const env = t < 0.3 ? t / 0.3 : t < 0.7 ? 1.0 : 1 - (t - 0.7) / 0.3;
        const shaped = Math.max(0, env);
        const def = PULSE_DEFS[p.name];
        if (def && !def.toggle) {
          let value;
          if (def.targetAbs != null) {
            value = p.base + (def.targetAbs - p.base) * shaped;
          } else {
            value = p.base * (1 + (def.targetMul - 1) * shaped);
          }
          if (def.minAbs != null) value = Math.max(value, def.minAbs);
          if (def.maxAbs != null) value = Math.min(value, def.maxAbs);
          def.set(value);
        }
        // Toggles don't use `shaped` — they were flipped at start and
        // will be restored by the t>=1 branch below.
        if (t >= 1) {
          // Snap exactly to baseline so no residual drift survives.
          if (def) def.set(p.base);
          director.pulse = null;
        }
      }

      // -------- Start / stop --------
      function startMovie(key) {
        const f = FILMS[key];
        if (!f) return;
        if (movie.active) stopMovie(false);
        if (director.enabled) toggleCinematic();
        movie.active = true;
        movie.filmKey = key;
        movie.film = f;
        movie.timeline = [...f.events].sort((a, b) => a.at - b.at);
        movie.cursor = 0;
        movie.elapsed = 0;
        movie.paused = false;
        movie.speed = 1;
        movie.scrubbing = false;
        applyMovieSpeedToMusic();
        movie.shot = null;
        movie.travel = null;
        // Snapshot enough state to restore on stop
        movie.baseline = {
          exposure: renderer.toneMappingExposure,
          bloom: bloom.strength,
          ca: caPass.uniforms.uAmount.value,
          trail: trailsPass.uniforms.damp.value,
          doppler: pointMat.uniforms.uDoppler.value,
          lens: lensPass.uniforms.uStrength.value,
          fov: camera.fov,
          speed: params.speed,
        };
        controls.enabled = false;
        reflectMovieOnRail();
        reflectMovieOnHud(0, f.duration);
        showToast("Movie", f.name);
        if (activePanel === "movie") buildPanel("movie");
      }

      function stopMovie(graceful = true) {
        if (!movie.active) return;
        movie.active = false;
        movie.shot = null;
        movie.travel = null;
        movie.scrubbing = false;
        hideFilmTitle();
        controls.enabled = true;
        // Reset music to 1× / unmuted regardless of where we ended up
        if (music.audio) {
          music.audio.playbackRate = 1;
          music.audio.muted = false;
        }
        // Restore post / look parameters to their last baseline
        if (movie.baseline) {
          const b = movie.baseline;
          renderer.toneMappingExposure = b.exposure;
          bloom.strength = b.bloom;
          caPass.uniforms.uAmount.value = b.ca;
          trailsPass.uniforms.damp.value = b.trail;
          trailsPass.enabled = b.trail > 0.001;
          pointMat.uniforms.uDoppler.value = b.doppler;
          lensPass.uniforms.uStrength.value = b.lens;
          camera.fov = b.fov;
          camera.updateProjectionMatrix();
          params.speed = b.speed;
        }
        reflectMovieOnRail();
        reflectMovieOnHud(0, 0);
        if (!graceful) showToast("Movie", "stopped");
        if (activePanel === "movie") buildPanel("movie");
      }

      // -------- Music event helper --------
      let _musicFadeTimer = null;
      function handleFilmMusicEvent(ev) {
        if (ev.action === "play") {
          const idx = trackIdxByTitle(ev.trackTitle);
          if (idx < 0) return;
          music.load(idx, true);
          const target = ev.volume ?? 0.5;
          if (ev.fadeIn && ev.fadeIn > 0) {
            music.setVolume(0);
            rampMusicVolume(target, ev.fadeIn);
          } else {
            music.setVolume(target);
          }
        } else if (ev.action === "fade") {
          rampMusicVolume(0, ev.duration || 4);
        } else if (ev.action === "pause") {
          if (music.playing) music.playPause();
        } else if (ev.action === "set") {
          music.setVolume(ev.volume ?? music.volume);
        }
      }
      function rampMusicVolume(target, seconds) {
        clearInterval(_musicFadeTimer);
        const start = music.volume;
        const t0 = performance.now();
        _musicFadeTimer = setInterval(() => {
          const t = (performance.now() - t0) / 1000 / Math.max(seconds, 0.001);
          const e = clamp(t, 0, 1);
          music.setVolume(start + (target - start) * e);
          if (e >= 1) clearInterval(_musicFadeTimer);
        }, 40);
      }

      // -------- Easing helpers (movie-only additions) --------
      // easeInCubic + easeOutCubic already defined above for the solar-system
      // materialise; only add easeInQuint here.
      const easeInQuint = (t) => t * t * t * t * t;

      // -------- Subject finder (Pack β) --------
      // Reads back the position/velocity textures once and picks a body
      // matching the requested selector.  Expensive (~1MB readback), called
      // only on shot start and cached for the shot duration.
      function findSubject(kind, opts = {}) {
        if (kind === "named" && Number.isInteger(opts.idx)) return opts.idx;
        const posBuf = new Float32Array(TEX_SIZE * TEX_SIZE * 4);
        const velBuf = new Float32Array(TEX_SIZE * TEX_SIZE * 4);
        renderer.readRenderTargetPixels(
          gpu.getCurrentRenderTarget(posVar),
          0,
          0,
          TEX_SIZE,
          TEX_SIZE,
          posBuf,
        );
        renderer.readRenderTargetPixels(
          gpu.getCurrentRenderTarget(velVar),
          0,
          0,
          TEX_SIZE,
          TEX_SIZE,
          velBuf,
        );
        let bestIdx = -1;
        let bestScore = -Infinity;
        const minSpeed = opts.minSpeed ?? 0.5;
        for (let i = 0; i < MAX_BODIES; i++) {
          const m = posBuf[i * 4 + 3];
          if (m <= 0) continue;
          const vx = velBuf[i * 4 + 0];
          const vy = velBuf[i * 4 + 1];
          const vz = velBuf[i * 4 + 2];
          const speed2 = vx * vx + vy * vy + vz * vz;
          let score = 0;
          switch (kind) {
            case "heaviest":
              score = m;
              break;
            case "fastest":
              if (speed2 < minSpeed * minSpeed) continue;
              score = speed2;
              break;
            case "brightest_dopplered": {
              // Bright = fast × massive; dopplered = velocity aligned with
              // current camera->body direction.
              const px = posBuf[i * 4 + 0];
              const py = posBuf[i * 4 + 1];
              const pz = posBuf[i * 4 + 2];
              const dx = camera.position.x - px;
              const dy = camera.position.y - py;
              const dz = camera.position.z - pz;
              const dLen = Math.sqrt(dx * dx + dy * dy + dz * dz) + 1e-6;
              const align = (vx * dx + vy * dy + vz * dz) / dLen; // positive = approaching
              score = Math.sqrt(speed2) * Math.sqrt(m) * Math.max(0, align);
              break;
            }
            case "densest":
            default:
              // Approx: heavy bodies tend to sit in dense regions.  Proper
              // density eval would need grid-bucketing — overkill for v1.
              score = m;
          }
          if (score > bestScore) {
            bestScore = score;
            bestIdx = i;
          }
        }
        return bestIdx;
      }

      // Read a single body's position/velocity (one-texel readback).
      const _sfBufPos = new Float32Array(4);
      const _sfBufVel = new Float32Array(4);
      function readBodyState(idx) {
        const xi = idx % TEX_SIZE;
        const yi = Math.floor(idx / TEX_SIZE);
        renderer.readRenderTargetPixels(
          gpu.getCurrentRenderTarget(posVar),
          xi,
          yi,
          1,
          1,
          _sfBufPos,
        );
        renderer.readRenderTargetPixels(
          gpu.getCurrentRenderTarget(velVar),
          xi,
          yi,
          1,
          1,
          _sfBufVel,
        );
        return {
          pos: new THREE.Vector3(_sfBufPos[0], _sfBufPos[1], _sfBufPos[2]),
          vel: new THREE.Vector3(_sfBufVel[0], _sfBufVel[1], _sfBufVel[2]),
          mass: _sfBufPos[3],
        };
      }

      // -------- Shot programs --------
      function beginShot(ev) {
        // Apply scene-look changes (palette, channel, trail, doppler, lens)
        // requested by the shot.
        if (ev.look) applyShotLook(ev.look);

        const startPos = camera.position.clone();
        const startTgt = controls.target.clone();
        const startFov = camera.fov;
        const startRel = startPos.clone().sub(startTgt);
        const startRadius = startRel.length();
        // Spherical coords of start camera around target — for orbit programs
        const startTheta = Math.acos(
          clamp(startRel.y / Math.max(startRadius, 1e-6), -1, 1),
        );
        const startPhi = Math.atan2(startRel.z, startRel.x);
        const p = {
          program: ev.program,
          beginT: movie.elapsed,
          duration: ev.duration,
          camera: ev.cameraCfg || ev.camera || {},
          startPos,
          startTgt,
          startFov,
          startRel: startRel.clone(),
          startRadius,
          startPhi,
          startTheta,
          subjectIdx: -1,
          subjectLostCounter: 0,
        };
        // Subject finder for programs that need one
        if (ev.program === "track-streamer") {
          const which = (ev.camera && ev.camera.subject) || "fastest";
          const subjectOpts = { minSpeed: 3 };
          p.subjectIdx = findSubject(which, subjectOpts);
        }
        movie.shot = p;
      }

      function applyShotLook(lk) {
        if (lk.palette) {
          applyPalette(lk.palette);
          params.palette = lk.palette;
        }
        if (lk.channel) {
          params.channel = lk.channel;
          pointMat.uniforms.uChannel.value = channelValueFromName(lk.channel);
          pointMat.uniforms.uChannelMix.value = 0;
        }
        if (lk.trail !== undefined) {
          trailsPass.uniforms.damp.value = lk.trail;
          trailsPass.enabled = lk.trail > 0.001;
          params.trail = lk.trail;
        }
        if (lk.doppler !== undefined) {
          pointMat.uniforms.uDoppler.value = lk.doppler;
          params.doppler = lk.doppler;
        }
        if (lk.lens !== undefined) {
          lensPass.uniforms.uStrength.value = lk.lens;
          lensState.targetStrength = lk.lens;
          params.lens = lk.lens;
        }
      }

      function tickShot(p, realDt) {
        if (!p) return;
        const t = clamp((movie.elapsed - p.beginT) / p.duration, 0, 1);

        switch (p.program) {
          case "drift-wide": {
            // ~22° (or configured) slow orbit, tiny vertical drift
            const deg = p.camera.orbitDeg ?? 18;
            const ang = ((deg * Math.PI) / 180) * t;
            const c = Math.cos(ang),
              s = Math.sin(ang);
            const rel = p.startRel;
            const nx = rel.x * c - rel.z * s;
            const nz = rel.x * s + rel.z * c;
            camera.position.set(
              p.startTgt.x + nx,
              p.startTgt.y + rel.y,
              p.startTgt.z + nz,
            );
            // Gentle vertical drift: ±4% of radius across shot
            camera.position.y += Math.sin(t * Math.PI) * p.startRadius * 0.04;
            camera.lookAt(p.startTgt);
            camera.fov = p.startFov + Math.sin(t * Math.PI) * 1.5;
            camera.updateProjectionMatrix();
            break;
          }
          case "slow-reveal": {
            // Start tight, pull outward while FOV widens slightly
            const e = easeInOutCubic(t);
            const startR = p.camera.startRadius ?? p.startRadius * 0.6;
            const endR = p.camera.endRadius ?? p.startRadius;
            const startFov = p.camera.startFov ?? p.startFov;
            const endFov = p.camera.endFov ?? p.startFov;
            const radius = lerp(startR, endR, e);
            // Orbit gently (~15°) across shot for life
            const ang = t * 0.26;
            const c = Math.cos(ang),
              s = Math.sin(ang);
            const rel = p.startRel.clone().normalize();
            const nx = rel.x * c - rel.z * s;
            const nz = rel.x * s + rel.z * c;
            camera.position.set(
              p.startTgt.x + nx * radius,
              p.startTgt.y +
                rel.y * radius +
                Math.sin(t * Math.PI * 0.7) * radius * 0.02,
              p.startTgt.z + nz * radius,
            );
            camera.lookAt(p.startTgt);
            camera.fov = lerp(startFov, endFov, e);
            camera.updateProjectionMatrix();
            break;
          }
          case "push-in": {
            // Reverse of slow-reveal: wide → tight, FOV narrows
            const e = easeInOutCubic(t);
            const startR = p.camera.startRadius ?? p.startRadius * 1.4;
            const endR = p.camera.endRadius ?? p.startRadius * 0.5;
            const startFov = p.camera.startFov ?? p.startFov;
            const endFov = p.camera.endFov ?? p.startFov * 0.7;
            const radius = lerp(startR, endR, e);
            const ang = t * 0.4; // a touch more orbit for drama
            const c = Math.cos(ang),
              s = Math.sin(ang);
            const rel = p.startRel.clone().normalize();
            const nx = rel.x * c - rel.z * s;
            const nz = rel.x * s + rel.z * c;
            camera.position.set(
              p.startTgt.x + nx * radius,
              p.startTgt.y + rel.y * radius,
              p.startTgt.z + nz * radius,
            );
            camera.lookAt(p.startTgt);
            camera.fov = lerp(startFov, endFov, e);
            camera.updateProjectionMatrix();
            break;
          }
          case "hold-still": {
            // Camera locked to start pose. Tiny breathing for life.
            camera.position.copy(p.startPos);
            camera.position.y +=
              Math.sin(t * Math.PI * 1.3) * p.startRadius * 0.003;
            controls.target.copy(p.startTgt);
            camera.lookAt(p.startTgt);
            camera.fov = p.startFov + Math.sin(t * Math.PI * 0.9) * 0.5;
            camera.updateProjectionMatrix();
            break;
          }
          case "god-ray": {
            // Pure lock — sim motion is the performer.
            camera.position.copy(p.startPos);
            controls.target.copy(p.startTgt);
            camera.lookAt(p.startTgt);
            camera.fov = p.startFov;
            camera.updateProjectionMatrix();
            break;
          }
          case "orbit-ascend":
          case "orbit-descend": {
            // Helical arc: orbit by ~80° while theta moves ±25° over shot
            const e = easeInOutCubic(t);
            const orbitRad =
              (p.camera.orbitRad ?? 1.4) * // ~80°
              (p.program === "orbit-descend" ? -1 : 1);
            const thetaDelta = 0.45; // ~26°
            const newPhi = p.startPhi + orbitRad * e;
            const dir = p.program === "orbit-ascend" ? -1 : +1;
            const newTheta = clamp(
              p.startTheta + thetaDelta * dir * e,
              0.2,
              Math.PI - 0.2,
            );
            const rScale = p.camera.radiusFactor ?? 1.0;
            const r = p.startRadius * rScale;
            camera.position.set(
              p.startTgt.x + r * Math.sin(newTheta) * Math.cos(newPhi),
              p.startTgt.y + r * Math.cos(newTheta),
              p.startTgt.z + r * Math.sin(newTheta) * Math.sin(newPhi),
            );
            camera.lookAt(p.startTgt);
            camera.fov = p.startFov;
            camera.updateProjectionMatrix();
            break;
          }
          case "track-streamer": {
            // Dolly alongside the subject body.  If lost/zeroed, fall back
            // to a held pose so we don't teleport off-screen.
            if (p.subjectIdx < 0) {
              camera.position.copy(p.startPos);
              camera.lookAt(p.startTgt);
              camera.fov = p.startFov;
              break;
            }
            const s = readBodyState(p.subjectIdx);
            if (s.mass <= 0 || s.vel.lengthSq() < 0.25) {
              // Body vanished or stopped — hold
              p.subjectLostCounter++;
              if (p.subjectLostCounter > 12) {
                // Try to re-acquire once
                p.subjectIdx = findSubject("fastest", { minSpeed: 3 });
                p.subjectLostCounter = 0;
              }
              camera.position.copy(p.startPos);
              camera.lookAt(p.startTgt);
              camera.fov = p.startFov;
              break;
            }
            // Chase camera: offset from body, perpendicular to velocity,
            // slightly above, pointed back at the body.
            const velDir = s.vel.clone().normalize();
            const worldUp = new THREE.Vector3(0, 1, 0);
            const right = new THREE.Vector3()
              .crossVectors(velDir, worldUp)
              .normalize();
            const up = new THREE.Vector3()
              .crossVectors(right, velDir)
              .normalize();
            const offDist = p.camera.offset ?? p.startRadius * 0.18;
            const camPos = s.pos
              .clone()
              .addScaledVector(right, offDist * 0.8)
              .addScaledVector(up, offDist * 0.4)
              .addScaledVector(velDir, -offDist * 0.3); // trail slightly
            camera.position.copy(camPos);
            camera.lookAt(s.pos);
            camera.fov = p.startFov;
            camera.updateProjectionMatrix();
            break;
          }
          case "vertigo": {
            // Dolly-zoom: dolly in aggressively while FOV widens to preserve
            // apparent target size. Background stretches.
            const e = easeInOutCubic(t);
            const dollyFactor = p.camera.dollyFactor ?? 0.52;
            const newR = p.startRadius * lerp(1.0, dollyFactor, e);
            const tanStart = Math.tan((p.startFov * Math.PI) / 360);
            // tan(newFov/2) * newR = tan(startFov/2) * startR  (preserve size)
            const tanNew = (tanStart * p.startRadius) / Math.max(newR, 1);
            const newFov = (Math.atan(tanNew) * 360) / Math.PI;
            const fwd = p.startPos.clone().sub(p.startTgt).normalize();
            camera.position.copy(p.startTgt).addScaledVector(fwd, newR);
            camera.lookAt(p.startTgt);
            camera.fov = clamp(newFov, 16, 110);
            camera.updateProjectionMatrix();
            break;
          }
          case "ascend-out": {
            // Lift up and pull back; FOV widens slightly. Ends in empty space.
            const e = easeInOutQuint(t);
            const liftAmt = p.camera.lift ?? p.startRadius * 1.3;
            const backAmt = p.camera.back ?? p.startRadius * 0.55;
            const fwd = p.startPos.clone().sub(p.startTgt).normalize();
            camera.position.copy(p.startPos);
            camera.position.y += liftAmt * e;
            camera.position.addScaledVector(fwd, backAmt * e);
            camera.lookAt(p.startTgt);
            camera.fov = lerp(p.startFov, Math.min(72, p.startFov + 14), e);
            camera.updateProjectionMatrix();
            break;
          }
          case "crash-zoom": {
            // Sharp inward zoom over a short duration. No FOV change.
            const e = easeInQuint(t);
            const newR = lerp(p.startRadius, p.startRadius * 0.32, e);
            const fwd = p.startPos.clone().sub(p.startTgt).normalize();
            camera.position.copy(p.startTgt).addScaledVector(fwd, newR);
            camera.lookAt(p.startTgt);
            camera.fov = p.startFov;
            camera.updateProjectionMatrix();
            break;
          }
        }

        if (t >= 1) movie.shot = null;
      }

      // -------- Travels --------
      function beginTravel(ev) {
        const b = {
          style: ev.style,
          beginT: movie.elapsed,
          duration: ev.duration,
          next: ev.next,
          camera: ev.camera || {},
          fadeToBlack: !!ev.fadeToBlack,
          swapped: false,
          // capture current state for restoration / lerp
          startPos: camera.position.clone(),
          startTgt: controls.target.clone(),
          startExposure: renderer.toneMappingExposure,
          startBloom: bloom.strength,
          startCA: caPass.uniforms.uAmount.value,
          startTrail: trailsPass.uniforms.damp.value,
          startLens: lensPass.uniforms.uStrength.value,
          startFov: camera.fov,
          startSpeed: params.speed,
        };
        movie.travel = b;
        movie.shot = null;
      }

      function endTravel() {
        movie.travel = null;
      }

      function doSceneSwap(nextKey) {
        if (!nextKey) return;
        const sc = SCENES[nextKey];
        if (!sc) return;
        sc.make();
        uploadStateToGPU();
        uploadK(K_PRESETS[sc.K] || K_PRESETS.neutral);
        // Apply scene look (palette/channel/tint/physics) without jumping camera
        applySceneLook(sc);
        applyScenePhysics(sc);
        pointMat.uniforms.uBHHighlight.value =
          sc.bhHighlight !== undefined ? sc.bhHighlight : 1.0;
        pointMat.uniforms.uSpeedMax.value =
          sc.speedMax !== undefined ? sc.speedMax : 30.0;
        pointMat.uniforms.uDoppler.value =
          sc.doppler !== undefined ? sc.doppler : 0.0;
        setPhotonRing(sc.photonRing || null);
        setLensStatic(sc.lens || null);
        lensPass.uniforms.uStrength.value = lensState.targetStrength;
        currentSceneKey = nextKey;
        clearTrails();
      }

      function tickTravel(tr, realDt) {
        const t = clamp((movie.elapsed - tr.beginT) / tr.duration, 0, 1);
        const base = movie.baseline || {
          exposure: 1,
          bloom: 0.9,
          ca: 0.18,
          fov: 55,
        };

        switch (tr.style) {
          case "cross-dissolve": {
            // Exposure dip to 0.25× at t=0.5, back up (or to 0 if fadeToBlack)
            const dip = 1 - Math.min(t, 1 - t) * 1.5; // 1 at edges, 0.25 at middle
            const dipVal = Math.max(0.2, dip);
            if (tr.fadeToBlack && t > 0.5) {
              // Second half: keep fading all the way to black
              const k = (t - 0.5) / 0.5;
              renderer.toneMappingExposure =
                tr.startExposure * (1 - k) * dipVal;
            } else {
              renderer.toneMappingExposure = tr.startExposure * dipVal;
            }
            if (!tr.swapped && t >= 0.5 && tr.next) {
              tr.swapped = true;
              doSceneSwap(tr.next);
            }
            break;
          }
          case "warp": {
            // 5-phase: narrow FOV, spike CA+bloom+exposure at middle, body swap, unwind
            const u = t;
            const bump = Math.sin(u * Math.PI); // 0..1..0
            const narrow = Math.sin(u * Math.PI); // 0..1..0 for FOV narrow
            const startFov = tr.startFov;
            const minFov = Math.max(18, startFov - 30);
            camera.fov = lerp(startFov, minFov, narrow);
            camera.updateProjectionMatrix();
            caPass.uniforms.uAmount.value = tr.startCA + bump * 0.5;
            bloom.strength = tr.startBloom + bump * 1.2;
            renderer.toneMappingExposure = tr.startExposure + bump * 0.9;
            vigGrainPass.uniforms.uGrain.value = 0.05 + bump * 0.08;
            // Crank trails during warp for motion-blur feel
            const targetTrail = Math.max(tr.startTrail, 0.9);
            trailsPass.uniforms.damp.value = lerp(
              tr.startTrail,
              targetTrail,
              bump,
            );
            trailsPass.enabled = true;
            // Boost sim speed temporarily
            params.speed = tr.startSpeed * (1 + bump * 6);
            // Push the camera a bit forward along view direction for a "rush" feel
            if (u > 0 && u < 1) {
              const fwd = camera.position
                .clone()
                .sub(controls.target)
                .normalize();
              const kick = Math.sin(u * Math.PI) * 6;
              camera.position.addScaledVector(fwd, -kick * realDt * 10);
            }
            if (!tr.swapped && t >= 0.5 && tr.next) {
              tr.swapped = true;
              doSceneSwap(tr.next);
            }
            // At end, restore everything except what the new scene already claimed
            if (t >= 1) {
              caPass.uniforms.uAmount.value = params.ca ?? tr.startCA;
              bloom.strength = params.bloomStrength ?? tr.startBloom;
              renderer.toneMappingExposure =
                params.exposure ?? tr.startExposure;
              vigGrainPass.uniforms.uGrain.value = params.grain ?? 0.05;
              trailsPass.uniforms.damp.value = params.trail ?? tr.startTrail;
              trailsPass.enabled = trailsPass.uniforms.damp.value > 0.001;
              params.speed = tr.startSpeed;
              camera.fov = tr.startFov;
              camera.updateProjectionMatrix();
            }
            break;
          }
          case "dolly-through": {
            // Long forward translation through space while old→new scene swap
            // happens under a brief exposure dip.  The motion covers the cut.
            const e = easeInOutCubic(t);
            const fwd = tr.startTgt.clone().sub(tr.startPos).normalize();
            const dist = tr.camera?.distance ?? 1200;
            // Camera rushes forward along its original view vector
            camera.position.copy(tr.startPos).addScaledVector(fwd, dist * e);
            // Look in the direction of travel
            const look = camera.position.clone().addScaledVector(fwd, 50);
            camera.lookAt(look);
            // Triangle exposure dip that bottoms out at t=0.5
            const dipAmt = Math.max(0, 1 - Math.abs(2 * t - 1));
            renderer.toneMappingExposure =
              tr.startExposure * (1 - 0.78 * dipAmt);
            // Slight CA bump during rush
            caPass.uniforms.uAmount.value = tr.startCA + 0.25 * dipAmt;
            // Trails boosted for smear
            trailsPass.uniforms.damp.value = Math.max(
              tr.startTrail,
              0.85 * dipAmt + tr.startTrail * (1 - dipAmt),
            );
            trailsPass.enabled = true;
            if (!tr.swapped && t >= 0.5 && tr.next) {
              tr.swapped = true;
              doSceneSwap(tr.next);
            }
            if (t >= 1) {
              renderer.toneMappingExposure =
                params.exposure ?? tr.startExposure;
              caPass.uniforms.uAmount.value = params.ca ?? tr.startCA;
              trailsPass.uniforms.damp.value = params.trail ?? tr.startTrail;
              trailsPass.enabled = trailsPass.uniforms.damp.value > 0.001;
            }
            break;
          }
          case "sunrise": {
            // Fade up from dark.  Body swap happens at t=0 under darkness.
            if (!tr.swapped) {
              tr.swapped = true;
              renderer.toneMappingExposure = 0.04;
              if (tr.next) doSceneSwap(tr.next);
            }
            // Slight overshoot to settle: 0.04 → 1.2 → target
            const overshoot = 1.2;
            if (t < 0.82) {
              const k = t / 0.82;
              renderer.toneMappingExposure = lerp(
                0.04,
                overshoot,
                easeOutCubic(k),
              );
            } else {
              const k = (t - 0.82) / 0.18;
              // Settle to the scene's own exposure (via params.exposure, captured on swap)
              const tgt = params.exposure ?? tr.startExposure;
              renderer.toneMappingExposure = lerp(overshoot, tgt, k);
            }
            break;
          }
          case "fade-to-black": {
            // Simple exposure fade to 0 over the duration.  No swap.
            const e = easeInCubic(t);
            renderer.toneMappingExposure = tr.startExposure * (1 - e);
            break;
          }
          case "black-hole-dive": {
            // Dolly toward the lens center while ramping the lens, dip to black
            // under cover of the shadow, emerge into the next scene.
            const lensCenter = tr.camera?.center
              ? new THREE.Vector3(...tr.camera.center)
              : new THREE.Vector3(0, 0, 0);
            const startRel = tr.startPos.clone().sub(lensCenter);
            const startDist = startRel.length();
            const dir = startRel.clone().normalize();

            if (t < 0.5) {
              const k = t / 0.5;
              const ke = easeInCubic(k);
              // Approach the lens center (never quite touching)
              const newDist = startDist * (1 - 0.95 * ke);
              camera.position
                .copy(lensCenter)
                .addScaledVector(dir, Math.max(newDist, 2));
              camera.lookAt(lensCenter);
              // Lens ramps to 1.6
              lensPass.uniforms.uStrength.value = 1.6 * ke;
              lensPass.enabled = true;
              // Exposure dips to 0
              renderer.toneMappingExposure = tr.startExposure * (1 - ke);
              // CA + bloom bump
              caPass.uniforms.uAmount.value = tr.startCA + 0.35 * ke;
              bloom.strength = tr.startBloom + 0.9 * ke;
            } else {
              if (!tr.swapped) {
                tr.swapped = true;
                if (tr.next) doSceneSwap(tr.next);
                // Lens strength matches the new scene; if new scene has no
                // lens, setLensStatic in doSceneSwap already cleared it.
              }
              const k = (t - 0.5) / 0.5;
              const ke = easeOutCubic(k);
              // Exposure rises from 0 to new scene's exposure
              const tgtExp = params.exposure ?? tr.startExposure;
              renderer.toneMappingExposure = tgtExp * ke;
              caPass.uniforms.uAmount.value = lerp(
                tr.startCA + 0.35,
                params.ca ?? tr.startCA,
                ke,
              );
              bloom.strength = lerp(
                tr.startBloom + 0.9,
                params.bloomStrength ?? tr.startBloom,
                ke,
              );
            }
            if (t >= 1) {
              // Final restore to new scene's baselines
              renderer.toneMappingExposure =
                params.exposure ?? tr.startExposure;
              caPass.uniforms.uAmount.value = params.ca ?? tr.startCA;
              bloom.strength = params.bloomStrength ?? tr.startBloom;
            }
            break;
          }
        }

        if (t >= 1) endTravel();
      }

      // -------- Event dispatcher --------
      function fireMovieEvent(ev) {
        switch (ev.kind) {
          case "scene":
            // Synchronous scene load, no transition
            doSceneSwap(ev.key);
            break;
          case "shot":
            beginShot(ev);
            break;
          case "travel":
            beginTravel(ev);
            break;
          case "title":
            showFilmTitle(ev.main, ev.sub, (ev.holdSec || 3) * 1000);
            break;
          case "music":
            handleFilmMusicEvent(ev);
            break;
          case "end":
            stopMovie(true);
            break;
        }
      }

      function movieTick(realDt) {
        if (!movie.active) return;
        if (movie.paused || movie.scrubbing) return;
        // Accumulator — advancing by realDt * speed makes the whole film
        // play faster while keeping shot/travel lerps correct (they read
        // (movie.elapsed - beginT) / duration).
        movie.elapsed += realDt * (movie.speed || 1);
        while (
          movie.cursor < movie.timeline.length &&
          movie.timeline[movie.cursor].at <= movie.elapsed
        ) {
          fireMovieEvent(movie.timeline[movie.cursor++]);
        }
        if (movie.travel) tickTravel(movie.travel, realDt);
        else if (movie.shot) tickShot(movie.shot, realDt);
        reflectMovieOnHud(movie.elapsed, movie.film ? movie.film.duration : 0);
      }

      // Music keeps pace with the film — but speeds > 2× pitch-shift badly,
      // so we mute instead of going chipmunky.
      function applyMovieSpeedToMusic() {
        const a = music.audio;
        if (!a) return;
        const sp = movie.speed || 1;
        if (sp <= 2) {
          a.playbackRate = sp;
          a.muted = false;
        } else {
          a.playbackRate = 1;
          a.muted = true;
        }
      }

      function setMovieSpeed(v) {
        const allowed = [1, 2, 4, 8];
        movie.speed = allowed.includes(v) ? v : 1;
        applyMovieSpeedToMusic();
        if (activePanel === "movie") buildPanel("movie");
      }

      function cycleMovieSpeed(dir) {
        const allowed = [1, 2, 4, 8];
        let i = allowed.indexOf(movie.speed || 1);
        if (i < 0) i = 0;
        i = clamp(i + (dir > 0 ? 1 : -1), 0, allowed.length - 1);
        setMovieSpeed(allowed[i]);
        showToast("Film speed", movie.speed + "×");
      }

      // Jump the film to a target elapsed time. Walks the timeline from the
      // start, applies scene/music events that landed in the past, and fires
      // beginShot / beginTravel for whichever one is active at target.
      // Caveat: physics can't be rewound — bodies are at t=0 of whatever
      // scene got loaded, not where they would have been after a straight
      // playthrough.
      function seekMovie(targetElapsed) {
        if (!movie.active || !movie.film) return;
        const t = clamp(targetElapsed, 0, movie.film.duration);
        movie.shot = null;
        movie.travel = null;
        hideFilmTitle();
        movie.cursor = 0;
        let activeShot = null;
        let activeTravel = null;
        for (let i = 0; i < movie.timeline.length; i++) {
          const ev = movie.timeline[i];
          if (ev.at > t) {
            movie.cursor = i;
            break;
          }
          movie.cursor = i + 1;
          switch (ev.kind) {
            case "scene":
              doSceneSwap(ev.key);
              break;
            case "shot":
              if (ev.at + (ev.duration || 0) > t) activeShot = ev;
              break;
            case "travel":
              if (ev.at + (ev.duration || 0) > t) activeTravel = ev;
              break;
            // music / title / end events during a scrub-forward are skipped.
            // On release, the currently-playing music continues from where
            // it already is — we don't try to re-sync soundtrack to film.
          }
        }
        movie.elapsed = t;
        // Bring the right shot/travel online. Override beginT so the lerp
        // starts at the right progress point within the shot.
        if (activeTravel) {
          beginTravel(activeTravel);
          if (movie.travel) movie.travel.beginT = activeTravel.at;
        } else if (activeShot) {
          if (activeShot.look) applyShotLook(activeShot.look);
          beginShot(activeShot);
          if (movie.shot) movie.shot.beginT = activeShot.at;
        }
        reflectMovieOnHud(movie.elapsed, movie.film.duration);
      }

      // -------- UI reflection --------
      function reflectMovieOnRail() {
        const b = document.querySelector('.rail-btn[data-id="movie"]');
        if (b) b.classList.toggle("playing", movie.active);
      }
      function reflectMovieOnHud(elapsed, total) {
        const el = $("#hud-film");
        const tc = $("#hud-film-tc");
        if (!el || !tc) return;
        el.classList.toggle("on", movie.active);
        if (movie.active) {
          tc.textContent = `${fmtMmSs(elapsed)} / ${fmtMmSs(total)}`;
        }
      }

      // ===============================================================
      // 23. CAPTURE (screenshot / export / recording)
      // ===============================================================
      function takeScreenshot(scale) {
        const viewW = renderer.getSize(new THREE.Vector2()).x;
        const viewH = renderer.getSize(new THREE.Vector2()).y;
        const w = Math.floor(viewW * scale);
        const h = Math.floor(viewH * scale);
        const maxRB = renderer.capabilities.maxTextureSize || 8192;
        const capped = Math.min(w, maxRB);
        const ratio = capped / w;
        const W = Math.floor(w * ratio);
        const H = Math.floor(h * ratio);

        renderer.setSize(W, H, false);
        composer.setSize(W, H);
        camera.aspect = W / H;
        camera.updateProjectionMatrix();

        composer.render();
        const url = renderer.domElement.toDataURL("image/png");
