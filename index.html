    <div id="film-title"></div>
    <div id="err"></div>
    <pre id="debug-overlay" class="hidden"></pre>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module" id="app-script">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { ShaderPass } from "three/addons/postprocessing/ShaderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
      import { OutputPass } from "three/addons/postprocessing/OutputPass.js";
      import { AfterimagePass } from "three/addons/postprocessing/AfterimagePass.js";
      import { GPUComputationRenderer } from "three/addons/misc/GPUComputationRenderer.js";

      // ===============================================================
      // 1. CONFIG & DOM HELPERS
      // ===============================================================
      // Density level → TEX_SIZE. Mutable so the user can resize live.
      // See BODY_COUNT.md. MAX_BODIES is always TEX_SIZE².
      const DENSITY_LEVELS = {
        lite: { texSize: 64, label: "lite", shortCount: "4k" },
        standard: { texSize: 128, label: "standard", shortCount: "16k" },
        dense: { texSize: 181, label: "dense", shortCount: "33k" },
        lush: { texSize: 256, label: "lush", shortCount: "65k" },
      };
      const DENSITY_ORDER = ["lite", "standard", "dense", "lush"];
      function loadInitialDensity() {
        // URL param takes top priority — lets an embed / share link
        // land a visitor at a specific density without them touching UI.
        // Accepts either the key name (?objects=lush) or the short count
        // (?objects=65k).  Case-insensitive.
        try {
          const url = new URL(location.href);
          const raw = (url.searchParams.get("objects") || "")
            .toLowerCase()
            .trim();
          if (raw) {
            if (DENSITY_LEVELS[raw]) return raw;
            for (const key of DENSITY_ORDER) {
              if (DENSITY_LEVELS[key].shortCount === raw) return key;
            }
          }
        } catch (_) {}
        try {
          const stored = localStorage.getItem("universeSim.density");
          if (stored && DENSITY_LEVELS[stored]) return stored;
        } catch (_) {}
        return "standard";
      }
      let currentDensityKey = loadInitialDensity();
      let TEX_SIZE = DENSITY_LEVELS[currentDensityKey].texSize;
      let MAX_BODIES = TEX_SIZE * TEX_SIZE;
      const MAX_AGE = 300.0;
      const NUM_KINDS = 7; // star, planet, BH, dust, halo, galaxyA, galaxyB

      const $ = (s) => document.querySelector(s);
      const el = (tag, cls) => {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        return e;
      };
      const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
      const lerp = (a, b, t) => a + (b - a) * t;
      const easeInOutCubic = (t) =>
        t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      function showError(msg) {
        const e = $("#err");
        e.textContent = msg;
        e.classList.add("show");
      }

      // ===============================================================
      // 2. RENDERER / SCENE / CAMERA
      // ===============================================================
      const canvasEl = $("#canvas");
      const renderer = new THREE.WebGLRenderer({
        canvas: canvasEl,
        antialias: false,
        powerPreference: "high-performance",
        preserveDrawingBuffer: true,
      });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      if (!renderer.capabilities.isWebGL2) {
        showError(
          "WebGL2 required. Use recent Chrome/Edge/Firefox with a real GPU.",
        );
        throw new Error("no webgl2");
      }
      if (!renderer.extensions.get("EXT_color_buffer_float")) {
        showError(
          "EXT_color_buffer_float missing — float render targets unavailable.",
        );
        throw new Error("no float FBO");
      }

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x02030a);

      const camera = new THREE.PerspectiveCamera(
        55,
        innerWidth / innerHeight,
        0.1,
        50000,
      );
      camera.position.set(220, 140, 220);

      const controls = new OrbitControls(camera, canvasEl);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.maxDistance = 10000;
      controls.minDistance = 1;

      // ===============================================================
      // 3. STARFIELD (procedural, twinkling)
      // ===============================================================
      let starfieldMat = null;
      {
        const N = 9000;
        const pos = new Float32Array(N * 3);
        const phase = new Float32Array(N);
        const sz = new Float32Array(N);
        for (let i = 0; i < N; i++) {
          const r = 8000 + Math.random() * 4500;
          const theta = Math.acos(2 * Math.random() - 1);
          const phi = Math.random() * 2 * Math.PI;
          pos[i * 3 + 0] = r * Math.sin(theta) * Math.cos(phi);
          pos[i * 3 + 1] = r * Math.sin(theta) * Math.sin(phi);
          pos[i * 3 + 2] = r * Math.cos(theta);
          phase[i] = Math.random() * 6.2831853;
          sz[i] =
            Math.random() < 0.025
              ? 2.0 + Math.random() * 1.4
              : 0.7 + Math.random() * 1.2;
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        geo.setAttribute("aPhase", new THREE.BufferAttribute(phase, 1));
        geo.setAttribute("aSize", new THREE.BufferAttribute(sz, 1));
        starfieldMat = new THREE.ShaderMaterial({
          uniforms: { uTime: { value: 0 }, uIntensity: { value: 0.55 } },
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
          vertexShader: `
            uniform float uTime;
            attribute float aPhase;
            attribute float aSize;
            varying float vT;
            void main() {
              vec4 mv = modelViewMatrix * vec4(position, 1.0);
              gl_Position = projectionMatrix * mv;
              float tw = 0.55 + 0.45 * sin(uTime * 0.9 + aPhase)
                              + 0.35 * sin(uTime * 0.31 + aPhase * 2.17);
              vT = clamp(tw * 0.5 + 0.3, 0.15, 1.0);
              gl_PointSize = aSize;
            }
          `,
          fragmentShader: `
            uniform float uIntensity;
            varying float vT;
            void main() {
              vec2 c = gl_PointCoord - 0.5;
              float d = length(c);
              if (d > 0.5) discard;
              float a = smoothstep(0.5, 0.0, d) * vT * uIntensity;
              gl_FragColor = vec4(vec3(0.78, 0.88, 1.02) * a, a);
            }
          `,
        });
        const stars = new THREE.Points(geo, starfieldMat);
        stars.frustumCulled = false;
        scene.add(stars);
      }

      // ===============================================================
      // 4. COMPUTE SHADERS (gravity + flocking + radiation + age)
      // ===============================================================
      // Velocity shader is built as a function so TEX_SIZE can be rebaked
      // when the user changes the density level (see rebuildPipeline).
      const buildVelocityShader = (texSize) => /* glsl */ `
        uniform float uDt;
        uniform float uG;
        uniform float uEps2;
        uniform float uSign;
        uniform float uFrame;
        uniform float uK[${NUM_KINDS * NUM_KINDS}];
        uniform float uFlock;
        uniform float uRadiation;
        uniform float uMaxAge;

        vec2 hash22(vec2 p, float seed) {
          vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973) + seed * 0.173);
          p3 += dot(p3, p3.yzx + 19.19);
          return fract((p3.xx + p3.yz) * p3.zy);
        }

        void main() {
          vec2 uvSelf = gl_FragCoord.xy / resolution.xy;
          vec4 posA = texture2D(texturePosition, uvSelf);
          vec4 velA = texture2D(textureVelocity, uvSelf);

          if (posA.w <= 0.0) { gl_FragColor = velA; return; }

          float kindAf = floor(velA.w + 0.001);
          float ageNorm = velA.w - kindAf;
          int kindA = int(kindAf);
          if (kindA > ${NUM_KINDS - 1}) kindA = ${NUM_KINDS - 1};
          if (kindA < 0) kindA = 0;

          vec3 p = posA.xyz;
          vec3 v = velA.xyz;

          vec3 acc = vec3(0.0);
          vec2 ts = 1.0 / resolution.xy;

          // --- all-pairs gravity with interaction matrix K[kindA][kindB] ---
          for (int y = 0; y < ${texSize}; y++) {
            for (int x = 0; x < ${texSize}; x++) {
              vec2 uv2 = (vec2(float(x), float(y)) + 0.5) * ts;
              vec4 posB = texture2D(texturePosition, uv2);
              if (posB.w <= 0.0) continue;
              vec4 velB = texture2D(textureVelocity, uv2);
              float kindBf = floor(velB.w + 0.001);
              int kindB = int(kindBf);
              if (kindB > ${NUM_KINDS - 1}) kindB = ${NUM_KINDS - 1};
              if (kindB < 0) kindB = 0;
              float K = uK[kindA * ${NUM_KINDS} + kindB];
              vec3 d = posB.xyz - p;
              float r2 = dot(d, d) + uEps2;
              float invR3 = inversesqrt(r2 * r2 * r2);
              acc += uG * posB.w * K * d * invR3;
            }
          }

          // --- stochastic neighborhood rules (flocking + radiation pressure) ---
          if (uFlock > 0.001 || uRadiation > 0.001) {
            vec3 alignV = vec3(0.0);
            vec3 cohC = vec3(0.0);
            vec3 sepF = vec3(0.0);
            vec3 brightDir = vec3(0.0);
            float wSum = 0.0;
            for (int s = 0; s < 8; s++) {
              vec2 rnd = hash22(uvSelf * 47.0 + float(s) * 11.3, uFrame * 0.001 + 0.7);
              vec4 posS = texture2D(texturePosition, rnd);
              if (posS.w <= 0.0) continue;
              vec4 velS = texture2D(textureVelocity, rnd);
              vec3 dS = posS.xyz - p;
              float rS = length(dS) + 0.001;
              float w = 1.0 / (1.0 + rS * 0.02);
              alignV += velS.xyz * w;
              cohC += posS.xyz * w;
              sepF += -dS / (rS * rS * rS + 0.001);
              float b = length(velS.xyz) * posS.w * w;
              brightDir += (dS / rS) * b;
              wSum += w;
            }
            if (wSum > 0.001) {
              alignV /= wSum;
              cohC /= wSum;
              float flockK = 0.0;
              if (kindA == 3)              flockK = 1.0;
              else if (kindA == 0 ||
                       kindA == 5 ||
                       kindA == 6)         flockK = 0.12;
              vec3 fA = (alignV - v) * 0.22;
              vec3 fC = (cohC - p) * 0.004;
              vec3 fS = sepF * 0.04;
              acc += (fA + fC + fS) * uFlock * flockK;
              if (uRadiation > 0.001) {
                brightDir /= wSum;
                acc -= brightDir * uRadiation * 0.00004;
              }
            }
          }

          vec3 newVel = v + acc * uDt * uSign;

          // Age: increment normalised age (saturated to < 1 so floor(kind) is preserved)
          float dAge = uDt * abs(uSign) / uMaxAge;
          float newAgeNorm = clamp(ageNorm + dAge, 0.0, 0.9999);

          gl_FragColor = vec4(newVel, kindAf + newAgeNorm);
        }
      `;

      const positionShader = /* glsl */ `
        uniform float uDt;
        uniform float uSign;
        void main() {
          vec2 uv = gl_FragCoord.xy / resolution.xy;
          vec4 pos = texture2D(texturePosition, uv);
          vec4 vel = texture2D(textureVelocity, uv);
          pos.xyz += vel.xyz * uDt * uSign;
          gl_FragColor = pos;
        }
      `;

      // ===============================================================
      // 5. GPGPU SETUP
      // ===============================================================
      // Bindings live on `let` because rebuildPipeline() swaps them when
      // the user changes density level. Default uniform values are seeded
      // by installSimUniforms(); on rebuild we preserve the live values
      // of uG / uFlock / etc. that the current scene set up.
      let gpu;
      let posVar;
      let velVar;

      function installSimUniforms(preserve) {
        posVar.material.uniforms.uDt = { value: preserve?.uDt ?? 0.01 };
        posVar.material.uniforms.uSign = { value: preserve?.uSign ?? 1.0 };
        velVar.material.uniforms.uDt = { value: preserve?.uDt ?? 0.01 };
        velVar.material.uniforms.uG = { value: preserve?.uG ?? 1.0 };
        velVar.material.uniforms.uEps2 = { value: preserve?.uEps2 ?? 0.25 };
        velVar.material.uniforms.uSign = { value: preserve?.uSign ?? 1.0 };
        velVar.material.uniforms.uFrame = { value: preserve?.uFrame ?? 0.0 };
        velVar.material.uniforms.uK = {
          value: preserve?.uK ?? new Array(NUM_KINDS * NUM_KINDS).fill(1.0),
        };
        velVar.material.uniforms.uFlock = { value: preserve?.uFlock ?? 0.0 };
        velVar.material.uniforms.uRadiation = {
          value: preserve?.uRadiation ?? 0.0,
        };
        velVar.material.uniforms.uMaxAge = { value: MAX_AGE };
      }

      function createGPGPU(texSize, preserve) {
        gpu = new GPUComputationRenderer(texSize, texSize, renderer);
        const dtPos = gpu.createTexture();
        const dtVel = gpu.createTexture();
        posVar = gpu.addVariable("texturePosition", positionShader, dtPos);
        velVar = gpu.addVariable(
          "textureVelocity",
          buildVelocityShader(texSize),
          dtVel,
        );
        gpu.setVariableDependencies(posVar, [posVar, velVar]);
        gpu.setVariableDependencies(velVar, [posVar, velVar]);
        installSimUniforms(preserve);
        const gpuErr = gpu.init();
        if (gpuErr !== null) {
          showError("GPGPU init failed: " + gpuErr);
          throw new Error(gpuErr);
        }
      }

      createGPGPU(TEX_SIZE);

      // ===============================================================
      // 6. PARTICLE MESH (with palette + channel sampling)
      // ===============================================================
      const pointVert = /* glsl */ `
        uniform sampler2D uPos;
        uniform sampler2D uVel;
        uniform float uPointScale;
        uniform float uChannel;       // 0 mass, 1 speed, 2 kind, 3 density, 4 age
        uniform float uChannel2;
        uniform float uChannelMix;    // 0..1 cross-fade between uChannel and uChannel2
        uniform float uPaletteStops;  // number of palette stops (1..8)
        uniform vec3  uPalette[8];
        uniform float uMaxAge;
        uniform float uShowHalo;
        uniform float uTime;
        uniform float uBHHighlight;
        uniform float uSpeedMax;
        uniform float uDoppler;          // relativistic-ish brightness boost strength
        uniform float uKindTints[${NUM_KINDS * 3}]; // per-kind optional tint multipliers
        uniform vec2  uFollowUV;         // aRef of the followed body; (-1,-1) = inactive
        uniform float uFollowPulse;      // 0..1, drives attach-halo pulse
        attribute vec2 aRef;
        varying vec3 vColor;
        varying float vAlpha;

        vec3 samplePalette(float t) {
          t = clamp(t, 0.0, 0.9999);
          float stops = max(uPaletteStops, 2.0);
          float f = t * (stops - 1.0);
          int i = int(floor(f));
          int j = i + 1;
          if (j > int(stops) - 1) j = int(stops) - 1;
          float m = f - float(i);
          return mix(uPalette[i], uPalette[j], m);
        }

        // Tiny 2D hash for cheap stochastic density
        vec2 hash22(vec2 p, float seed) {
          vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973) + seed * 0.173);
          p3 += dot(p3, p3.yzx + 19.19);
          return fract((p3.xx + p3.yz) * p3.zy);
        }

        float evalChannel(float ch, float mass, float speed, int kindI,
                          vec3 wpos, vec2 ref, float ageNorm) {
          if (ch < 0.5) {
            return clamp(log2(max(mass, 0.01) + 1.0) / 7.0, 0.0, 1.0);
          } else if (ch < 1.5) {
            return clamp(log2(1.0 + speed) / log2(1.0 + uSpeedMax), 0.0, 1.0);
          } else if (ch < 2.5) {
            return float(kindI) / float(${NUM_KINDS} - 1);
          } else if (ch < 3.5) {
            float rho = 0.0;
            for (int s = 0; s < 4; s++) {
              vec2 rn = hash22(ref * 93.1 + float(s) * 5.3, uTime * 0.01 + 0.2);
              vec4 pB = texture2D(uPos, rn);
              if (pB.w <= 0.0) continue;
              vec3 d = pB.xyz - wpos;
              float r2 = dot(d, d);
              rho += 1.0 / (1.0 + r2 * 0.01);
            }
            return clamp(rho * 0.3, 0.0, 1.0);
          } else {
            return ageNorm;
          }
        }

        void main() {
          vec4 pos = texture2D(uPos, aRef);
          vec4 vel = texture2D(uVel, aRef);
          float mass = pos.w;

          if (mass <= 0.0) {
            gl_Position = vec4(2.0); gl_PointSize = 0.0; vAlpha = 0.0; return;
          }

          float kindPacked = vel.w;
          float kindF = floor(kindPacked + 0.001);
          float ageNorm = kindPacked - kindF;
          int kindI = int(kindF);
          float speed = length(vel.xyz);

          bool isHalo = (kindI == 4);
          if (isHalo && uShowHalo < 0.5) {
            gl_Position = vec4(2.0); gl_PointSize = 0.0; vAlpha = 0.0; return;
          }

          vec4 mv = modelViewMatrix * vec4(pos.xyz, 1.0);
          gl_Position = projectionMatrix * mv;

          // Base size by mass
          float sz = uPointScale * (0.8 + pow(mass, 0.33) * 2.0);
          if (kindI == 2) sz *= 5.0;  // BH glow
          if (kindI == 3) sz *= 0.45; // dust small
          if (isHalo)     sz *= 0.4;
          gl_PointSize = sz * (320.0 / -mv.z);

          // --- channel value in [0,1] — with optional cross-fade to a 2nd channel ---
          float t = evalChannel(uChannel, mass, speed, kindI, pos.xyz, aRef, ageNorm);
          if (uChannelMix > 0.001) {
            float t2 = evalChannel(uChannel2, mass, speed, kindI, pos.xyz, aRef, ageNorm);
            t = mix(t, t2, uChannelMix);
          }

          vec3 c = samplePalette(t);

          // Per-kind tint (for soft galaxy-A/B differentiation without reserving a whole channel)
          vec3 tint = vec3(
            uKindTints[kindI * 3 + 0],
            uKindTints[kindI * 3 + 1],
            uKindTints[kindI * 3 + 2]
          );
          c *= tint;

          // BH hot-highlight: scene can dim or kill this (Event Horizon goes black)
          if (kindI == 2) c = mix(c, vec3(1.6, 0.9, 0.35), 0.75 * uBHHighlight);

          // Relativistic-ish Doppler beaming: brighten bodies moving toward the
          // camera, dim those moving away.  Applied as (1 + strength·β)^3.
          // Skipped for black holes and halo particles.
          if (uDoppler > 0.001 && kindI != 2 && !isHalo) {
            vec3 toCam = normalize(cameraPosition - pos.xyz);
            float beta = dot(vel.xyz, toCam) / max(uSpeedMax, 0.1);
            float b = clamp(1.0 + uDoppler * beta, 0.15, 2.5);
            c *= b * b * b;
          }

          // --- Follow-cam highlight: boost size and whiten the picked body.
          // uFollowUV == (-1, -1) when follow-cam is inactive.
          if (uFollowUV.x >= 0.0 &&
              abs(aRef.x - uFollowUV.x) < 0.0005 &&
              abs(aRef.y - uFollowUV.y) < 0.0005) {
            float bump = 1.6 + uFollowPulse * 1.4;
            gl_PointSize *= bump;
            c = mix(c, vec3(1.0, 1.0, 1.0), 0.45 + 0.35 * uFollowPulse);
            // Force full alpha even for halo so the marker is always visible.
            vColor = c;
            vAlpha = 1.0;
            return;
          }

          vColor = c;
          vAlpha = isHalo ? 0.32 : 1.0;
        }
      `;

      const pointFrag = /* glsl */ `
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
          if (vAlpha <= 0.0) discard;
          vec2 c = gl_PointCoord - 0.5;
          float d = length(c);
          if (d > 0.5) discard;
          float a = smoothstep(0.5, 0.0, d);
          a = pow(a, 1.55);
          gl_FragColor = vec4(vColor * a * 1.35 * vAlpha, a * vAlpha);
        }
      `;

      const refGeom = new THREE.BufferGeometry();
      function populateRefGeom(texSize) {
        const n = texSize * texSize;
        const refs = new Float32Array(n * 2);
        const positions = new Float32Array(n * 3);
        let k = 0;
        for (let y = 0; y < texSize; y++) {
          for (let x = 0; x < texSize; x++) {
            refs[k * 2 + 0] = (x + 0.5) / texSize;
            refs[k * 2 + 1] = (y + 0.5) / texSize;
            k++;
          }
        }
        refGeom.setAttribute(
          "position",
          new THREE.BufferAttribute(positions, 3),
        );
        refGeom.setAttribute("aRef", new THREE.BufferAttribute(refs, 2));
      }
      populateRefGeom(TEX_SIZE);

      const pointMat = new THREE.ShaderMaterial({
        uniforms: {
          uPos: { value: null },
          uVel: { value: null },
          uPointScale: { value: 2.0 },
          uChannel: { value: 1.0 }, // default: speed
          uChannel2: { value: 1.0 },
          uChannelMix: { value: 0.0 }, // 0 = use uChannel, 1 = use uChannel2
          uPaletteStops: { value: 5.0 },
          uPalette: {
            value: [
              new THREE.Vector3(0, 0, 0),
              new THREE.Vector3(1, 1, 1),
              new THREE.Vector3(1, 1, 1),
              new THREE.Vector3(1, 1, 1),
              new THREE.Vector3(1, 1, 1),
              new THREE.Vector3(1, 1, 1),
              new THREE.Vector3(1, 1, 1),
              new THREE.Vector3(1, 1, 1),
            ],
          },
          uShowHalo: { value: 0.0 },
          uTime: { value: 0.0 },
          uMaxAge: { value: MAX_AGE },
          uBHHighlight: { value: 1.0 },
          uSpeedMax: { value: 30.0 },
          uDoppler: { value: 0.0 },
          uKindTints: { value: new Array(NUM_KINDS * 3).fill(1.0) },
          uFollowUV: { value: new THREE.Vector2(-1.0, -1.0) },
          uFollowPulse: { value: 0.0 },
        },
        vertexShader: pointVert,
        fragmentShader: pointFrag,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        depthTest: false,
      });

      const bodies = new THREE.Points(refGeom, pointMat);
      bodies.frustumCulled = false;
      scene.add(bodies);

      // ---- Photon ring  (scene-scoped; off by default) ----
      // Flat annulus in the disk plane (XZ).  Procedural glow: gaussian falloff
      // from a target radius, with a thin bright core for the "EHT" look.
      const ringMat = new THREE.ShaderMaterial({
        uniforms: {
          uRadius: { value: 12.0 },
          uThickness: { value: 1.5 },
          uColor: { value: new THREE.Color(1.15, 1.1, 1.05) },
          uOpacity: { value: 0.0 },
          uCoreBoost: { value: 0.8 },
        },
        vertexShader: `
          varying vec2 vLocal;
          void main() {
            vLocal = position.xy;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float uRadius;
          uniform float uThickness;
          uniform vec3  uColor;
          uniform float uOpacity;
          uniform float uCoreBoost;
          varying vec2 vLocal;
          void main() {
            float d = length(vLocal);
            float dOff = abs(d - uRadius);
            float x = dOff / max(uThickness, 0.001);
            // Wide gaussian halo + narrow sharp core
            float halo = exp(-x * x);
            float core = exp(-(x * 3.0) * (x * 3.0)) * uCoreBoost;
            float intensity = (halo + core) * uOpacity;
            if (intensity < 0.002) discard;
            gl_FragColor = vec4(uColor * intensity * 1.25, intensity);
          }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        depthTest: false,
        side: THREE.DoubleSide,
      });
      // Ample padding so the gaussian halo doesn't get clipped
      const ringGeom = new THREE.PlaneGeometry(1, 1);
      const photonRing = new THREE.Mesh(ringGeom, ringMat);
      photonRing.rotation.x = -Math.PI / 2; // lay flat in XZ
      photonRing.frustumCulled = false;
      photonRing.visible = false;
      scene.add(photonRing);

      function setPhotonRing(cfg) {
        if (!cfg) {
          photonRing.visible = false;
          ringMat.uniforms.uOpacity.value = 0.0;
          return;
        }
        photonRing.visible = true;
        ringMat.uniforms.uRadius.value = cfg.radius;
        ringMat.uniforms.uThickness.value = cfg.thickness ?? 1.5;
        if (cfg.color)
          ringMat.uniforms.uColor.value.setRGB(
            cfg.color[0],
            cfg.color[1],
            cfg.color[2],
          );
        ringMat.uniforms.uCoreBoost.value = cfg.coreBoost ?? 0.8;
        ringMat.uniforms.uOpacity.value = cfg.opacity ?? 1.0;
        const span = 2 * (cfg.radius + (cfg.thickness ?? 1.5) * 5);
        photonRing.scale.set(span, span, 1);
      }

      // Static lens parameters (radii, center) — set on scene apply.  Strength
      // uniform is lerped separately during transitions and updated live in loop.
      const lensState = {
        center: new THREE.Vector3(),
        einstein: 0.08,
        shadow: 0.04,
        targetStrength: 0.0,
        active: false,
      };
      function setLensStatic(cfg) {
        if (!cfg) {
          lensState.active = false;
          lensState.targetStrength = 0.0;
          return;
        }
        lensState.active = true;
        lensState.center.fromArray(cfg.center || [0, 0, 0]);
        lensState.einstein = cfg.einstein ?? 0.08;
        lensState.shadow = cfg.shadow ?? 0.04;
        lensState.targetStrength = cfg.strength ?? 1.0;
        lensPass.uniforms.uEinstein.value = lensState.einstein;
        lensPass.uniforms.uShadow.value = lensState.shadow;
      }
      const _lensProjVec = new THREE.Vector3();
      function updateLensProjection() {
        if (!lensState.active) {
          lensPass.enabled = false;
          return;
        }
        // Project lens center to screen UV every frame (camera moves)
        _lensProjVec.copy(lensState.center).project(camera);
        // Behind camera or off-screen-far: disable to avoid sampling garbage
        if (_lensProjVec.z > 1 || _lensProjVec.z < -1) {
          lensPass.enabled = false;
          return;
        }
        lensPass.enabled = lensPass.uniforms.uStrength.value > 0.001;
        lensPass.uniforms.uBHScreen.value.set(
          (_lensProjVec.x + 1) * 0.5,
          (_lensProjVec.y + 1) * 0.5,
        );
        lensPass.uniforms.uAspect.value = innerWidth / innerHeight;
      }

      // ===============================================================
      // 6b. MUSIC PLAYER  (SSI tracks, HTML5 Audio)
      // ===============================================================
      const TRACKS = [
        { title: "Adjoining Room", file: "ssi_tracks/Adjoining Room.mp3" },
        { title: "After the Bowl", file: "ssi_tracks/After the Bowl.mp3" },
        { title: "Almost Hum", file: "ssi_tracks/Almost Hum.mp3" },
        { title: "Before the Cloth", file: "ssi_tracks/Before the Cloth.mp3" },
        {
          title: "Between the Stars",
          file: "ssi_tracks/Between the Stars.mp3",
        },
        { title: "Bough Bend", file: "ssi_tracks/Bough-Bend.mp3" },
        { title: "Cathedral, Small", file: "ssi_tracks/Cathedral, Small.mp3" },
        { title: "Chapel Stone", file: "ssi_tracks/Chapel Stone.mp3" },
        { title: "Day's Rim", file: "ssi_tracks/Day's Rim.mp3" },
        { title: "Drift", file: "ssi_tracks/Drift.mp3" },
        { title: "Eddy", file: "ssi_tracks/Eddy.mp3" },
        { title: "Filament", file: "ssi_tracks/Filament.mp3" },
        { title: "First Kindling", file: "ssi_tracks/First Kindling.mp3" },
        { title: "Gathered", file: "ssi_tracks/Gathered.mp3" },
        { title: "Hairline", file: "ssi_tracks/Hairline.mp3" },
        { title: "Held In", file: "ssi_tracks/Held In.mp3" },
        { title: "Interior", file: "ssi_tracks/Interior.mp3" },
        { title: "Inwards", file: "ssi_tracks/Inwards.mp3" },
        { title: "Lamplighter", file: "ssi_tracks/Lamplighter.mp3" },
        { title: "Lid Closing", file: "ssi_tracks/Lid Closing.mp3" },
        { title: "Lid Settling", file: "ssi_tracks/Lid Settling.mp3" },
        { title: "Limb Yield", file: "ssi_tracks/Limb Yield.mp3" },
        { title: "Long Exhale", file: "ssi_tracks/Long Exhale.mp3" },
        { title: "Long Shadow", file: "ssi_tracks/Long Shadow.mp3" },
        { title: "Longer Shadow", file: "ssi_tracks/Longer Shadow.mp3" },
        { title: "Muffled Tick", file: "ssi_tracks/Muffled Tick.mp3" },
        { title: "One Line", file: "ssi_tracks/One Line.mp3" },
        {
          title: "Past the Threshold",
          file: "ssi_tracks/Past the Threshold.mp3",
        },
        { title: "Quiet Drone", file: "ssi_tracks/Quiet Drone.mp3" },
        { title: "Quiet Front", file: "ssi_tracks/Quiet Front.mp3" },
        { title: "Slow Weather", file: "ssi_tracks/Slow Weather.mp3" },
        { title: "Small Fault", file: "ssi_tracks/Small Fault.mp3" },
        { title: "The Edge of Day", file: "ssi_tracks/The Edge of Day.mp3" },
        { title: "The Hold", file: "ssi_tracks/The Hold.mp3" },
        { title: "The Lip", file: "ssi_tracks/The Lip.mp3" },
        { title: "The Pair", file: "ssi_tracks/The Pair.mp3" },
        { title: "The Rim", file: "ssi_tracks/The Rim.mp3" },
        { title: "The Sisters", file: "ssi_tracks/The Sisters.mp3" },
        { title: "The Sustain", file: "ssi_tracks/The Sustain.mp3" },
        { title: "Thread", file: "ssi_tracks/Thread.mp3" },
        { title: "Threshold Again", file: "ssi_tracks/Threshold Again.mp3" },
        { title: "Tinder", file: "ssi_tracks/Tinder.mp3" },
        { title: "Two Rooms", file: "ssi_tracks/Two Rooms.mp3" },
        { title: "Wick", file: "ssi_tracks/Wick.mp3" },
        { title: "Wrapped Tick", file: "ssi_tracks/Wrapped Tick.mp3" },
        {
          title: "Written Behind the Stars",
          file: "ssi_tracks/Written Behind the Stars.mp3",
        },
      ];

      const music = (() => {
        const audio = new Audio();
        audio.preload = "metadata";
        const state = {
          index: 0,
          shuffle: true,
          shuffleOrder: [],
          shufflePos: 0,
          loadedOnce: false,
        };
        const savedVol = parseFloat(localStorage.getItem("universe-music-vol"));
        audio.volume = isFinite(savedVol) ? savedVol : 0.55;
        const savedIdx = parseInt(localStorage.getItem("universe-music-idx"));
        if (isFinite(savedIdx) && savedIdx >= 0 && savedIdx < TRACKS.length) {
          state.index = savedIdx;
        }
        const savedShuf = localStorage.getItem("universe-music-shuf");
        if (savedShuf !== null) state.shuffle = savedShuf === "1";

        function makeShuffleOrder(startAt) {
          const arr = [...Array(TRACKS.length).keys()];
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
          // Move the requested index to position 0 so the current track stays current
          const p = arr.indexOf(startAt);
          if (p >= 0) [arr[0], arr[p]] = [arr[p], arr[0]];
          return arr;
        }
        state.shuffleOrder = makeShuffleOrder(state.index);

        function load(idx, autoplay) {
          state.index = idx;
          audio.src = encodeURI(TRACKS[idx].file);
          state.loadedOnce = true;
          localStorage.setItem("universe-music-idx", String(idx));
          if (autoplay) {
            const p = audio.play();
            if (p && p.catch) p.catch(() => {});
          }
        }

        function next() {
          if (state.shuffle) {
            state.shufflePos =
              (state.shufflePos + 1) % state.shuffleOrder.length;
            load(state.shuffleOrder[state.shufflePos], true);
          } else {
            load((state.index + 1) % TRACKS.length, true);
          }
        }
        function prev() {
          if (state.shuffle) {
            state.shufflePos =
              (state.shufflePos - 1 + state.shuffleOrder.length) %
              state.shuffleOrder.length;
            load(state.shuffleOrder[state.shufflePos], true);
          } else {
            load((state.index - 1 + TRACKS.length) % TRACKS.length, true);
          }
        }
        function playPause() {
          if (audio.paused) {
            const p = audio.play();
            if (p && p.catch) p.catch(() => {});
          } else audio.pause();
        }
        function setVolume(v) {
          audio.volume = clamp(v, 0, 1);
          localStorage.setItem("universe-music-vol", String(audio.volume));
        }
        function seek(frac) {
          if (audio.duration && isFinite(audio.duration)) {
            audio.currentTime = audio.duration * clamp(frac, 0, 1);
          }
        }
        function setShuffle(v) {
          state.shuffle = !!v;
          localStorage.setItem(
            "universe-music-shuf",
            state.shuffle ? "1" : "0",
          );
          if (state.shuffle) {
            state.shuffleOrder = makeShuffleOrder(state.index);
            state.shufflePos = 0;
          }
        }

        audio.addEventListener("ended", () => next());

        // Reflect playback state on the rail button
        const reflectRail = () => {
          const btn = document.querySelector('.rail-btn[data-id="music"]');
          if (btn) btn.classList.toggle("ambient", !audio.paused);
        };
        audio.addEventListener("play", reflectRail);
        audio.addEventListener("pause", reflectRail);

        // Try autoplay on boot. Browsers may block until the first user
        // gesture — if so, unlock on the first pointerdown/keydown.
        load(state.index, true);
        const unlockAudio = () => {
          if (audio.paused) {
            const p = audio.play();
            if (p && p.catch) p.catch(() => {});
          }
        };
        window.addEventListener("pointerdown", unlockAudio, { once: true });
        window.addEventListener("keydown", unlockAudio, { once: true });

        return {
          audio,
          get index() {
            return state.index;
          },
          get shuffle() {
            return state.shuffle;
          },
          get playing() {
            return !audio.paused;
          },
          get time() {
            return audio.currentTime || 0;
          },
          get duration() {
            return audio.duration || 0;
          },
          get volume() {
            return audio.volume;
          },
          load,
          next,
          prev,
          playPause,
          setVolume,
          seek,
          setShuffle,
        };
      })();

      // ===============================================================
      // 6b2. AUDIO-REACTIVE ANALYSIS  (cheap FFT on music.audio)
      // ===============================================================
      // Exposes audioReact.energy (low-band RMS, 0..1) and audioReact.onset
      // (one-frame pulse on a detected transient). Consumed by the cinematic
      // director: energy scales bloom breathing amp; onset accelerates
      // mood/accent cooldown countdowns so beats land near director fires.
      const audioReact = (() => {
        let ctx = null,
          analyser = null,
          sourceNode = null,
          freqBuf = null,
          prevFreqs = null;
        let fluxMean = 0,
          refractory = 0;
        let energy = 0,
          onset = false;

        function ensure() {
          if (ctx) {
            if (ctx.state === "suspended") ctx.resume().catch(() => {});
            return;
          }
          try {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;
            ctx = new AC();
            sourceNode = ctx.createMediaElementSource(music.audio);
            analyser = ctx.createAnalyser();
            analyser.fftSize = 512;
            analyser.smoothingTimeConstant = 0.3;
            sourceNode.connect(analyser);
            analyser.connect(ctx.destination);
            freqBuf = new Uint8Array(analyser.frequencyBinCount);
            prevFreqs = new Uint8Array(analyser.frequencyBinCount);
          } catch (_) {
            // createMediaElementSource can throw (e.g., tainted CORS, or
            // already-connected on a hot reload). Fall back to silence —
            // the director just gets energy=0 / onset=false forever.
            ctx = null;
            analyser = null;
            sourceNode = null;
          }
        }

        function tick(realDt) {
          onset = false;
          if (!analyser) {
            energy = 0;
            return;
          }
          analyser.getByteFrequencyData(freqBuf);

          // Low-band RMS (bins 1..8 ≈ 86–688 Hz at 44.1 kHz).
          let sumSq = 0;
          const loEnd = Math.min(8, freqBuf.length);
          for (let i = 1; i < loEnd; i++) {
            const v = freqBuf[i] / 255;
            sumSq += v * v;
          }
          energy = Math.sqrt(sumSq / Math.max(1, loEnd - 1));

          // Spectral flux across the full band (sum of positive deltas).
          let flux = 0;
          for (let i = 0; i < freqBuf.length; i++) {
            const d = freqBuf[i] - prevFreqs[i];
            if (d > 0) flux += d;
            prevFreqs[i] = freqBuf[i];
          }
          flux /= freqBuf.length; // normalize to 0..255-ish per bin

          // Running mean — EMA with short memory.
          fluxMean = fluxMean * 0.92 + flux * 0.08;

          if (refractory > 0) refractory = Math.max(0, refractory - realDt);
          // Peak if flux spikes above running mean and clears an absolute
          // floor (silence has tiny but noisy flux we don't want to chase).
          if (refractory === 0 && flux > fluxMean * 1.6 && flux > 2.0) {
            onset = true;
            refractory = 0.14; // ~140 ms — debounces double-trigger on a beat
          }
        }

        return {
          get energy() {
            return energy;
          },
          get onset() {
            return onset;
          },
          ensure,
          tick,
        };
      })();

      // Wire audio-react to actual playback. The `play` event only fires
      // after a user gesture has satisfied the autoplay policy, so the
      // AudioContext we create here is guaranteed to be allowed to run.
      music.audio.addEventListener("play", () => audioReact.ensure());

      // ===============================================================
      // 6c. SFX PLAYER  (clone-and-play so rapid fires don't cut off)
      // ===============================================================
      // Event mapping (see CINEMATIC_MODES.md §observability):
      //   transition — cinematic scene transition starts
      //   accent     — director fires a physics accent
      //   lock       — follow-cam attaches to a body
      //   click      — export PNG/JSON
      const SFX_FILES = {
        transition: "sfx/transition.mp3",
        accent: "sfx/accent.mp3",
        lock: "sfx/lock.mp3",
        click: "sfx/click.mp3",
      };
      const sfx = (() => {
        const templates = {};
        for (const k of Object.keys(SFX_FILES)) {
          const a = new Audio();
          a.preload = "auto";
          a.src = SFX_FILES[k];
          templates[k] = a;
        }
        const savedVol = parseFloat(localStorage.getItem("universe-sfx-vol"));
        const savedEn = localStorage.getItem("universe-sfx-en");
        const state = {
          volume: isFinite(savedVol) ? savedVol : 0.3,
          enabled: savedEn === null ? true : savedEn === "1",
        };
        function play(name) {
          if (!state.enabled) return;
          if (document.hidden) return;
          const tpl = templates[name];
          if (!tpl) return;
          const n = tpl.cloneNode();
          n.volume = state.volume;
          const p = n.play();
          if (p && p.catch) p.catch(() => {});
        }
        function setVolume(v) {
          state.volume = Math.max(0, Math.min(1, v));
          localStorage.setItem("universe-sfx-vol", String(state.volume));
        }
        function setEnabled(e) {
          state.enabled = !!e;
          localStorage.setItem("universe-sfx-en", state.enabled ? "1" : "0");
        }
        return {
          play,
          setVolume,
          setEnabled,
          get volume() {
            return state.volume;
          },
          get enabled() {
            return state.enabled;
          },
        };
      })();

      // ===============================================================
      // 7. POST-PROCESSING (bloom + CA + vignette + grain)
      // ===============================================================
      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));

      // ---- Gravitational lensing (scene-scoped; off by default) ----
      // Screen-space point-mass lens: β = θ·(1 - θ_E²/|θ|²), with photon-sphere
      // shadow inside r_shadow and magnification ∝ 1/|1 - θ_E⁴/|θ|⁴|.
      // Sits before bloom so the Einstein ring gets bloomed after it forms.
      const lensPass = new ShaderPass({
        uniforms: {
          tDiffuse: { value: null },
          uBHScreen: { value: new THREE.Vector2(0.5, 0.5) },
          uEinstein: { value: 0.08 },
          uShadow: { value: 0.04 },
          uStrength: { value: 0.0 },
          uAspect: { value: 1.0 },
        },
        vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }`,
        fragmentShader: `
          uniform sampler2D tDiffuse;
          uniform vec2  uBHScreen;
          uniform float uEinstein;
          uniform float uShadow;
          uniform float uStrength;
          uniform float uAspect;
          varying vec2 vUv;
          void main() {
            vec4 original = texture2D(tDiffuse, vUv);
            if (uStrength < 0.001) { gl_FragColor = original; return; }

            // Aspect-corrected coords: screen distance in "height-units"
            vec2 d = vec2((vUv.x - uBHScreen.x) * uAspect, vUv.y - uBHScreen.y);
            float r2 = dot(d, d);
            float r  = sqrt(r2);

            // Event horizon shadow: pure black disk (blend with original by strength)
            if (r < uShadow) {
              gl_FragColor = mix(original, vec4(0.0, 0.0, 0.0, 1.0), uStrength);
              return;
            }

            // Point-mass lens equation: β = θ · (1 - θ_E² / |θ|²)
            float tE2 = uEinstein * uEinstein;
            vec2 beta = d * (1.0 - tE2 / r2);

            // Back to UV
            vec2 uvSample = uBHScreen + vec2(beta.x / uAspect, beta.y);
            vec2 clamped = clamp(uvSample, vec2(0.0), vec2(1.0));
            vec4 lensed = texture2D(tDiffuse, clamped);

            // Magnification: μ = 1 / |det(∂β/∂θ)| = 1 / |1 - θ_E⁴ / |θ|⁴|
            // Capped so the Einstein ring doesn't blow up to infinity.
            float t4 = tE2 * tE2;
            float invDet = abs(1.0 - t4 / (r2 * r2));
            float mag = clamp(1.0 / max(invDet, 0.04), 1.0, 5.5);
            lensed.rgb *= mag;

            gl_FragColor = mix(original, lensed, uStrength);
          }
        `,
      });
      lensPass.enabled = false;
      composer.addPass(lensPass);

      const bloom = new UnrealBloomPass(
        new THREE.Vector2(innerWidth, innerHeight),
        0.9,
        0.6,
        0.0,
      );
      composer.addPass(bloom);

      // Accumulation trails (persistence-of-vision).  Sits after bloom so
      // trails carry their original glow as they fade.  `damp` = 0 disables.
      const trailsPass = new AfterimagePass(0.0);
      composer.addPass(trailsPass);
      function clearTrails() {
        // AfterimagePass r160 uses `textureOld` + `textureComp`; defensively
        // find any WebGLRenderTarget property and clear it.
        const prev = renderer.getRenderTarget();
        for (const k of Object.keys(trailsPass)) {
          const v = trailsPass[k];
          if (v && v.isWebGLRenderTarget) {
            renderer.setRenderTarget(v);
            renderer.clear(true, false, false);
          }
        }
        renderer.setRenderTarget(prev);
      }

      // Chromatic aberration (radial RGB offset)
      const caPass = new ShaderPass({
        uniforms: {
          tDiffuse: { value: null },
          uAmount: { value: 0.0 },
          uResolution: { value: new THREE.Vector2(innerWidth, innerHeight) },
        },
        vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }`,
        fragmentShader: `
          uniform sampler2D tDiffuse;
          uniform float uAmount;
          uniform vec2 uResolution;
          varying vec2 vUv;
          void main() {
            vec2 c = vUv - 0.5;
            float d = length(c);
            vec2 dir = c / max(d, 0.0001);
            float scale = uAmount * d * d;
            vec2 offR = dir * scale * 1.4;
            vec2 offB = dir * scale * -1.4;
            float r = texture2D(tDiffuse, vUv + offR).r;
            float g = texture2D(tDiffuse, vUv).g;
            float b = texture2D(tDiffuse, vUv + offB).b;
            float a = texture2D(tDiffuse, vUv).a;
            gl_FragColor = vec4(r, g, b, a);
          }
        `,
      });
      composer.addPass(caPass);

      // Vignette + film grain in one pass
      const vigGrainPass = new ShaderPass({
        uniforms: {
          tDiffuse: { value: null },
          uVignette: { value: 0.35 },
          uGrain: { value: 0.04 },
          uTime: { value: 0.0 },
        },
        vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }`,
        fragmentShader: `
          uniform sampler2D tDiffuse;
          uniform float uVignette;
          uniform float uGrain;
          uniform float uTime;
          varying vec2 vUv;
          float hash(vec2 p) {
            return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
          }
          void main() {
            vec4 col = texture2D(tDiffuse, vUv);
            // Vignette: soft darkening at corners
            vec2 c = vUv - 0.5;
            float d = dot(c, c);
            float vig = 1.0 - smoothstep(0.25, 0.85, d) * uVignette;
            col.rgb *= vig;
            // Animated film grain
            float n = hash(vUv * vec2(1920.0, 1080.0) + uTime * 11.17) - 0.5;
            col.rgb += n * uGrain;
            gl_FragColor = col;
          }
        `,
      });
      composer.addPass(vigGrainPass);

      composer.addPass(new OutputPass());

      function setPostParams(post) {
        if (post.bloom !== undefined) bloom.strength = post.bloom;
        if (post.bloomRadius !== undefined) bloom.radius = post.bloomRadius;
        if (post.exposure !== undefined)
          renderer.toneMappingExposure = post.exposure;
        if (post.ca !== undefined) caPass.uniforms.uAmount.value = post.ca;
        if (post.vignette !== undefined)
          vigGrainPass.uniforms.uVignette.value = post.vignette;
        if (post.grain !== undefined)
          vigGrainPass.uniforms.uGrain.value = post.grain;
        if (post.trail !== undefined) {
          trailsPass.uniforms.damp.value = post.trail;
          trailsPass.enabled = post.trail > 0.001;
        }
      }
      function snapshotPost() {
        return {
          bloom: bloom.strength,
          bloomRadius: bloom.radius,
          exposure: renderer.toneMappingExposure,
          ca: caPass.uniforms.uAmount.value,
          vignette: vigGrainPass.uniforms.uVignette.value,
          grain: vigGrainPass.uniforms.uGrain.value,
          trail: trailsPass.uniforms.damp.value,
        };
      }
      function lerpPost(a, b, t) {
        return {
          bloom: lerp(a.bloom, b.bloom, t),
          bloomRadius: lerp(a.bloomRadius, b.bloomRadius, t),
          exposure: lerp(a.exposure, b.exposure, t),
          ca: lerp(a.ca, b.ca, t),
          vignette: lerp(a.vignette, b.vignette, t),
          grain: lerp(a.grain, b.grain, t),
          trail: lerp(a.trail ?? 0, b.trail ?? 0, t),
        };
      }

      // ===============================================================
      // 8. PALETTES  (8 stops max, 3-channel RGB, linear-space-ish)
      // ===============================================================
      const PALETTES = {
        ice: [
          [0.02, 0.03, 0.08],
          [0.05, 0.14, 0.45],
          [0.22, 0.55, 1.0],
          [0.72, 0.92, 1.1],
          [1.1, 1.15, 1.2],
        ],
        ember: [
          [0.0, 0.0, 0.0],
          [0.12, 0.02, 0.04],
          [0.55, 0.08, 0.04],
          [1.1, 0.35, 0.08],
          [1.3, 0.85, 0.3],
          [1.2, 1.15, 1.0],
        ],
        aurora: [
          [0.01, 0.04, 0.06],
          [0.0, 0.28, 0.22],
          [0.15, 0.85, 0.62],
          [0.6, 1.05, 0.8],
          [0.95, 0.65, 1.2],
        ],
        nebula: [
          [0.0, 0.01, 0.08],
          [0.18, 0.04, 0.32],
          [0.72, 0.1, 0.5],
          [1.1, 0.32, 0.55],
          [1.15, 0.85, 0.7],
        ],
        mono: [
          [0.0, 0.0, 0.0],
          [0.22, 0.22, 0.22],
          [0.55, 0.55, 0.55],
          [0.9, 0.9, 0.9],
          [1.15, 1.15, 1.18],
        ],
        sunset: [
          [0.02, 0.03, 0.12],
          [0.25, 0.04, 0.28],
          [0.8, 0.2, 0.45],
          [1.15, 0.55, 0.22],
          [1.2, 0.95, 0.48],
          [1.15, 1.1, 0.8],
        ],
        bone: [
          [0.0, 0.0, 0.0],
          [0.012, 0.034, 0.06],
          [0.06, 0.14, 0.22],
          [0.28, 0.52, 0.68],
          [0.95, 1.02, 1.1],
          [1.3, 1.22, 1.12],
        ],
        vaporwv: [
          [0.02, 0.0, 0.08],
          [0.14, 0.02, 0.28],
          [0.95, 0.22, 0.58],
          [0.35, 1.0, 0.85],
          [1.05, 0.98, 1.1],
        ],
      };

      function applyPalette(name) {
        const stops = PALETTES[name] || PALETTES.ice;
        const arr = pointMat.uniforms.uPalette.value;
        for (let i = 0; i < 8; i++) {
          const s = stops[Math.min(i, stops.length - 1)];
          arr[i].set(s[0], s[1], s[2]);
        }
        pointMat.uniforms.uPaletteStops.value = stops.length;
      }

      const CHANNELS = {
        mass: 0.0,
        speed: 1.0,
        kind: 2.0,
        density: 3.0,
        age: 4.0,
      };

      // ===============================================================
      // 9. INTERACTION MATRICES (per-scene)  K[a*7+b]
      //    kinds: 0 star, 1 planet, 2 BH, 3 dust, 4 halo, 5 galA-star, 6 galB-star
      // ===============================================================
      function makeK(overrides) {
        const k = new Array(NUM_KINDS * NUM_KINDS).fill(1.0);
        if (overrides) {
          for (const [aStr, row] of Object.entries(overrides)) {
            const a = +aStr;
            for (const [bStr, v] of Object.entries(row)) {
              k[a * NUM_KINDS + +bStr] = v;
            }
          }
        }
        return k;
      }
      const K_PRESETS = {
        neutral: makeK(),
        // dust pushes dust apart, heavy (BH) bonds to dust
        dustStorm: makeK({
          3: { 3: 0.35 },
          2: { 3: 1.7 },
        }),
        // heavy radiation regime — symmetric but slightly destabilising
        radiating: makeK({
          3: { 3: 0.25 },
          0: { 0: 0.92 },
        }),
        // halo weakly couples to visible (dark-matter ignores light slightly)
        haloIgnores: makeK({
          4: { 0: 0.85, 5: 0.85, 6: 0.85 },
          0: { 4: 0.85 },
          5: { 4: 0.85 },
          6: { 4: 0.85 },
        }),
        // collision: galaxy A/B treat each other normally; dust weakly
        collision: makeK({
          3: { 3: 0.5 },
          4: { 0: 0.9, 5: 0.9, 6: 0.9 },
        }),
        // lattice: slight repulsion between dust-kind nodes; stars and heavy bodies are normal
        lattice: makeK({
          0: { 0: 0.82 },
          3: { 3: 0.4 },
        }),
        // horsehead: minimal gravitational coupling — scene is mostly static
        // visually. Curl-noise drives motion, radiation erodes edges slowly.
        horsehead: makeK({
          0: { 0: 0.08, 3: 0.05 },
          3: { 0: 0.05, 3: 0.4 },
        }),
      };

      function uploadK(kArr) {
        const u = velVar.material.uniforms.uK.value;
        for (let i = 0; i < u.length; i++) u[i] = kArr[i];
      }
      function kSnapshot() {
        return velVar.material.uniforms.uK.value.slice();
      }
      function lerpK(a, b, t) {
        const out = new Array(a.length);
        for (let i = 0; i < a.length; i++) out[i] = a[i] + (b[i] - a[i]) * t;
        return out;
      }

      // ===============================================================
      // 10. KIND TINTS  — lets scenes colour galaxy-A vs galaxy-B subtly
      //     even when the palette channel is not "kind".
      // ===============================================================
      const TINT_NEUTRAL = (() => {
        const t = new Array(NUM_KINDS * 3).fill(1.0);
        return t;
      })();
      const TINT_GALAXY = (() => {
        const t = TINT_NEUTRAL.slice();
        // kind 5 (A) cooler, kind 6 (B) warmer
        t[5 * 3 + 0] = 0.85;
        t[5 * 3 + 1] = 1.02;
        t[5 * 3 + 2] = 1.28;
        t[6 * 3 + 0] = 1.28;
        t[6 * 3 + 1] = 0.9;
        t[6 * 3 + 2] = 1.05;
        return t;
      })();

      // Milky Way tint — bulge (kind 5) reads warm gold, disk (kind 0) stays
      // slightly cool so the arms feel blue-white against the core.  Dust
      // (kind 3) is sepia-darkened; halo (kind 4) is faded neutral.
      const TINT_MILKYWAY = (() => {
        const t = TINT_NEUTRAL.slice();
        // kind 0 — disk stars: slight blue-white bias
        t[0 * 3 + 0] = 0.92;
        t[0 * 3 + 1] = 0.98;
        t[0 * 3 + 2] = 1.12;
        // kind 3 — dust lanes: sepia, darker
        t[3 * 3 + 0] = 0.85;
        t[3 * 3 + 1] = 0.62;
        t[3 * 3 + 2] = 0.42;
        // kind 4 — halo: faded warm-neutral
        t[4 * 3 + 0] = 1.02;
        t[4 * 3 + 1] = 0.98;
        t[4 * 3 + 2] = 0.85;
        // kind 5 — bulge/bar: warm gold
        t[5 * 3 + 0] = 1.32;
        t[5 * 3 + 1] = 0.94;
        t[5 * 3 + 2] = 0.58;
        return t;
      })();

      function applyKindTints(tintArr) {
        const u = pointMat.uniforms.uKindTints.value;
        for (let i = 0; i < u.length; i++) u[i] = tintArr[i];
      }

      // ===============================================================
      // 11. BODY STATE + HELPERS
      // ===============================================================
      const state = {
        positions: new Float32Array(MAX_BODIES * 4),
        velocities: new Float32Array(MAX_BODIES * 4),
        count: 0,
      };
      function zero() {
        state.positions.fill(0);
        state.velocities.fill(0);
        state.count = 0;
      }
      function setBody(i, x, y, z, m, vx, vy, vz, kind) {
        state.positions[i * 4 + 0] = x;
        state.positions[i * 4 + 1] = y;
        state.positions[i * 4 + 2] = z;
        state.positions[i * 4 + 3] = m;
        state.velocities[i * 4 + 0] = vx;
        state.velocities[i * 4 + 1] = vy;
        state.velocities[i * 4 + 2] = vz;
        state.velocities[i * 4 + 3] = kind;
      }
      // Seeded PRNG (mulberry32). Scene factories draw from this, so the
      // same seed + scene key regenerates identical initial bodies. Cosmetic
      // per-frame jitter (camera drift, cinematic phases) still uses
      // Math.random() and stays non-deterministic.
      let _rngState = (Math.random() * 0xffffffff) | 0;
      let _currentSeed = _rngState >>> 0;
      function seedRng(n) {
        _rngState = n | 0;
        _currentSeed = n >>> 0;
      }
      function currentSeed() {
        return _currentSeed;
      }
      function rng() {
        let t = (_rngState += 0x6d2b79f5) | 0;
        t = Math.imul(t ^ (t >>> 15), 1 | t);
        t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      }
      function randn() {
        let u = 0,
          v = 0;
        while (u === 0) u = rng();
        while (v === 0) v = rng();
        return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
      }

      // Curl-noise: divergence-free 3D velocity field sampled via Perlin-ish analytic gradients.
      // Cheap, fast, deterministic per-seed.
      function makeCurlNoise(seed = 1.0) {
        const a = seed * 1.4142,
          b = seed * 2.7182,
          c = seed * 3.1415;
        const pot = (x, y, z, s) =>
          Math.sin(x * 0.021 + s * a) * Math.cos(y * 0.019 + s * b) +
          Math.sin(y * 0.025 + s * b) * Math.cos(z * 0.017 + s * c) +
          Math.sin(z * 0.023 + s * c) * Math.cos(x * 0.02 + s * a);
        const eps = 0.7;
        return (x, y, z) => {
          const P = (px, py, pz, s) => pot(px, py, pz, s);
          // ∇×(P1, P2, P3) for three scalar potentials gives divergence-free field
          const dP1dy =
            (P(x, y + eps, z, 0.3) - P(x, y - eps, z, 0.3)) / (2 * eps);
          const dP1dz =
            (P(x, y, z + eps, 0.3) - P(x, y, z - eps, 0.3)) / (2 * eps);
          const dP2dx =
            (P(x + eps, y, z, 0.7) - P(x - eps, y, z, 0.7)) / (2 * eps);
          const dP2dz =
            (P(x, y, z + eps, 0.7) - P(x, y, z - eps, 0.7)) / (2 * eps);
          const dP3dx =
            (P(x + eps, y, z, 1.3) - P(x - eps, y, z, 1.3)) / (2 * eps);
          const dP3dy =
            (P(x, y + eps, z, 1.3) - P(x, y - eps, z, 1.3)) / (2 * eps);
          return [dP3dy - dP2dz, dP1dz - dP3dx, dP2dx - dP1dy];
        };
      }

      function makeSpiralGalaxyCore(
        cx,
        cy,
        cz,
        vx,
        vy,
        vz,
        nBodies,
        radius,
        bhMass,
        startIdx,
        spinSign = 1,
      ) {
        setBody(startIdx, cx, cy, cz, bhMass, vx, vy, vz, 2.0);
        let i = startIdx + 1;
        const diskN = nBodies - 1;
        for (let k = 0; k < diskN; k++) {
          const r = radius * Math.sqrt(-Math.log(rng())) * 0.5;
          const rr = Math.min(r, radius);
          const phi = rng() * 2 * Math.PI;
          const zJitter = randn() * radius * 0.02 * (1.0 - rr / radius);
          const x = cx + rr * Math.cos(phi);
          const y = cy + zJitter;
          const z = cz + rr * Math.sin(phi);
          const mEnc = bhMass + diskN * 1.0 * Math.min(1.0, rr / radius);
          const v = Math.sqrt(mEnc / Math.max(rr, 0.5));
          const tx = -Math.sin(phi) * spinSign;
          const tz = Math.cos(phi) * spinSign;
          const disp = 0.03 * v;
          setBody(
            i,
            x,
            y,
            z,
            1.0 + rng() * 2.5,
            vx + tx * v + randn() * disp,
            vy + randn() * disp * 0.3,
            vz + tz * v + randn() * disp,
            rng() < 0.05 ? 3.0 : 0.0,
          );
          i++;
        }
        return i;
      }

      function buildGalaxy(
        startIdx,
        budget,
        cx,
        cy,
        cz,
        cvx,
        cvy,
        cvz,
        diskR,
        inclinationDeg,
        azimuthDeg,
        spinSign,
        totalMass,
        galaxyId,
      ) {
        const bhMass = totalMass * 0.15;
        const diskMass = totalMass * 0.15;
        const haloMass = totalMass * 0.7;
        const nAvail = budget - 1;
        const nStars = Math.max(64, Math.floor(nAvail * 0.6));
        const nHalo = nAvail - nStars;
        const perStar = diskMass / nStars;
        const perHalo = haloMass / nHalo;

        const inc = (inclinationDeg * Math.PI) / 180;
        const az = (azimuthDeg * Math.PI) / 180;
        const cI = Math.cos(inc),
          sI = Math.sin(inc);
        const cA = Math.cos(az),
          sA = Math.sin(az);
        const rotate = (x, y, z) => {
          const y1 = y * cI - z * sI;
          const z1 = y * sI + z * cI;
          const x2 = x * cA + z1 * sA;
          const z2 = -x * sA + z1 * cA;
          return [x2, y1, z2];
        };
        const starKind = galaxyId === 0 ? 5.0 : 6.0;

        let i = startIdx;
        setBody(i++, cx, cy, cz, bhMass, cvx, cvy, cvz, 2.0);

        const rd = diskR * 0.33;
        for (let k = 0; k < nStars; k++) {
          let r = -rd * Math.log(1 - rng() * 0.97);
          r = Math.min(r, diskR * 1.4);
          const phi = rng() * 2 * Math.PI;
          const zJit = randn() * diskR * 0.02;
          let lx = r * Math.cos(phi),
            ly = zJit,
            lz = r * Math.sin(phi);
          const mEnc =
            bhMass +
            diskMass * (1.0 - Math.exp(-r / rd) * (1 + r / rd)) +
            haloMass * Math.min(1.0, r / (diskR * 2.0));
          const vCirc = Math.sqrt(mEnc / Math.max(r, 0.5));
          let lvx = -Math.sin(phi) * vCirc * spinSign;
          let lvy = 0;
          let lvz = Math.cos(phi) * vCirc * spinSign;
          const disp = 0.04 * vCirc;
          lvx += randn() * disp;
          lvy += randn() * disp * 0.3;
          lvz += randn() * disp;
          const [x, y, z] = rotate(lx, ly, lz);
          const [vx, vy, vz] = rotate(lvx, lvy, lvz);
          setBody(
            i++,
            cx + x,
            cy + y,
            cz + z,
            perStar,
            cvx + vx,
            cvy + vy,
            cvz + vz,
            starKind,
          );
        }

        const rc = diskR * 0.5;
        const rMax = diskR * 3.0;
        const maxArg = Math.atan(rMax / rc);
        for (let k = 0; k < nHalo; k++) {
          const u = rng();
          const r = rc * Math.tan(u * maxArg);
          const dir = new THREE.Vector3(randn(), randn(), randn()).normalize();
          const sigma = Math.sqrt(totalMass / (6.0 * (r + rc)));
          const [x, y, z] = rotate(dir.x * r, dir.y * r, dir.z * r);
          setBody(
            i++,
            cx + x,
            cy + y,
            cz + z,
            perHalo,
            cvx + randn() * sigma,
            cvy + randn() * sigma,
            cvz + randn() * sigma,
            4.0,
          );
        }
        return i;
      }

      // ---- Shared scene primitives (used by multiple scenes) ----

      // Gaussian-distributed bulge-only "elliptical" — no disk, no halo.
      // Budget bodies starting at startIdx.  Returns end index.
      function makeElliptical(
        startIdx,
        budget,
        cx,
        cy,
        cz,
        cvx,
        cvy,
        cvz,
        radius,
        bhMass,
        kindVal = 0.0,
      ) {
        setBody(startIdx, cx, cy, cz, bhMass, cvx, cvy, cvz, 2.0);
        let i = startIdx + 1;
        const rest = budget - 1;
        for (let k = 0; k < rest; k++) {
          const dir = new THREE.Vector3(
            randn(),
            randn(),
            randn() * 0.7,
          ).normalize();
          const r = Math.abs(randn()) * radius;
          const px = cx + dir.x * r;
          const py = cy + dir.y * r;
          const pz = cz + dir.z * r;
          const sigma = Math.sqrt(bhMass / (6 * (r + radius * 0.3 + 1)));
          setBody(
            i++,
            px,
            py,
            pz,
            0.25 + rng() * 0.7,
            cvx + randn() * sigma,
            cvy + randn() * sigma,
            cvz + randn() * sigma,
            kindVal,
          );
        }
        return i;
      }

      // Bipolar relativistic-ish jet along the ±Y axis of a BH at (cx, cy, cz).
      // Used by Event Horizon and Virgo M87 scenes.  Returns end index.
      function addBipolarJet(
        startIdx,
        cx,
        cy,
        cz,
        cvx,
        cvy,
        cvz,
        bhMass,
        opts = {},
      ) {
        const perSide = opts.perSide ?? 180;
        const rMin = opts.rMin ?? 4.0;
        const rMax = opts.rMax ?? 280.0;
        const e0 = opts.e0 ?? 80.0;
        const halfAngle = opts.halfAngle ?? 0.055;
        const twist = opts.twist ?? 0.18;
        const mMin = opts.mMin ?? 0.06;
        const mMax = opts.mMax ?? 0.18;
        let i = startIdx;
        for (let side = 0; side < 2; side++) {
          const ySign = side === 0 ? +1 : -1;
          for (let k = 0; k < perSide && i < MAX_BODIES; k++) {
            const u = Math.pow(rng(), 1.55);
            const r = rMin + u * (rMax - rMin);
            const coneAngle = rng() * 2 * Math.PI;
            const coneRad = halfAngle * r * Math.sqrt(rng());
            const cc = Math.cos(coneAngle);
            const sc = Math.sin(coneAngle);
            const x = cx + coneRad * cc;
            const z = cz + coneRad * sc;
            const y = cy + r * ySign;
            const vMag = Math.sqrt(2 * (e0 + bhMass / Math.max(r, 1.0)));
            let vx = 0.0;
            let vy = vMag * ySign;
            let vz = 0.0;
            const tx = -sc;
            const tz = cc;
            const vTwist = twist * vMag * (0.7 + rng() * 0.6);
            vx += tx * vTwist * ySign;
            vz += tz * vTwist * ySign;
            vx += randn() * vMag * 0.03;
            vz += randn() * vMag * 0.03;
            vy += randn() * vMag * 0.02;
            const mass = mMin + rng() * (mMax - mMin);
            setBody(i++, x, y, z, mass, cvx + vx, cvy + vy, cvz + vz, 0.0);
          }
        }
        return i;
      }

      // Isothermal halo cloud (kind 4) at a specified center + velocity — used
      // by the Bullet Cluster scene to offset halos from their stellar components.
      function addHaloCloud(
        startIdx,
        budget,
        cx,
        cy,
        cz,
        cvx,
        cvy,
        cvz,
        radius,
        totalMass,
      ) {
        let i = startIdx;
        const rc = radius * 0.4;
        const rMax = radius * 1.7;
        const maxArg = Math.atan(rMax / rc);
        const perBody = totalMass / Math.max(budget, 1);
        for (let k = 0; k < budget && i < MAX_BODIES; k++) {
          const u = rng();
          const r = rc * Math.tan(u * maxArg);
          const dir = new THREE.Vector3(randn(), randn(), randn()).normalize();
          const sigma = Math.sqrt(totalMass / (6 * (r + rc)));
          setBody(
            i++,
            cx + dir.x * r,
            cy + dir.y * r,
            cz + dir.z * r,
            perBody,
            cvx + randn() * sigma,
            cvy + randn() * sigma,
            cvz + randn() * sigma,
            4.0,
          );
        }
        return i;
      }

      // Run the GPU integrator for N frames BEFORE rendering, so structural
      // features (tails, bars, lanes) arrive pre-formed rather than having
      // the viewer wait for them to appear.
      function kickstartSim(frames = 300, dt = 0.015) {
        const prevDt = posVar.material.uniforms.uDt.value;
        const prevSignP = posVar.material.uniforms.uSign.value;
        const prevSignV = velVar.material.uniforms.uSign.value;
        posVar.material.uniforms.uDt.value = dt;
        velVar.material.uniforms.uDt.value = dt;
        posVar.material.uniforms.uSign.value = 1.0;
        velVar.material.uniforms.uSign.value = 1.0;
        for (let k = 0; k < frames; k++) gpu.compute();
        posVar.material.uniforms.uDt.value = prevDt;
        velVar.material.uniforms.uDt.value = prevDt;
        posVar.material.uniforms.uSign.value = prevSignP;
        velVar.material.uniforms.uSign.value = prevSignV;
      }

      function sceneQuietDrift() {

      function sceneBirth() {

        for (let i = 0; i < N; i++) {

          const r = R0 * Math.pow(rng(), 1 / 3);

      function sceneEventHorizon() {
        // Supermassive BH + razor-thin accretion disk carved at an ISCO-ish radius,
        // mass gradient skewed inward, mildly sub-Keplerian with small radial jitter.
        // Tuned to sit at a phase-transition edge: the disk precesses, sheds rings,
        // and the inner edge grazes the plunge radius.
        zero();
        const BH_MASS = 140000.0;
        const rISCO = 16.0; // inner plunge radius (carved)
        const rInner = 24.0; // where density peaks
        const rOuter = 260.0; // tapered outer edge
        const rMin = rISCO + 1.0;

        setBody(0, 0, 0, 0, BH_MASS, 0, 0, 0, 2.0);
        let i = 1;

        // --- Accretion disk ---
        // Reserve ~450 bodies for bipolar jets; rest goes to the disk.
        const DISK_END = Math.min(MAX_BODIES - 460, 14500);
        for (; i < DISK_END; i++) {
          // Rejection-sample an inner-peaked radial density ∝ (r - rISCO)^-0.9 · e^{-r/R0}
          let r;
          let tries = 0;
          const R0 = 90.0;
          while (true) {
            r = rMin + Math.pow(rng(), 2.4) * (rOuter - rMin);
            const w =
              Math.pow(Math.max(r - rISCO, 0.1), -0.9) * Math.exp(-r / R0);
            if (rng() < w / 0.12 || tries++ > 6) break;
          }
          r = Math.max(r, rMin);

          const phi = rng() * 2 * Math.PI;
          // Scale height: razor-thin inside, slight puff out near the edge
          const hScale = 0.008 + 0.02 * Math.pow(r / rOuter, 1.4);
          const z = randn() * r * hScale;

          const vCirc = Math.sqrt(BH_MASS / r);
          // Sub-Keplerian by ~0.5% → mild inward drift + precession
          const vTang = vCirc * (0.994 + randn() * 0.004);
          // Tiny radial component → eccentric orbits → ring resonances over time
          const vRad = randn() * vCirc * 0.008;
          const vZ = randn() * vCirc * 0.004;

          // Mass gradient: inner bodies heavier (and therefore brighter on mass channel),
          // outer bodies are light dust / cold gas.
          const t = (r - rInner) / (rOuter - rInner); // 0 inner → 1 outer
          const mass = 0.15 + Math.pow(Math.max(0, 1 - t), 1.8) * 2.2;

          // Dust gets speckled in the outer two-thirds
          const kind = r > rInner + 60 && rng() < 0.12 ? 3.0 : 0.0;

          const cp = Math.cos(phi),
            sp = Math.sin(phi);
          setBody(
            i,
            r * cp,
            z,
            r * sp,
            mass,
            -sp * vTang + cp * vRad,
            vZ,
            cp * vTang + sp * vRad,
            kind,
          );
        }

        // --- Bipolar jets ---
        // Bodies pre-distributed along ±Y with escape-velocity profile so the jet
        // reads as a steady beam from t=0 rather than an expanding plume.
        // v(r) = sqrt(2 * (E0 + GM/r)) with small positive E0 → unbound but slow at infinity.
        const JET_PER_SIDE = 225;
        const JET_R_MIN = 4.0;
        const JET_R_MAX = 280.0;
        const JET_E0 = 80.0; // small positive = marginally unbound
        const JET_HALF_ANGLE = 0.055; // ~3.2° opening cone
        const JET_TWIST = 0.18; // fraction of radial speed put into helical spin
        for (let side = 0; side < 2; side++) {
          const ySign = side === 0 ? +1 : -1;
          for (let k = 0; k < JET_PER_SIDE && i < MAX_BODIES; k++) {
            // Log-ish distribution along axis: denser at the base, thinning out
            const u = Math.pow(rng(), 1.55);
            const r = JET_R_MIN + u * (JET_R_MAX - JET_R_MIN);

            // Cone cross-section (small disk perpendicular to axis)
            const coneAngle = rng() * 2 * Math.PI;
            const coneRad = JET_HALF_ANGLE * r * Math.sqrt(rng());
            const cc = Math.cos(coneAngle),
              sc = Math.sin(coneAngle);
            const x = coneRad * cc;
            const z = coneRad * sc;
            const y = r * ySign;

            // Escape-profile axial velocity (direction = ±Y)
            const vMag = Math.sqrt(2 * (JET_E0 + BH_MASS / Math.max(r, 1.0)));
            let vx = 0.0,
              vy = vMag * ySign,
              vz = 0.0;

            // Helical twist: small tangential kick perpendicular to cone-radial direction
            const tx = -sc,
              tz = cc;
            const vTwist = JET_TWIST * vMag * (0.7 + rng() * 0.6);
            vx += tx * vTwist * ySign;
            vz += tz * vTwist * ySign;

            // Tiny random jitter so the beam doesn't look like a laser pointer
            vx += randn() * vMag * 0.03;
            vz += randn() * vMag * 0.03;
            vy += randn() * vMag * 0.02;

            // Low-mass plasma — jets should not gravitationally perturb the disk
            const mass = 0.06 + rng() * 0.12;
            setBody(i++, x, y, z, mass, vx, vy, vz, 0.0);
          }
        }

        state.count = i;
      }

      function sceneDustStorm() {
        zero();
        // ~8 heavy attractors scattered, ~95% dust
        const heavyCount = 8;
        const R = 340;
        let i = 0;
        for (let h = 0; h < heavyCount; h++) {

          setBody(

            600 + rng() * 1200,

            randn() * 0.4,
            2.0,
          );
        }
        const curl = makeCurlNoise(rng() * 5 + 1);
        for (; i < MAX_BODIES; i++) {
          const dir = new THREE.Vector3(
            randn(),
            randn() * 0.3,
            randn(),
          ).normalize();
          const r = R * Math.pow(rng(), 0.5);
          const p = dir.multiplyScalar(r);
          const [cvx, cvy, cvz] = curl(p.x, p.y, p.z);
          setBody(
            i,
            p.x,
            p.y,
            p.z,
            0.3 + rng() * 0.8,
            cvx * 4.5 + randn() * 0.6,
            cvy * 2.5 + randn() * 0.3,
            cvz * 4.5 + randn() * 0.6,
            3.0,
          );
        }
        state.count = MAX_BODIES;
      }

      function sceneOrrery() {
        zero();
        setBody(0, 0, 0, 0, 8000.0, 0, 0, 0, 2.0);
        const planets = [
          { r: 30, m: 0.4 },
          { r: 45, m: 0.9 },
          { r: 60, m: 1.0 },
          { r: 80, m: 0.6 },
          { r: 120, m: 50.0 },
          { r: 160, m: 40.0 },
          { r: 210, m: 18.0 },
          { r: 260, m: 17.0 },
        ];
        let i = 1;
        for (const p of planets) {
          const phi = rng() * 2 * Math.PI;
          const v = Math.sqrt(8000.0 / p.r);
          setBody(
            i++,
            p.r * Math.cos(phi),
            0,
            p.r * Math.sin(phi),
            p.m,
            -Math.sin(phi) * v,
            0,
            Math.cos(phi) * v,
            1.0,
          );
        }
        for (; i < 560; i++) {
          const r = 85 + rng() * 25;
          const phi = rng() * 2 * Math.PI;
          const v = Math.sqrt(8000.0 / r);
          const z = randn() * 1.5;
          setBody(
            i,
            r * Math.cos(phi),
            z,
            r * Math.sin(phi),
            0.05 + rng() * 0.2,
            -Math.sin(phi) * v,
            0,
            Math.cos(phi) * v,
            3.0,
          );
        }
        state.count = i;
      }

      function sceneLattice() {
        zero();
        // 3D grid of bodies with tiny random perturbations
        const side = 14; // 14^3 = 2744
        const spacing = 40;
        const total = side * side * side;
        const origin = -(side - 1) * spacing * 0.5;
        let i = 0;
        for (let ix = 0; ix < side; ix++) {
          for (let iy = 0; iy < side; iy++) {
            for (let iz = 0; iz < side; iz++) {
              if (i >= MAX_BODIES) break;
              const x = origin + ix * spacing + randn() * 1.5;
              const y = origin + iy * spacing + randn() * 1.5;
              const z = origin + iz * spacing + randn() * 1.5;
              setBody(
                i++,
                x,
                y,
                z,
                1.5 + rng() * 0.8,
                randn() * 0.2,
                randn() * 0.2,
                randn() * 0.2,
                0.0,
              );
            }
          }
        }
        state.count = Math.min(i, MAX_BODIES);
      }

      // ---- Pack A: no new primitives ----

      // Stephan's Quintet — 4 galaxies in a loose mutual orbit + 1 intruder
      // flying through at higher velocity.
      function sceneStephansQuintet() {
        zero();
        const perGalaxy = Math.floor((MAX_BODIES - 16) / 5);
        // Y-shape: three centres near a plane, one offset, one incoming
        const galaxies = [
          {
            cx: 0,
            cy: 0,
            cz: 0,
            vx: randn() * 0.8,
            vy: randn() * 0.3,
            vz: randn() * 0.8,
            r: 72,
            m: 4200,
          },
          {
            cx: 140,
            cy: 20,
            cz: 30,
            vx: -randn() * 0.8,
            vy: randn() * 0.3,
            vz: -randn() * 0.6,
            r: 66,
            m: 3800,
          },
          {
            cx: 60,
            cy: -40,
            cz: -110,
            vx: randn() * 0.6,
            vy: randn() * 0.2,
            vz: randn() * 0.8,
            r: 74,
            m: 4400,
          },
          {
            cx: -95,
            cy: 55,
            cz: 60,
            vx: randn() * 0.6,
            vy: randn() * 0.2,
            vz: -randn() * 0.4,
            r: 68,
            m: 3900,
          },
          // intruder — flying in from the right at 3× dispersion velocity
          {
            cx: 420,
            cy: 0,
            cz: -20,
            vx: -9.0,
            vy: randn() * 0.3,
            vz: 2.0,
            r: 60,
            m: 4800,
          },
        ];
        let i = 0;
        for (let g = 0; g < galaxies.length; g++) {
          const gl = galaxies[g];
          i = makeSpiralGalaxyCore(
            gl.cx,
            gl.cy,
            gl.cz,
            gl.vx,
            gl.vy,
            gl.vz,
            perGalaxy,
            gl.r,
            gl.m,
            i,
            g % 2 === 0 ? +1 : -1,
          );
