      function toggleHotkeys() {
        hotkeyOverlayEl.classList.contains("hidden")
          ? openHotkeys()
          : closeHotkeys();
      }

      // ===============================================================
      // 21. SAVED VIEWPOINTS  (per scene, localStorage-backed)
      // ===============================================================
      const VP_KEY = "universe-viewpoints-v1";
      const viewpoints = (() => {
        try {
          return JSON.parse(localStorage.getItem(VP_KEY)) || {};
        } catch (e) {
          return {};
        }
      })();
      function viewpointMapFor(sceneKey) {
        return (viewpoints[sceneKey] = viewpoints[sceneKey] || {});
      }
      function saveViewpoints() {
        try {
          localStorage.setItem(VP_KEY, JSON.stringify(viewpoints));
        } catch (e) {}
      }
      function saveViewpoint(n) {
        const m = viewpointMapFor(currentSceneKey);
        m[n] = {
          pos: camera.position.toArray(),
          tgt: controls.target.toArray(),
          fov: camera.fov,
        };
        saveViewpoints();
        if (activePanel === "camera") {
          buildPanel("camera");
        }
      }
      function recallViewpoint(n) {
        const m = viewpointMapFor(currentSceneKey);
        const vp = m[n];
        if (!vp) return;
        const fromPos = camera.position.clone();
        const fromTgt = controls.target.clone();
        const fromFov = camera.fov;
        const toPos = new THREE.Vector3().fromArray(vp.pos);
        const toTgt = new THREE.Vector3().fromArray(vp.tgt);
        const toFov = vp.fov;
        const start = performance.now();
        const dur = 900;
        function tick() {
          const t = clamp((performance.now() - start) / dur, 0, 1);
          const e = easeInOutCubic(t);
          camera.position.lerpVectors(fromPos, toPos, e);
          controls.target.lerpVectors(fromTgt, toTgt, e);
          camera.fov = lerp(fromFov, toFov, e);
          params.fov = camera.fov;
          camera.updateProjectionMatrix();
          if (t < 1) requestAnimationFrame(tick);
        }
        tick();
      }

      // ===============================================================
      // 22. CAMERA DRIFT + AUTO-ORBIT  (procedural, lightweight)
      // ===============================================================
      let lastUserInputTime = performance.now();
      function markUserActivity() {
        lastUserInputTime = performance.now();
      }
      // Only user-initiated drag should count as activity.  "change" fires
      // on *any* camera movement (including drift / auto-orbit itself),
      // which otherwise creates a feedback loop that pins idle time near zero.
      controls.addEventListener("start", markUserActivity);
      controls.addEventListener("end", markUserActivity);

      // Click-to-follow: a short click (no drag) on the canvas picks the
      // body nearest to the cursor. Drags still orbit via OrbitControls.
      // A drag during follow-cam releases it — the user wins.
      (function wireFollowClick() {
        let downT = 0;
        let downX = 0,
          downY = 0;
        let moved = false;
        canvasEl.addEventListener("pointerdown", (e) => {
          if (e.button !== 0) return;
          downT = performance.now();
          downX = e.clientX;
          downY = e.clientY;
          moved = false;
        });
        canvasEl.addEventListener("pointermove", (e) => {
          if (downT === 0) return;
          const dx = e.clientX - downX;
          const dy = e.clientY - downY;
          if (dx * dx + dy * dy > 36) moved = true; // > 6px
        });
        canvasEl.addEventListener("pointerup", (e) => {
          const wasDown = downT !== 0;
          const dur = performance.now() - downT;
          const wasMoved = moved;
          downT = 0;
          if (!wasDown) return;
          // A real drag: if following, release. Otherwise let OrbitControls do its thing.
          if (wasMoved) {
            if (followCamActive()) followCamRelease("user drag");
            return;
          }
          // Short click → pick.
          if (dur > 280) return;
          if (!followCam.enabled) return;
          const rect = canvasEl.getBoundingClientRect();
          const ndcX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
          const ndcY = -(((e.clientY - rect.top) / rect.height) * 2 - 1);
          const pick = pickBodyAtNDC(ndcX, ndcY, 28);
          if (pick) followCamAttach(pick);
        });
      })();

      const driftState = {
        phaseX: Math.random() * 100,
        phaseY: Math.random() * 100,
        phaseZ: Math.random() * 100,
      };
      const orbitState = {
        angle: 0,
      };
      let _prevUserActive = false;

      function updateCameraMotion(dt) {
        if (transitionRaf) return; // don't interfere with scene transition
        const idle = (performance.now() - lastUserInputTime) / 1000;
        const userActive = idle < 8;

        // Clamp dt so a backgrounded tab or a stuttery frame never fast-
        // forwards a move's trajectory by a noticeable amount. 50 ms is
        // already three 60-fps frames — anything longer is a hiccup, not
        // signal. This makes every director-driven position write resolve
        // to a per-frame delta the eye can't resolve.
        const camDt = Math.min(dt, 0.05);

        // User just grabbed control: release any director-owned follow
        // immediately so the user's input isn't fighting the follow-cam.
        if (!_prevUserActive && userActive && director.followOwned) {
          cancelDirectorFollow("user input");
        }
        // On the edge from user-active back to idle, any in-flight move is
        // stale: its startPos was captured 8+ seconds ago and the camera
        // has since moved under user control. Resuming would snap the
        // camera back onto the old trajectory. Drop the move and hold for
        // a beat so the next pick starts from the current pose.
        if (_prevUserActive && !userActive && director.move) {
          director.move = null;
          director.moveCooldown = Math.max(director.moveCooldown, 1.2);
          director.wakeT = 6.0; // §11 wake ramp — scale amplitudes up smoothly
        }
        _prevUserActive = userActive;
        // Decay the wake window. tickCameraMove reads director.wakeT to
        // scale the amplitude of position / rate / FOV writes.
        if (director.wakeT > 0) {
          director.wakeT = Math.max(0, director.wakeT - camDt);
        }

        // Cinematic mode: camera move scheduler drives composition; drift is overlay.
        if (director.enabled && director.state === "DWELL" && !userActive) {
          tickCameraMove(camDt);
          // Follow-cam owns the camera during a follow move — its own
          // smoothing is the "drift" for that move. Layering the director's
          // drift on top would fight it.
          if (!director.followOwned) applyDrift(camDt);
          return;
        }

        // Non-cinematic (or user-active): simple orbit + drift as before.
        const doDrift = params.cameraDrift;
        const doOrbit = params.autoOrbit;

        if (doDrift) {
          const dist = camera.position.distanceTo(controls.target);
          const amp = dist * 0.004;
          const t = simTime;
          const dx = Math.sin(t * 0.21 + driftState.phaseX) * amp;
          const dy = Math.sin(t * 0.17 + driftState.phaseY) * amp * 0.7;
          const dz = Math.sin(t * 0.13 + driftState.phaseZ) * amp;
          camera.position.x += dx * dt;
          camera.position.y += dy * dt;
          camera.position.z += dz * dt;
        }

        if (doOrbit && idle > 3.0) {
          const rate = 0.03;
          orbitState.angle += rate * dt;
          const rel = camera.position.clone().sub(controls.target);
          const cosA = Math.cos(rate * dt);
          const sinA = Math.sin(rate * dt);
          const nx = rel.x * cosA - rel.z * sinA;
          const nz = rel.x * sinA + rel.z * cosA;
          camera.position.x = controls.target.x + nx;
          camera.position.z = controls.target.z + nz;
          camera.lookAt(controls.target);
        }
      }

      // ===============================================================
      // 22c. DENSITY / PIPELINE REBUILD
      // ===============================================================
      // Swap the GPGPU texture size live. Biggest non-obvious cost: the
      // gravity shader's inlined for-loop bakes TEX_SIZE into its source,
      // so the velocity material has to recompile. Fine — the user only
      // changes this every few minutes at most.
      let rebuildingPipeline = false;
      function rebuildPipeline(newTexSize) {
        if (rebuildingPipeline) return;
        if (newTexSize === TEX_SIZE) return;
        const hwMax = renderer.capabilities.maxTextureSize || 2048;
        if (newTexSize > hwMax) {
          showToast("Density", "hardware cap " + hwMax + "²");
          return;
        }
        rebuildingPipeline = true;

        // Cancel any in-flight scene transition so its RAF doesn't touch
        // freshly-disposed GPU state.
        if (transitionRaf) {
          cancelAnimationFrame(transitionRaf);
          transitionRaf = null;
        }

        // Preserve camera + uniforms the current scene set up. We'll re-
        // apply the scene immediately after, which will overwrite some of
        // these — but some (uG, uFlock) matter during the rebuild frame.
        const savedCamPos = camera.position.toArray();
        const savedCamTgt = controls.target.toArray();
        const savedCamFov = camera.fov;
        const savedSceneKey = currentSceneKey;
        const preserve = {
          uDt: velVar.material.uniforms.uDt.value,
          uG: velVar.material.uniforms.uG.value,
          uEps2: velVar.material.uniforms.uEps2.value,
          uSign: velVar.material.uniforms.uSign.value,
          uFrame: velVar.material.uniforms.uFrame.value,
          uK: velVar.material.uniforms.uK.value.slice(),
          uFlock: velVar.material.uniforms.uFlock.value,
          uRadiation: velVar.material.uniforms.uRadiation.value,
        };

        // Flash to cover the pop.
        const flash = $("#flash");
        if (flash) {
          flash.classList.add("active");
          setTimeout(() => flash.classList.remove("active"), 280);
        }

        // Dispose old GPGPU (materials + ping-pong render targets).
        if (gpu && gpu.variables) {
          for (const v of gpu.variables) {
            v.material?.dispose();
            if (v.renderTargets) {
              for (const rt of v.renderTargets) rt?.dispose();
            }
          }
        }

        // Update size globals.
        TEX_SIZE = newTexSize;
        MAX_BODIES = TEX_SIZE * TEX_SIZE;

        // Reallocate CPU-side state.
        state.positions = new Float32Array(MAX_BODIES * 4);
        state.velocities = new Float32Array(MAX_BODIES * 4);
        state.count = 0;

        // Rebuild the ref geometry attributes (aRef + position) for the
        // new body count. The material + mesh stay the same.
        populateRefGeom(TEX_SIZE);

        // Rebuild the GPGPU with the new size and preserved physics
        // uniforms.
        createGPGPU(TEX_SIZE, preserve);

        // Re-run the current scene so the new buffers are populated, then
        // restore camera framing (the scene's default pose would otherwise
        // yank us around).
        applyScene(savedSceneKey, { immediate: true });
        camera.position.fromArray(savedCamPos);
        controls.target.fromArray(savedCamTgt);
        camera.fov = savedCamFov;
        camera.updateProjectionMatrix();

        rebuildingPipeline = false;
      }

      function setDensity(key) {
        if (!DENSITY_LEVELS[key]) return;
        if (key === currentDensityKey) return;
        const lvl = DENSITY_LEVELS[key];
        currentDensityKey = key;
        try {
          localStorage.setItem("universeSim.density", key);
        } catch (_) {}
        rebuildPipeline(lvl.texSize);
        showToast("Density", lvl.label + " · " + lvl.shortCount);
        if (key === "lush") {
          setTimeout(
            () => showToast("Lush mode", "bloom off recommended for 60fps"),
            1600,
          );
        }
        if (activePanel === "settings") buildPanel("settings");
        reflectHudBodyCount();
      }

      // ===============================================================
      // 22d. FOLLOW-CAM  (attach to a single body, watch its journey)
      // ===============================================================
      // Bodies have stable texel identities in the GPGPU texture — each
      // body stays at one (x, y) until its mass goes to zero. So
      // "following a body" is just remembering a vec2 UV, reading its
      // position every frame, and aiming the camera.
      const followCam = {
        enabled: true, // feature gate (could expose in settings later)
        state: "SEARCHING", // SEARCHING | ATTACHING | FOLLOWING | RELEASING
        texel: null, // { x, y } integer texel coords
        uv: null, // { x, y } UV with 0.5 offset, matches aRef
        bodyIndex: -1, // for HUD
        attachT: 0,
        attachDur: 1.2,
        age: 0,
        // Effectively no hard timeout — user-initiated follows should last
        // as long as the user wants them to. Scene transitions (cinematic /
        // movie mode) and explicit release still end the follow.
        maxAge: 86400,
        pulseT: 0,
        pulseDur: 1.4,
        // Chase-cam smoothing: low-pass the velocity direction so near-BH
        // swerves don't whip the camera. tau ≈ 0.45s feels cinematic.
        _smoothVelDir: new THREE.Vector3(0, 0, 1),
        _velDirTau: 0.45,
        _startCam: new THREE.Vector3(),
        _startTgt: new THREE.Vector3(),
        _endCam: new THREE.Vector3(),
        _bodyPos: new THREE.Vector3(),
        _bodyVel: new THREE.Vector3(),
        _pbuf: new Float32Array(4),
        _vbuf: new Float32Array(4),
        // Scratch buffer for the pick readback; allocated on first pick and
        // resized if density changes.
        _pickBuf: null,
        _pickBufSize: 0,
      };

      function followCamActive() {
        return followCam.state !== "SEARCHING";
      }

      function followCamUVToTexel(uv) {
        // uv = (texel + 0.5) / TEX_SIZE   →   texel = floor(uv * TEX_SIZE)
        return {
          x: Math.max(0, Math.min(TEX_SIZE - 1, Math.floor(uv.x * TEX_SIZE))),
          y: Math.max(0, Math.min(TEX_SIZE - 1, Math.floor(uv.y * TEX_SIZE))),
        };
      }

      // Project every live body to NDC once, find the closest to the
      // click point (NDC), return its texel if inside a pixel threshold.
      function pickBodyAtNDC(ndcX, ndcY, thresholdPx) {
        if (!followCam.enabled) return null;
        const need = TEX_SIZE * TEX_SIZE * 4;
        if (!followCam._pickBuf || followCam._pickBufSize !== need) {
          followCam._pickBuf = new Float32Array(need);
          followCam._pickBufSize = need;
        }
        const buf = followCam._pickBuf;
        const rt = gpu.getCurrentRenderTarget(posVar);
        renderer.readRenderTargetPixels(rt, 0, 0, TEX_SIZE, TEX_SIZE, buf);

        const mat = new THREE.Matrix4().multiplyMatrices(
          camera.projectionMatrix,
          camera.matrixWorldInverse,
        );
        const v = new THREE.Vector3();
        const vpW = innerWidth;
        const thNdc = (thresholdPx * 2.0) / vpW; // px → NDC half-width
        const thNdc2 = thNdc * thNdc;
        let bestI = -1,
          bestD = Infinity;
        const showHalo = params.showHalo;
        for (let i = 0; i < MAX_BODIES; i++) {
          const m = buf[i * 4 + 3];
          if (m <= 0) continue;
          // Halo particles (kind 4) are invisible when showHalo is off — don't
          // let the user pick an invisible body.
          // (Kind is stored in the velocity texture; we'd need a second read
          // to check it. Approximation: if density is fine, a mass-threshold
          // skip is close-enough. Ship without the halo check for now.)
          v.set(buf[i * 4 + 0], buf[i * 4 + 1], buf[i * 4 + 2]).applyMatrix4(
            mat,
          );
          // Skip bodies behind camera / outside clip space
          if (v.z < -1 || v.z > 1) continue;
          const dx = v.x - ndcX;
          const dy = v.y - ndcY;
          const d2 = dx * dx + dy * dy;
          if (d2 < bestD) {
            bestD = d2;
            bestI = i;
          }
        }
        if (bestI < 0 || bestD > thNdc2) return null;
        const tx = bestI % TEX_SIZE;
        const ty = Math.floor(bestI / TEX_SIZE);
        return {
          texel: { x: tx, y: ty },
          uv: { x: (tx + 0.5) / TEX_SIZE, y: (ty + 0.5) / TEX_SIZE },
          bodyIndex: bestI,
          pos: new THREE.Vector3(
            buf[bestI * 4 + 0],
            buf[bestI * 4 + 1],
            buf[bestI * 4 + 2],
          ),
        };
      }

      // Pick the closest live body to the current look-at point (camera
      // target).  Used by the `F` hotkey as a no-aim shortcut.
      function pickBodyNearTarget() {
        const W = innerWidth,
          H = innerHeight;
        const tgt = controls.target.clone().project(camera);
        // If target is off-screen, fall back to screen center.
        const x = Math.abs(tgt.x) > 1 ? 0 : tgt.x;
        const y = Math.abs(tgt.y) > 1 ? 0 : tgt.y;
        return pickBodyAtNDC(x, y, Math.min(W, H) * 0.5);
      }

      function followCamReadBody() {
        if (!followCam.texel) return null;
        const pRT = gpu.getCurrentRenderTarget(posVar);
        const vRT = gpu.getCurrentRenderTarget(velVar);
        renderer.readRenderTargetPixels(
          pRT,
          followCam.texel.x,
          followCam.texel.y,
          1,
          1,
          followCam._pbuf,
        );
        renderer.readRenderTargetPixels(
          vRT,
          followCam.texel.x,
          followCam.texel.y,
          1,
          1,
          followCam._vbuf,
        );
        const mass = followCam._pbuf[3];
        followCam._bodyPos.set(
          followCam._pbuf[0],
          followCam._pbuf[1],
          followCam._pbuf[2],
        );
        followCam._bodyVel.set(
          followCam._vbuf[0],
          followCam._vbuf[1],
          followCam._vbuf[2],
        );
        return mass;
      }

      // Chase-cam rig: camera trails behind the body along its velocity
      // direction with a small lift, always looks *at* the body. The world
      // visibly flies past — you feel the journey rather than observing it.
      // `smoothDir` is the low-pass-filtered velocity direction; we use it
      // instead of the instantaneous velocity so near-BH swerves don't whip.
      function chaseRigOffset(smoothDir, out) {
        const sc = SCENES[currentSceneKey];
        const baseCamPos = sc && sc.camera ? sc.camera.pos : [0, 120, 320];
        const tgt = sc?.camera?.tgt || [0, 0, 0];
        const baseDist = Math.hypot(
          baseCamPos[0] - tgt[0],
          baseCamPos[1] - tgt[1],
          baseCamPos[2] - tgt[2],
        );
        // Follow distance: a sliver of the scene's natural scale — close
        // enough that foreground rushes past, far enough that the body is
        // readably sized, not a single pixel.
        const d = clamp(baseDist * 0.08, 18, 95);
        const lift = d * 0.22;
        // offset = -smoothDir * d + up * lift
        out.copy(smoothDir).multiplyScalar(-d);
        out.y += lift;
        return out;
      }

      function followCamAttach(pick) {
        followCam.texel = pick.texel;
        followCam.uv = pick.uv;
        followCam.bodyIndex = pick.bodyIndex;
        followCam.state = "ATTACHING";
        followCam.attachT = 0;
        followCam.age = 0;
        followCam.pulseT = followCam.pulseDur; // fade from 1 → 0
        // Snapshot current camera as the start pose of the ease.
        followCam._startCam.copy(camera.position);
        followCam._startTgt.copy(controls.target);
        followCam._bodyPos.copy(pick.pos);
        followCam._bodyVel.set(0, 0, 0);
        // Seed the smoothed velocity direction from an immediate readback
        // so the attach swings into the right place. If the body is nearly
        // stationary, seed from the camera→body direction so the chase
        // ends up "behind" the current approach vector.
        followCamReadBody();
        if (followCam._bodyVel.lengthSq() > 1e-3) {
          followCam._smoothVelDir.copy(followCam._bodyVel).normalize();
        } else {
          followCam._smoothVelDir.copy(followCam._bodyPos).sub(camera.position);
          if (followCam._smoothVelDir.lengthSq() < 1e-6) {
            followCam._smoothVelDir.set(0, 0, 1);
          } else {
            followCam._smoothVelDir.normalize();
          }
        }
        // Shader highlight on.
        pointMat.uniforms.uFollowUV.value.set(pick.uv.x, pick.uv.y);
        pointMat.uniforms.uFollowPulse.value = 1.0;
        // Start a fresh trail from this body's current position.
        startTrail();
        // Generate the body's private solar system. Kind is packed in the
        // velocity texture's .w channel (floor(.w) = kind, fractional = age).
        const kind = Math.floor((followCam._vbuf[3] || 0) + 0.001);
        generateSolarSystem(pick.bodyIndex, kind);
        reflectHudFollow();
        showToast("Following", "#" + pick.bodyIndex);
        sfx.play("lock");
      }

      function followCamRelease(reason) {
        if (followCam.state === "SEARCHING") return;
        followCam.state = "SEARCHING";
        followCam.texel = null;
        followCam.uv = null;
        followCam.bodyIndex = -1;
        pointMat.uniforms.uFollowUV.value.set(-1, -1);
        pointMat.uniforms.uFollowPulse.value = 0;
        // Stop recording, but leave the frozen trail in the scene so the
        // user can orbit around and inspect the path.
        stopTrail();
        // Fade out the procedural solar system.
        dissolveSolarSystem();
        reflectHudFollow();
        if (reason) showToast("Released", reason);
      }

      // Attach to a body by its flat index (0..MAX_BODIES-1). Index maps
      // directly to the GPGPU texel (idx % TEX_SIZE, idx / TEX_SIZE). We
      // do a tiny GPU readback to verify the slot is alive before attaching.
      function followCamAttachByIndex(idx) {
        idx = idx | 0;
        if (idx < 0 || idx >= MAX_BODIES) {
          showToast("Follow", "out of range (0–" + (MAX_BODIES - 1) + ")");
          return false;
        }
        const tx = idx % TEX_SIZE;
        const ty = Math.floor(idx / TEX_SIZE);
        const buf = new Float32Array(4);
        const rt = gpu.getCurrentRenderTarget(posVar);
        renderer.readRenderTargetPixels(rt, tx, ty, 1, 1, buf);
        if (!(buf[3] > 0)) {
          showToast("Follow", "#" + idx + " is empty");
          return false;
        }
        followCamAttach({
          texel: { x: tx, y: ty },
          uv: { x: (tx + 0.5) / TEX_SIZE, y: (ty + 0.5) / TEX_SIZE },
          bodyIndex: idx,
          pos: new THREE.Vector3(buf[0], buf[1], buf[2]),
        });
        return true;
      }

      // Step to the next (step = +1) or previous (step = -1) alive body
      // relative to the currently-followed one. If not currently following,
      // start from the first body (0) or last (MAX_BODIES-1). Skips dead
      // slots up to 64 attempts so we don't block the main thread.
      function followCamStep(step) {
        let start = followCam.bodyIndex;
        if (start < 0) start = step > 0 ? -1 : MAX_BODIES;
        let idx = start;
        for (let attempt = 0; attempt < 64; attempt++) {
          idx = (((idx + step) % MAX_BODIES) + MAX_BODIES) % MAX_BODIES;
          const tx = idx % TEX_SIZE;
          const ty = Math.floor(idx / TEX_SIZE);
          const buf = new Float32Array(4);
          const rt = gpu.getCurrentRenderTarget(posVar);
          renderer.readRenderTargetPixels(rt, tx, ty, 1, 1, buf);
          if (buf[3] > 0) {
            followCamAttach({
              texel: { x: tx, y: ty },
              uv: {
                x: (tx + 0.5) / TEX_SIZE,
                y: (ty + 0.5) / TEX_SIZE,
              },
              bodyIndex: idx,
              pos: new THREE.Vector3(buf[0], buf[1], buf[2]),
            });
            return true;
          }
        }
        showToast("Follow", "no alive bodies nearby");
        return false;
      }

      // Scratch objects reused by updateFollowCam (avoid per-frame allocs).
      const _followTmpOffset = new THREE.Vector3();
      const _followTmpDir = new THREE.Vector3();
      const _followTmpEndCam = new THREE.Vector3();

      function updateFollowCam(realDt) {
        if (followCam.state === "SEARCHING") return;
        // Age out.
        followCam.age += realDt;
        if (followCam.age > followCam.maxAge) {
          followCamRelease("timeout");
          return;
        }
        // Decay attach pulse (used by the shader for a brief flash).
        if (followCam.pulseT > 0) {
          followCam.pulseT = Math.max(0, followCam.pulseT - realDt);
          pointMat.uniforms.uFollowPulse.value =
            followCam.pulseT / followCam.pulseDur;
        }
        // Read the body's live position + velocity.
        const mass = followCamReadBody();
        if (mass === null || mass <= 0) {
          followCamRelease("body died");
          return;
        }

        // Low-pass the velocity direction so rapid swerves don't whip the
        // camera. If the body is essentially motionless, keep the last
        // smoothed direction rather than snapping.
        const vLen = followCam._bodyVel.length();
        if (vLen > 1e-3) {
          _followTmpDir.copy(followCam._bodyVel).multiplyScalar(1 / vLen); // normalize in-place
          const alpha = 1 - Math.exp(-realDt / followCam._velDirTau);
          followCam._smoothVelDir.lerp(_followTmpDir, alpha);
          if (followCam._smoothVelDir.lengthSq() > 1e-8) {
            followCam._smoothVelDir.normalize();
          }
        }

        // Chase-cam offset from smoothed velocity direction.
        chaseRigOffset(followCam._smoothVelDir, _followTmpOffset);

        if (followCam.state === "ATTACHING") {
          followCam.attachT += realDt;
          const t = clamp(followCam.attachT / followCam.attachDur, 0, 1);
          const e = easeInOutCubic(t);
          // End pose tracks the live body each frame, so if it moves
          // during the swing-in we don't end up miles away.
          _followTmpEndCam.copy(followCam._bodyPos).add(_followTmpOffset);
          camera.position.lerpVectors(followCam._startCam, _followTmpEndCam, e);
          controls.target.lerpVectors(
            followCam._startTgt,
            followCam._bodyPos,
            e,
          );
          if (t >= 1) followCam.state = "FOLLOWING";
        } else if (followCam.state === "FOLLOWING") {
          camera.position.copy(followCam._bodyPos).add(_followTmpOffset);
          controls.target.copy(followCam._bodyPos);
        }

        // Append a trail sample if we're recording (see 22e).
        // In ring mode the trail never releases — once the buffer is
        // full, the oldest samples get overwritten and the tail simply
        // rolls forward.
        if (followCam.state === "FOLLOWING" && starTrail.recording) {
          const d2 = followCam._bodyPos.distanceToSquared(
            starTrail.lastLoggedPos,
          );
          if (
            !isFinite(starTrail.lastLoggedPos.x) ||
            d2 >= starTrail.minStepSq
          ) {
            appendTrailSample(followCam._bodyPos, followCam._bodyVel);
            starTrail.lastLoggedPos.copy(followCam._bodyPos);
          }
        }
      }

      // ===============================================================
      // 22e. STAR TRAIL  (persistent line of where the followed body has been)
      // ===============================================================
      // A world-space line geometry that grows while follow-cam is attached.
      // Survives follow-cam release so the user can orbit around the frozen
      // path. Cleared on scene changes and on new follow-cam attach.
      // Ring-buffer trail: once MAX samples are recorded, the oldest
      // sample gets overwritten on each new append and the tail rolls
      // forward.  Two Line meshes share one pair of BufferAttributes so
      // we can draw [head..MAX) and [0..head) as separate chronological
      // halves without shifting 3 MB of data per frame.  The seam at the
      // wrap (one missing segment between slots MAX-1 and 0) is visually
      // imperceptible at 131k samples.
      const starTrail = {
        enabled: true, // user toggle — off = no recording, meshes stay hidden
        recording: false,
        MAX: 131072, // 8× the old cap; ~3 MB of position + colour data
        count: 0, // number of valid samples in the ring, 0..MAX
        head: 0, // next write slot, 0..MAX (wraps)
        // Spatial downsample — skip a sample if it's within this distance
        // (squared, in sim units) of the last logged one. Keeps dense detail
        // on tight arcs and sparse points on long straight runs.
        minStepSq: 0.16,
        lastLoggedPos: new THREE.Vector3(NaN, NaN, NaN),
        positions: null,
        colors: null,
        posAttr: null,
        colAttr: null,
        geomA: null, // draws [head..MAX) when full, or [0..count) pre-wrap
        geomB: null, // draws [0..head) when full, hidden otherwise
        material: null,
        meshA: null,
        meshB: null,
      };
      starTrail.positions = new Float32Array(starTrail.MAX * 3);
      starTrail.colors = new Float32Array(starTrail.MAX * 3);
      starTrail.posAttr = new THREE.BufferAttribute(
        starTrail.positions,
        3,
      ).setUsage(THREE.DynamicDrawUsage);
      starTrail.colAttr = new THREE.BufferAttribute(
        starTrail.colors,
        3,
      ).setUsage(THREE.DynamicDrawUsage);

      starTrail.geomA = new THREE.BufferGeometry();
      starTrail.geomA.setAttribute("position", starTrail.posAttr);
      starTrail.geomA.setAttribute("color", starTrail.colAttr);
      starTrail.geomA.setDrawRange(0, 0);

      starTrail.geomB = new THREE.BufferGeometry();
      starTrail.geomB.setAttribute("position", starTrail.posAttr);
      starTrail.geomB.setAttribute("color", starTrail.colAttr);
      starTrail.geomB.setDrawRange(0, 0);

      starTrail.material = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        depthTest: false,
        linewidth: 1,
      });
      starTrail.meshA = new THREE.Line(starTrail.geomA, starTrail.material);
      starTrail.meshB = new THREE.Line(starTrail.geomB, starTrail.material);
      starTrail.meshA.frustumCulled = false;
      starTrail.meshB.frustumCulled = false;
      starTrail.meshA.renderOrder = 2;
      starTrail.meshB.renderOrder = 2;
      starTrail.meshB.visible = false;
      scene.add(starTrail.meshA);
      scene.add(starTrail.meshB);

      function updateTrailDrawRanges() {
        const { MAX, count, head, geomA, meshB, geomB } = starTrail;
        if (count === 0) {
          geomA.setDrawRange(0, 0);
          meshB.visible = false;
        } else if (count < MAX) {
          // Pre-wrap: samples live contiguously at [0, count).
          geomA.setDrawRange(0, count);
          meshB.visible = false;
        } else if (head === 0) {
          // Ring is full and head wrapped exactly to 0 — contiguous again.
          geomA.setDrawRange(0, MAX);
          meshB.visible = false;
        } else {
          // Ring is full and head is mid-buffer.
          //   Chronological: oldest at slot head → slot MAX-1 → slot 0 →
          //   slot head-1 (newest).
          //   Draw [head, MAX) as meshA and [0, head) as meshB.
          geomA.setDrawRange(head, MAX - head);
          geomB.setDrawRange(0, head);
          meshB.visible = true;
        }
      }

      function appendTrailSample(pos, vel) {
        const i = starTrail.head;
        starTrail.positions[i * 3 + 0] = pos.x;
        starTrail.positions[i * 3 + 1] = pos.y;
        starTrail.positions[i * 3 + 2] = pos.z;
        // Speed-coloured: slow = warm amber, fast = cool cyan-blue.
        const speed = vel.length();
        const speedMax =
          pointMat.uniforms.uSpeedMax?.value > 0
            ? pointMat.uniforms.uSpeedMax.value
            : 30.0;
        const t = clamp(speed / speedMax, 0, 1);
        const warmR = 1.0,
          warmG = 0.58,
          warmB = 0.3;
        const coolR = 0.42,
          coolG = 0.72,
          coolB = 1.25;
        starTrail.colors[i * 3 + 0] = warmR + (coolR - warmR) * t;
        starTrail.colors[i * 3 + 1] = warmG + (coolG - warmG) * t;
        starTrail.colors[i * 3 + 2] = warmB + (coolB - warmB) * t;

        starTrail.head = (i + 1) % starTrail.MAX;
        if (starTrail.count < starTrail.MAX) starTrail.count += 1;

        updateTrailDrawRanges();

        const pAttr = starTrail.posAttr;
        const cAttr = starTrail.colAttr;
        if (pAttr.addUpdateRange) {
          pAttr.addUpdateRange(i * 3, 3);
          cAttr.addUpdateRange(i * 3, 3);
        } else {
          pAttr.updateRange.offset = i * 3;
          pAttr.updateRange.count = 3;
          cAttr.updateRange.offset = i * 3;
          cAttr.updateRange.count = 3;
        }
        pAttr.needsUpdate = true;
        cAttr.needsUpdate = true;
      }

      function clearTrail() {
        starTrail.count = 0;
        starTrail.head = 0;
        starTrail.recording = false;
        starTrail.lastLoggedPos.set(NaN, NaN, NaN);
        updateTrailDrawRanges();
      }

      function startTrail() {
        clearTrail();
        starTrail.recording = !!starTrail.enabled;
      }

      function stopTrail() {
        starTrail.recording = false;
      }

      // ===============================================================
      // 22f. SOLAR SYSTEMS  (procedural decoration around the followed body)
      // ===============================================================
      // Phase 1 per SOLAR_SYSTEMS.md: kind-0/5/6 stars get 2-8 plain
      // planets; kinds 1/2 skip for now; kinds 3/4 silently degrade.
      // Deterministic per (bodyIndex, currentSceneKey) so re-clicking the
      // same body replays the same system.
      const solarSys = {
        enabled: true,
        group: new THREE.Group(),
        planets: [], // { mesh, angle, angularSpeed, radius, tiltMat, spinSpeed }
        state: "NONE", // NONE | MATERIALISING | ACTIVE | DISSOLVING
        scaleT: 0,
        scaleDur: 1.0,
        bodyIndex: -1,
      };
      solarSys.group.visible = false;
      // Planets live in their own scene so they can be rendered by a
      // dedicated RenderPass that slots in *after* bloom — planets are
      // solid surfaces and shouldn't glow like the particle bodies do.
      const planetScene = new THREE.Scene();
      planetScene.add(solarSys.group);
      const planetPass = new RenderPass(planetScene, camera);
      planetPass.clear = false;
      planetPass.clearDepth = true;
      // Insert after trailsPass so planets don't bloom, don't lens,
      // and don't ghost into the afterimage buffer. CA / vignette /
      // grain still apply so they look part of the same image.
      {
        const caIdx = composer.passes.indexOf(caPass);
        if (caIdx >= 0) composer.insertPass(planetPass, caIdx);
        else composer.addPass(planetPass);
      }

      // Shared planet shader. One program, branched by uType at runtime,
      // so picking rocky vs gas-giant vs ice vs lava vs ocean is just a
      // uniform change — Three.js deduplicates the compiled program.
      const PLANET_TYPE = {
        ROCKY: 0,
        GAS: 1,
        ICE: 2,
        LAVA: 3,
        OCEAN: 4,
      };
      const planetVert = /* glsl */ `
        varying vec3 vNormal;
        varying vec3 vObjPos;
        varying vec3 vWorldPos;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vObjPos = position;
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorldPos = wp.xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;
      const planetFrag = /* glsl */ `
        precision mediump float;
        uniform float uType;
        uniform vec3  uColorA;
        uniform vec3  uColorB;
        uniform float uSeed;
        uniform float uTime;
        uniform vec3  uStarPos;
        varying vec3 vNormal;
        varying vec3 vObjPos;
        varying vec3 vWorldPos;

        // Value noise (cheap, 3D)
        float hash13(vec3 p) {
          p = fract(p * 0.1031);
          p += dot(p, p.yzx + 33.33);
          return fract((p.x + p.y) * p.z);
        }
        float noise3(vec3 p) {
          vec3 i = floor(p);
          vec3 f = fract(p);
          f = f * f * (3.0 - 2.0 * f);
          float n000 = hash13(i);
          float n100 = hash13(i + vec3(1.0, 0.0, 0.0));
          float n010 = hash13(i + vec3(0.0, 1.0, 0.0));
          float n110 = hash13(i + vec3(1.0, 1.0, 0.0));
          float n001 = hash13(i + vec3(0.0, 0.0, 1.0));
          float n101 = hash13(i + vec3(1.0, 0.0, 1.0));
          float n011 = hash13(i + vec3(0.0, 1.0, 1.0));
          float n111 = hash13(i + vec3(1.0, 1.0, 1.0));
          float x00 = mix(n000, n100, f.x);
          float x10 = mix(n010, n110, f.x);
          float x01 = mix(n001, n101, f.x);
          float x11 = mix(n011, n111, f.x);
          float y0 = mix(x00, x10, f.y);
          float y1 = mix(x01, x11, f.y);
          return mix(y0, y1, f.z);
        }

        void main() {
          vec3 N = normalize(vNormal);
          vec3 V = normalize(cameraPosition - vWorldPos);
          vec3 L = normalize(uStarPos - vWorldPos);

          float diff = max(0.0, dot(N, L));
          // Ambient floor so dark side isn't pitch black
          float lit = 0.25 + 0.75 * diff;
          float rim = pow(1.0 - max(0.0, dot(N, V)), 2.6);

          vec3 col;
          int t = int(uType);
          if (t == 1) {
            // Gas giant — horizontal bands along object-Y with subtle flow
            float y = vObjPos.y * 4.5 + uSeed * 3.1;
            float band = 0.5 + 0.5 * sin(y + sin(y * 2.1 + uTime * 0.08) * 0.6);
            col = mix(uColorA, uColorB, band);
            // Deeper contrast near equator
            float eq = 1.0 - abs(vObjPos.y) * 2.0;
            col *= mix(0.85, 1.05, clamp(eq, 0.0, 1.0));
          } else if (t == 2) {
            // Ice world — cool mottled surface with crystalline shimmer
            float n = noise3(vObjPos * 5.0 + uSeed * 11.0);
            col = mix(uColorA, uColorB, smoothstep(0.35, 0.7, n));
            float shim = pow(max(0.0, dot(N, V)), 14.0);
            col += vec3(0.55, 0.75, 1.0) * shim * 0.45;
          } else if (t == 3) {
            // Lava — dark rocky base with glowing fissures; slow pulse
            float n = noise3(vObjPos * 6.0 + uSeed * 7.0);
            float crack = 1.0 - smoothstep(0.48, 0.56, n);
            vec3 base = mix(vec3(0.06, 0.03, 0.02), uColorA * 0.4, 0.7);
            vec3 glow = uColorB * (0.7 + 0.3 * sin(uTime * 0.7 + uSeed * 6.28));
            col = base + glow * crack;
            // Lava glow bypasses the diffuse term partially
            lit = mix(lit, 1.0, crack * 0.6);
          } else if (t == 4) {
            // Ocean — blue base with a star-specular and a little noise
            float n = noise3(vObjPos * 3.0 + uSeed * 5.0);
            col = mix(uColorA, uColorB, smoothstep(0.4, 0.6, n));
            vec3 R = reflect(-L, N);
            float spec = pow(max(0.0, dot(R, V)), 32.0);
            col += vec3(1.0, 0.95, 0.8) * spec * 0.55;
          } else {
            // Rocky — mottled two-tone, mild crater speckles
            float n = noise3(vObjPos * 4.0 + uSeed * 9.0);
            float n2 = noise3(vObjPos * 11.0 + uSeed * 3.0);
            col = mix(uColorA, uColorB, smoothstep(0.3, 0.7, n));
            col *= mix(0.85, 1.05, n2);
          }

          col *= lit;
          col += uColorB * rim * 0.35;
          // Clamp output: planets are solid surfaces, we never want them
          // shining like a particle body. Keeps them looking physical.
          col = clamp(col, vec3(0.0), vec3(0.7));
          gl_FragColor = vec4(col, 1.0);
        }
      `;

      function makePlanetMaterial(type, colorA, colorB, seed) {
        return new THREE.ShaderMaterial({
          uniforms: {
            uType: { value: type },
            uColorA: { value: colorA.clone() },
            uColorB: { value: colorB.clone() },
            uSeed: { value: seed },
            uTime: { value: 0.0 },
            uStarPos: { value: new THREE.Vector3() },
          },
          vertexShader: planetVert,
          fragmentShader: planetFrag,
          depthWrite: true,
          depthTest: true,
        });
      }

      function mulberry32(a) {
        return function () {
          a = (a + 0x6d2b79f5) | 0;
          let t = a;
          t = Math.imul(t ^ (t >>> 15), 1 | t);
          t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      function hash32Str(s) {
        let h = 2166136261 >>> 0;
        for (let i = 0; i < s.length; i++) {
          h ^= s.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }

      function disposeSolarSystem() {
        for (const p of solarSys.planets) {
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          solarSys.group.remove(p.mesh);
        }
        solarSys.planets.length = 0;
        solarSys.group.visible = false;
        solarSys.state = "NONE";
        solarSys.bodyIndex = -1;
      }

      // Phase-1 palette sampling: pull three stops from the scene's live
      // palette (warm / neutral / cool) for use as planet tints. Keeps each
      // scene's aesthetic intact.
      function samplePalette3(rngFn) {
        const stops = pointMat.uniforms.uPalette.value; // Vector3[8]
        const count = Math.max(2, pointMat.uniforms.uPaletteStops?.value || 5);
        const pick = () => {
          const idx = Math.floor(rngFn() * count);
          return stops[Math.min(idx, count - 1)];
        };
        return [pick(), pick(), pick()];
      }

      function generateSolarSystem(bodyIndex, kind) {
        disposeSolarSystem();
        if (!solarSys.enabled) return;
        // Phase 1: only stars get planets. Dust / halo / planet / BH skip.
        const starLike = kind === 0 || kind === 5 || kind === 6;
        if (!starLike) return;

        const sceneSalt = hash32Str(currentSceneKey || "none");
        const seed = (bodyIndex ^ sceneSalt ^ 0x9e3779b1) >>> 0;
        const rngFn = mulberry32(seed);

        // Not every star has planets. Rolling for presence first so barren
        // stars feel like real empty space — and finding one with a system
        // feels like a discovery. Tier thresholds (cumulative over 0..1):
        //   0.00 – 0.45  → barren         (45%)
        //   0.45 – 0.75  → lone companion (30%, 1–2 planets)
        //   0.75 – 1.00  → full system    (25%, 3–8 planets)
        const systemRoll = rngFn();
        if (systemRoll < 0.45) {
          // Barren star — record the bodyIndex so we don't regenerate, but
          // don't build any meshes. The followed star stands alone.
          solarSys.bodyIndex = bodyIndex;
          solarSys.state = "NONE";
          return;
        }
        const lone = systemRoll < 0.75;

        const count = lone
          ? 1 + Math.floor(rngFn() * 2) // 1–2
          : 3 + Math.floor(rngFn() * 6); // 3–8

        const palette = samplePalette3(rngFn);

        // First orbital radius, then Titius-Bode-ish scaling.
        let radius = 4 + rngFn() * 5;
        // Base orbital plane tilt (scene-wide)
        const basePitch = (rngFn() - 0.5) * 0.6;
        const baseRoll = (rngFn() - 0.5) * 0.6;

        for (let i = 0; i < count; i++) {
          if (radius > 40) break;
          const size = 0.25 + rngFn() * 1.25; // [0.25, 1.5]

          // Roll a planet type. Big planets lean gas giant; small planets
          // lean rocky/ocean/ice/lava.
          let type;
          if (size > 1.0 && rngFn() < 0.65) {
            type = PLANET_TYPE.GAS;
          } else {
            const r = rngFn();
            if (r < 0.45) type = PLANET_TYPE.ROCKY;
            else if (r < 0.7) type = PLANET_TYPE.OCEAN;
            else if (r < 0.88) type = PLANET_TYPE.ICE;
            else type = PLANET_TYPE.LAVA;
          }

          // Pick two palette stops and jitter them for a unique-per-planet look.
          const aBase = palette[Math.floor(rngFn() * 3)];
          let bBase = palette[Math.floor(rngFn() * 3)];
          if (bBase === aBase)
            bBase = palette[(palette.indexOf(aBase) + 1) % 3];
          const jitterA = 0.75 + rngFn() * 0.5;
          const jitterB = 0.75 + rngFn() * 0.5;
          const colorA = new THREE.Color(
            Math.min(1.2, aBase.x * jitterA),
            Math.min(1.2, aBase.y * jitterA),
            Math.min(1.2, aBase.z * jitterA),
          );
          let colorB = new THREE.Color(
            Math.min(1.2, bBase.x * jitterB),
            Math.min(1.2, bBase.y * jitterB),
            Math.min(1.2, bBase.z * jitterB),
          );
          // Type-specific colour biases so a lava world reads as lava even
          // when the scene palette is icy.
          if (type === PLANET_TYPE.LAVA) {
            colorB = new THREE.Color(1.0, 0.45, 0.1).lerp(colorB, 0.35);
          } else if (type === PLANET_TYPE.ICE) {
            colorA = new THREE.Color(0.7, 0.85, 1.05).lerp(colorA, 0.4);
          } else if (type === PLANET_TYPE.OCEAN) {
            colorA = new THREE.Color(0.18, 0.35, 0.75).lerp(colorA, 0.35);
          }

          const geo = new THREE.IcosahedronGeometry(size, 2);
          const mat = makePlanetMaterial(type, colorA, colorB, rngFn() * 10.0);
          const mesh = new THREE.Mesh(geo, mat);
          solarSys.group.add(mesh);

          // Each planet's orbital plane gets extra tilt on top of the base.
          const pitch = basePitch + (rngFn() - 0.5) * 0.35;
          const roll = baseRoll + (rngFn() - 0.5) * 0.35;
          const tiltMat = new THREE.Matrix4()
            .makeRotationX(pitch)
            .multiply(new THREE.Matrix4().makeRotationZ(roll));

          // Angular speed: Kepler-ish. Inner planets zip; outer crawl.
          const angularSpeed =
            (0.9 / Math.sqrt(radius)) * (0.8 + rngFn() * 0.4);
          solarSys.planets.push({
            mesh,
            angle: rngFn() * Math.PI * 2,
            angularSpeed,
            radius,
            tiltMat,
            spinSpeed: 0.3 + rngFn() * 1.5,
          });

          // Advance radius for the next planet.
          radius *= 1.4 + rngFn() * 0.7; // [1.4, 2.1]
        }

        solarSys.bodyIndex = bodyIndex;
        solarSys.state = "MATERIALISING";
        solarSys.scaleT = 0;
        solarSys.scaleDur = 0.9;
        solarSys.group.scale.setScalar(0);
        solarSys.group.visible = true;
      }

      function dissolveSolarSystem() {
        if (solarSys.state !== "ACTIVE" && solarSys.state !== "MATERIALISING")
          return;
        solarSys.state = "DISSOLVING";
        solarSys.scaleT = 0;
        solarSys.scaleDur = 1.2;
      }

      const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
      const easeInCubic = (t) => t * t * t;

      const _solarStarWorld = new THREE.Vector3();
      const _solarOrbitTmp = new THREE.Vector3();
      function updateSolarSystem(realDt) {
        if (solarSys.state === "NONE") return;
        // The group rides the followed body's world position. If follow-cam
        // released, we still know the last _bodyPos for the dissolve frames.
        solarSys.group.position.copy(followCam._bodyPos);

        if (solarSys.state === "MATERIALISING") {
          solarSys.scaleT += realDt;
          const t = clamp(solarSys.scaleT / solarSys.scaleDur, 0, 1);
          solarSys.group.scale.setScalar(easeOutCubic(t));
          if (t >= 1) solarSys.state = "ACTIVE";
        } else if (solarSys.state === "DISSOLVING") {
          solarSys.scaleT += realDt;
          const t = clamp(solarSys.scaleT / solarSys.scaleDur, 0, 1);
          solarSys.group.scale.setScalar(1 - easeInCubic(t));
          if (t >= 1) {
            disposeSolarSystem();
            return;
          }
        }

        // Orbit + spin every planet, and refresh their per-frame uniforms
        // (star position in world space + simulation time for animations).
        _solarStarWorld.copy(solarSys.group.position);
        const nowSec = performance.now() * 0.001;
        for (const p of solarSys.planets) {
          p.angle += p.angularSpeed * realDt;
          _solarOrbitTmp.set(
            Math.cos(p.angle) * p.radius,
            0,
            Math.sin(p.angle) * p.radius,
          );
          _solarOrbitTmp.applyMatrix4(p.tiltMat);
          p.mesh.position.copy(_solarOrbitTmp);
          p.mesh.rotation.y += p.spinSpeed * realDt;
          const u = p.mesh.material.uniforms;
          if (u) {
            u.uStarPos.value.copy(_solarStarWorld);
            u.uTime.value = nowSec;
          }
        }
      }

      // ===============================================================
      // 22b. CINEMATIC DIRECTOR
      // ===============================================================
      const PACE_MULT = { slow: 1.4, normal: 1.0, restless: 0.65 };
      const PACE_ORDER = ["slow", "normal", "restless"];

      // --- Flavours: director personalities (see CINEMATIC_MODES.md) ---
      // Each entry is a preset of timings, scene filter, camera/move bias,
      // transition grammar, breathing amplitudes, accent/mood rates.
      // Timings are base ranges (seconds); pace still multiplies on top.
