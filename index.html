        renderer.setSize(viewW, viewH, false);
        composer.setSize(viewW, viewH);
        camera.aspect = viewW / viewH;
        camera.updateProjectionMatrix();

        const a = document.createElement("a");
        a.href = url;
        a.download = `universe_${currentSceneKey}_${Date.now()}.png`;
        a.click();
        sfx.play("click");
      }

      function exportJSON() {
        const payload = {
          version: 1,
          scene: currentSceneKey,
          collision:
            currentSceneKey === "collision" ? { ...collision } : undefined,
          params: { ...params },
          camera: {
            pos: camera.position.toArray(),
            tgt: controls.target.toArray(),
            fov: camera.fov,
          },
          state: {
            positions: Array.from(state.positions.slice(0, state.count * 4)),
            velocities: Array.from(state.velocities.slice(0, state.count * 4)),
            count: state.count,
          },
          simTime,
        };
        const blob = new Blob([JSON.stringify(payload)], {
          type: "application/json",
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `universe_${currentSceneKey}_${Date.now()}.json`;
        a.click();
        sfx.play("click");
      }
      function importPrompt() {
        const inp = document.createElement("input");
        inp.type = "file";
        inp.accept = "application/json";
        inp.onchange = async () => {
          const f = inp.files[0];
          if (!f) return;
          try {
            const txt = await f.text();
            const data = JSON.parse(txt);
            if (!data || data.version !== 1) throw new Error("bad version");
            currentSceneKey = data.scene || "quiet-drift";
            if (data.collision) Object.assign(collision, data.collision);
            Object.assign(params, data.params || {});
            // Push simulation state
            zero();
            const src = data.state;
            for (let i = 0; i < src.count; i++) {
              state.positions[i * 4 + 0] = src.positions[i * 4 + 0];
              state.positions[i * 4 + 1] = src.positions[i * 4 + 1];
              state.positions[i * 4 + 2] = src.positions[i * 4 + 2];
              state.positions[i * 4 + 3] = src.positions[i * 4 + 3];
              state.velocities[i * 4 + 0] = src.velocities[i * 4 + 0];
              state.velocities[i * 4 + 1] = src.velocities[i * 4 + 1];
              state.velocities[i * 4 + 2] = src.velocities[i * 4 + 2];
              state.velocities[i * 4 + 3] = src.velocities[i * 4 + 3];
            }
            state.count = src.count;
            uploadStateToGPU();
            // Apply look without regenerating bodies
            const sc = SCENES[currentSceneKey];
            if (sc) {
              uploadK(K_PRESETS[sc.K] || K_PRESETS.neutral);
              applySceneLook(sc);
              applyScenePhysics(sc);
              setPostParams({
                bloom: params.bloomStrength,
                bloomRadius: params.bloomRadius,
                exposure: params.exposure,
                ca: params.ca,
                vignette: params.vignette,
                grain: params.grain,
              });
            }
            camera.position.fromArray(data.camera.pos);
            controls.target.fromArray(data.camera.tgt);
            camera.fov = data.camera.fov;
            params.fov = data.camera.fov;
            camera.updateProjectionMatrix();
            simTime = data.simTime || 0;
            syncUIToScene();
          } catch (e) {
            console.error("Import failed", e);
          }
        };
        inp.click();
      }

      // Share links — encode the current seed + scene + view so the same
      // starting shot loads deterministically elsewhere. Scene factories
      // draw from the seeded PRNG, so identical seeds regenerate identical
      // initial bodies. GPU float order diverges after a few hundred frames;
      // shares reproduce the opening composition, not a frame-exact replay.
      function collectShareState() {
        const s = {
          v: 1,
          scene: currentSceneKey,
          seed: currentSeed(),
          cam: [
            +camera.position.x.toFixed(3),
            +camera.position.y.toFixed(3),
            +camera.position.z.toFixed(3),
            +controls.target.x.toFixed(3),
            +controls.target.y.toFixed(3),
            +controls.target.z.toFixed(3),
            +camera.fov.toFixed(2),
          ],
          palette: params.palette,
          channel: params.channel,
          post: {
            bloom: +params.bloomStrength.toFixed(3),
            bloomRadius: +params.bloomRadius.toFixed(3),
            exposure: +params.exposure.toFixed(3),
            ca: +params.ca.toFixed(3),
            vignette: +params.vignette.toFixed(3),
            grain: +params.grain.toFixed(3),
            trail: +(params.trail || 0).toFixed(3),
            doppler: +(params.doppler || 0).toFixed(3),
          },
        };
        if (currentSceneKey === "collision" && collision.scenario) {
          s.collisionScenario = collision.scenario;
        }
        return s;
      }

      async function encodeShare(obj) {
        const json = JSON.stringify(obj);
        const bytes = new TextEncoder().encode(json);
        const cs = new CompressionStream("deflate-raw");
        const w = cs.writable.getWriter();
        w.write(bytes);
        w.close();
        const buf = new Uint8Array(
          await new Response(cs.readable).arrayBuffer(),
        );
        let bin = "";
        for (let i = 0; i < buf.length; i++) bin += String.fromCharCode(buf[i]);
        return btoa(bin)
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
      }

      async function decodeShare(s) {
        const b64 = s.replace(/-/g, "+").replace(/_/g, "/");
        const pad = b64.length % 4 ? "=".repeat(4 - (b64.length % 4)) : "";
        const bytes = Uint8Array.from(atob(b64 + pad), (c) => c.charCodeAt(0));
        const ds = new DecompressionStream("deflate-raw");
        const w = ds.writable.getWriter();
        w.write(bytes);
        w.close();
        const buf = await new Response(ds.readable).arrayBuffer();
        return JSON.parse(new TextDecoder().decode(buf));
      }

      async function buildShareUrl() {
        const enc = await encodeShare(collectShareState());
        // Use href-minus-query so it works under both http(s) and file://.
        const base = location.href.split(/[?#]/)[0];
        return base + "?s=" + enc;
      }

      async function applyShareState(obj) {
        if (!obj || typeof obj !== "object") return false;
        if (obj.v && obj.v > 1) {
          showToast("Share link", "newer format — reload page");
          return false;
        }
        const key = obj.scene in SCENES ? obj.scene : "quiet-drift";
        applyScene(key, {
          immediate: true,
          seed: obj.seed | 0,
          scenario: obj.collisionScenario,
        });
        if (obj.cam && obj.cam.length >= 7) {
          camera.position.set(obj.cam[0], obj.cam[1], obj.cam[2]);
          controls.target.set(obj.cam[3], obj.cam[4], obj.cam[5]);
          camera.fov = obj.cam[6];
          params.fov = obj.cam[6];
          camera.updateProjectionMatrix();
        }
        if (obj.palette && PALETTES[obj.palette]) {
          params.palette = obj.palette;
          applyPalette(obj.palette);
        }
        if (obj.channel && obj.channel in CHANNELS) {
          params.channel = obj.channel;
          pointMat.uniforms.uChannel.value = channelValueFromName(obj.channel);
        }
        if (obj.post) {
          const p = obj.post;
          if (p.bloom != null) params.bloomStrength = p.bloom;
          if (p.bloomRadius != null) params.bloomRadius = p.bloomRadius;
          if (p.exposure != null) params.exposure = p.exposure;
          if (p.ca != null) params.ca = p.ca;
          if (p.vignette != null) params.vignette = p.vignette;
          if (p.grain != null) params.grain = p.grain;
          if (p.trail != null) params.trail = p.trail;
          if (p.doppler != null) params.doppler = p.doppler;
          setPostParams({
            bloom: params.bloomStrength,
            bloomRadius: params.bloomRadius,
            exposure: params.exposure,
            ca: params.ca,
            vignette: params.vignette,
            grain: params.grain,
          });
        }
        syncUIToScene();
        return true;
      }

      async function copyShareLinkToClipboard() {
        try {
          const url = await buildShareUrl();
          await navigator.clipboard.writeText(url);
          showToast("Share link", "copied");
        } catch (e) {
          showToast("Share link", "copy failed");
        }
      }

      async function pasteAndApplyShareLink() {
        try {
          const txt = (await navigator.clipboard.readText()).trim();
          if (!txt) return;
          const url = new URL(txt, location.href);
          const s = url.searchParams.get("s");
          const seedParam = url.searchParams.get("seed");
          const sceneParam = url.searchParams.get("scene");
          if (s) {
            const obj = await decodeShare(s);
            await applyShareState(obj);
          } else if (seedParam || sceneParam) {
            const key =
              sceneParam && sceneParam in SCENES ? sceneParam : currentSceneKey;
            const seed = seedParam
              ? parseInt(seedParam.replace(/^0x/i, ""), 16) >>> 0
              : undefined;
            applyScene(key, { immediate: true, seed });
          } else {
            showToast("Paste", "no share data in link");
          }
        } catch (e) {
          showToast("Paste", "not a valid share link");
        }
      }

      function seedToHex(n) {
        return "0x" + (n >>> 0).toString(16).padStart(8, "0");
      }

      // Recording (webm via MediaRecorder on the canvas stream)
      let recorder = null;
      let recChunks = [];
      function isRecording() {
        return recorder !== null;
      }
      function toggleRecording() {
        if (isRecording()) {
          recorder.stop();
        } else {
          try {
            const stream = renderer.domElement.captureStream(60);
            const opts = [
              "video/webm;codecs=vp9",
              "video/webm;codecs=vp8",
              "video/webm",
            ];
            let mime = "";
            for (const m of opts)
              if (MediaRecorder.isTypeSupported(m)) {
                mime = m;
                break;
              }
            recorder = new MediaRecorder(stream, {
              mimeType: mime,
              videoBitsPerSecond: 20_000_000,
            });
            recChunks = [];
            recorder.ondataavailable = (e) => {
              if (e.data.size > 0) recChunks.push(e.data);
            };
            recorder.onstop = () => {
              const blob = new Blob(recChunks, { type: "video/webm" });
              const a = document.createElement("a");
              a.href = URL.createObjectURL(blob);
              a.download = `universe_${currentSceneKey}_${Date.now()}.webm`;
              a.click();
              recorder = null;
              recChunks = [];
              $("#rec-dot").classList.remove("active");
              if (activePanel === "capture") buildPanel("capture");
            };
            recorder.start();
            $("#rec-dot").classList.add("active");
            if (activePanel === "capture") buildPanel("capture");
          } catch (e) {
            console.error("Recording failed", e);
          }
        }
      }

      // ===============================================================
      // 23b. FIDENZA  (capture a frame as a generative artwork)
      // ===============================================================
      // Phase 1 per FIDENZA_FILTER.md — read the live position + velocity
      // textures, project to 2D, build a smooth flow field from that
      // specific moment's motion, walk non-overlapping flow-field strokes,
      // render to a high-res canvas, download as PNG. Pure CPU render after
      // the one GPU readback; no composer / shader / sim changes.
      // Active style for the single "Generate" button in the Capture panel.
      // Hotkeys I / U still trigger their own style directly regardless.
      let captureStyle = "fidenza"; // fidenza | filament
      const fidenzaOpts = {
        density: 1500, // target stroke count
        thickness: "mixed", // thin | mixed | fat
        curlBias: 0.2, // 0 = sim field only, 1 = curl noise only
        bg: "ink", // ink | cream | void
        seedSource: "bodies", // bodies | grid
        resolutionPx: 2560, // longest edge
      };

      function _fidenzaSnapshotFrame() {
        const posBuf = new Float32Array(MAX_BODIES * 4);
        const velBuf = new Float32Array(MAX_BODIES * 4);
        renderer.readRenderTargetPixels(
          gpu.getCurrentRenderTarget(posVar),
          0,
          0,
          TEX_SIZE,
          TEX_SIZE,
          posBuf,
        );
        renderer.readRenderTargetPixels(
          gpu.getCurrentRenderTarget(velVar),
          0,
          0,
          TEX_SIZE,
          TEX_SIZE,
          velBuf,
        );
        const mvp = new THREE.Matrix4().multiplyMatrices(
          camera.projectionMatrix,
          camera.matrixWorldInverse,
        );
        const stops = [];
        const paletteU = pointMat.uniforms.uPalette.value;
        const stopCount = Math.max(
          2,
          Math.round(pointMat.uniforms.uPaletteStops.value || 5),
        );
        for (let i = 0; i < stopCount; i++) {
          const s = paletteU[i];
          stops.push([s.x, s.y, s.z]);
        }
        return {
          posBuf,
          velBuf,
          mvp,
          count: MAX_BODIES,
          aspect: camera.aspect,
          palette: stops,
          sceneKey: currentSceneKey,
        };
      }

      function _fidenzaBuildFlowField(frame, res, curlBias) {
        const field = new Float32Array(res * res * 2);
        const counts = new Float32Array(res * res);
        const v3 = new THREE.Vector3();
        const v3b = new THREE.Vector3();
        for (let i = 0; i < frame.count; i++) {
          const m = frame.posBuf[i * 4 + 3];
          if (m <= 0) continue;
          v3.set(
            frame.posBuf[i * 4],
            frame.posBuf[i * 4 + 1],
            frame.posBuf[i * 4 + 2],
          ).applyMatrix4(frame.mvp);
          if (v3.z < -1 || v3.z > 1) continue;
          if (v3.x < -1.3 || v3.x > 1.3 || v3.y < -1.3 || v3.y > 1.3) continue;
          const stepT = 0.02;
          v3b
            .set(
              frame.posBuf[i * 4] + frame.velBuf[i * 4] * stepT,
              frame.posBuf[i * 4 + 1] + frame.velBuf[i * 4 + 1] * stepT,
              frame.posBuf[i * 4 + 2] + frame.velBuf[i * 4 + 2] * stepT,
            )
            .applyMatrix4(frame.mvp);
          const vx = v3b.x - v3.x;
          const vy = v3b.y - v3.y;
          const sx = (v3.x * 0.5 + 0.5) * res;
          const sy = (v3.y * 0.5 + 0.5) * res;
          if (sx < 0 || sx >= res || sy < 0 || sy >= res) continue;
          const w0 = Math.min(50, Math.log2(1 + m) * 4);
          const cx = Math.floor(sx);
          const cy = Math.floor(sy);
          for (let dy = -3; dy <= 3; dy++) {
            for (let dx = -3; dx <= 3; dx++) {
              const x = cx + dx,
                y = cy + dy;
              if (x < 0 || x >= res || y < 0 || y >= res) continue;
              const r2 = dx * dx + dy * dy;
              if (r2 > 9) continue;
              const wt = Math.exp(-r2 * 0.35) * w0;
              const idx = (y * res + x) * 2;
              field[idx] += vx * wt;
              field[idx + 1] += vy * wt;
              counts[y * res + x] += wt;
            }
          }
        }
        for (let i = 0; i < res * res; i++) {
          const c = counts[i];
          if (c > 0) {
            field[i * 2] /= c;
            field[i * 2 + 1] /= c;
          }
        }
        // Separable 5-tap Gaussian smoothing so strokes don't zig-zag.
        const tmp = new Float32Array(res * res * 2);
        const k = [0.06, 0.24, 0.4, 0.24, 0.06];
        for (let y = 0; y < res; y++) {
          for (let x = 0; x < res; x++) {
            let ax = 0,
              ay = 0;
            for (let t = -2; t <= 2; t++) {
              const xi = Math.max(0, Math.min(res - 1, x + t));
              ax += field[(y * res + xi) * 2] * k[t + 2];
              ay += field[(y * res + xi) * 2 + 1] * k[t + 2];
            }
            tmp[(y * res + x) * 2] = ax;
            tmp[(y * res + x) * 2 + 1] = ay;
          }
        }
        for (let y = 0; y < res; y++) {
          for (let x = 0; x < res; x++) {
            let ax = 0,
              ay = 0;
            for (let t = -2; t <= 2; t++) {
              const yi = Math.max(0, Math.min(res - 1, y + t));
              ax += tmp[(yi * res + x) * 2] * k[t + 2];
              ay += tmp[(yi * res + x) * 2 + 1] * k[t + 2];
            }
            field[(y * res + x) * 2] = ax;
            field[(y * res + x) * 2 + 1] = ay;
          }
        }
        // Blend in a curl-noise baseline so voids still have direction.
        for (let y = 0; y < res; y++) {
          for (let x = 0; x < res; x++) {
            const i = (y * res + x) * 2;
            const vxs = field[i];
            const vys = field[i + 1];
            const cxn = Math.sin(x * 0.12 + y * 0.07);
            const cyn = Math.cos(x * 0.07 - y * 0.11);
            field[i] = vxs * (1 - curlBias) + cxn * curlBias * 0.02;
            field[i + 1] = vys * (1 - curlBias) + cyn * curlBias * 0.02;
            // Normalise to unit length so step size is stable.
            const mag = Math.hypot(field[i], field[i + 1]);
            if (mag < 1e-6) {
              field[i] = 0.001;
              field[i + 1] = 0.001;
            } else {
              field[i] /= mag;
              field[i + 1] /= mag;
            }
          }
        }
        return field;
      }

      function _fidenzaSampleField(field, res, nx, ny) {
        const x = Math.max(0, Math.min(res - 1.001, nx * res));
        const y = Math.max(0, Math.min(res - 1.001, ny * res));
        const ix = Math.floor(x);
        const iy = Math.floor(y);
        const fx = x - ix;
        const fy = y - iy;
        const i00 = (iy * res + ix) * 2;
        const i10 = (iy * res + ix + 1) * 2;
        const i01 = ((iy + 1) * res + ix) * 2;
        const i11 = ((iy + 1) * res + ix + 1) * 2;
        const w00 = (1 - fx) * (1 - fy);
        const w10 = fx * (1 - fy);
        const w01 = (1 - fx) * fy;
        const w11 = fx * fy;
        return [
          field[i00] * w00 +
            field[i10] * w10 +
            field[i01] * w01 +
            field[i11] * w11,
          field[i00 + 1] * w00 +
            field[i10 + 1] * w10 +
            field[i01 + 1] * w01 +
            field[i11 + 1] * w11,
        ];
      }

      function _fidenzaWalkStrokes(field, fieldRes, frame, opts) {
        const seeds = [];
        const v3 = new THREE.Vector3();
        if (opts.seedSource === "bodies") {
          for (let i = 0; i < frame.count; i++) {
            const m = frame.posBuf[i * 4 + 3];
            if (m <= 0) continue;
            v3.set(
              frame.posBuf[i * 4],
              frame.posBuf[i * 4 + 1],
              frame.posBuf[i * 4 + 2],
            ).applyMatrix4(frame.mvp);
            if (v3.z < -1 || v3.z > 1) continue;
            const nx = (v3.x + 1) * 0.5;
            const ny = (v3.y + 1) * 0.5;
            if (nx < -0.05 || nx > 1.05 || ny < -0.05 || ny > 1.05) continue;
            // Kind is packed in the velocity texture's .w as floor(.w) + ageNorm.
            const kind = Math.floor((frame.velBuf[i * 4 + 3] || 0) + 0.001);
            seeds.push({ nx, ny, mass: m, kind });
          }
          if (seeds.length > opts.density) {
            for (let i = seeds.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              const tmp = seeds[i];
              seeds[i] = seeds[j];
              seeds[j] = tmp;
            }
            seeds.length = opts.density;
          }
        } else {
          const n = Math.ceil(Math.sqrt(opts.density));
          for (let iy = 0; iy < n; iy++) {
            for (let ix = 0; ix < n; ix++) {
              seeds.push({
                nx: (ix + 0.5 + (Math.random() - 0.5) * 0.8) / n,
                ny: (iy + 0.5 + (Math.random() - 0.5) * 0.8) / n,
                mass: 1.0,
                kind: 0,
              });
            }
          }
        }

        const sampleT = () => {
          const r = Math.random();
          if (opts.thickness === "thin") {
            return 0.0008 + 0.0025 * Math.random();
          } else if (opts.thickness === "fat") {
            if (r < 0.25) return 0.002 + 0.004 * Math.random();
            return 0.008 + 0.008 * Math.random();
          } else {
            if (r < 0.7) return 0.0008 + 0.002 * Math.random();
            if (r < 0.93) return 0.003 + 0.005 * Math.random();
            return 0.008 + 0.008 * Math.random();
          }
        };

        for (const s of seeds) {
          const massNorm = Math.min(1, Math.log2(1 + s.mass) / 7);
          s.thickness = sampleT() * (0.7 + massNorm * 1.3);
        }
        seeds.sort((a, b) => b.thickness - a.thickness);

        const gridRes = 256;
        const grid = new Array(gridRes * gridRes).fill(null);
        function addToGrid(nx, ny, radius) {
          const gx = Math.floor(nx * gridRes);
          const gy = Math.floor(ny * gridRes);
          const r = Math.ceil(radius * gridRes) + 1;
          for (let dy = -r; dy <= r; dy++) {
            for (let dx = -r; dx <= r; dx++) {
              const x = gx + dx,
                y = gy + dy;
              if (x < 0 || x >= gridRes || y < 0 || y >= gridRes) continue;
              const gi = y * gridRes + x;
              if (!grid[gi]) grid[gi] = [];
              grid[gi].push({ nx, ny, radius });
            }
          }
        }
        function collides(nx, ny, radius) {
          const gx = Math.floor(nx * gridRes);
          const gy = Math.floor(ny * gridRes);
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const x = gx + dx,
                y = gy + dy;
              if (x < 0 || x >= gridRes || y < 0 || y >= gridRes) continue;
              const cell = grid[y * gridRes + x];
              if (!cell) continue;
              for (let i = 0; i < cell.length; i++) {
                const p = cell[i];
                const dnx = p.nx - nx;
                const dny = p.ny - ny;
                const d2 = dnx * dnx + dny * dny;
                const minR = (p.radius + radius) * 1.02;
                if (d2 < minR * minR) return true;
              }
            }
          }
          return false;
        }

        const strokes = [];
        const stepSize = 0.005;
        const maxSteps = 180;
        for (const seed of seeds) {
          const rad = seed.thickness * 0.5;
          if (collides(seed.nx, seed.ny, rad)) continue;
          const points = [{ x: seed.nx, y: seed.ny }];
          let cx = seed.nx,
            cy = seed.ny;
          for (let i = 0; i < maxSteps; i++) {
            const s = _fidenzaSampleField(field, fieldRes, cx, cy);
            cx += s[0] * stepSize;
            cy += s[1] * stepSize;
            if (cx < 0 || cx > 1 || cy < 0 || cy > 1) break;
            if (collides(cx, cy, rad)) break;
            points.push({ x: cx, y: cy });
          }
          cx = seed.nx;
          cy = seed.ny;
          for (let i = 0; i < maxSteps; i++) {
            const s = _fidenzaSampleField(field, fieldRes, cx, cy);
            cx -= s[0] * stepSize;
            cy -= s[1] * stepSize;
            if (cx < 0 || cx > 1 || cy < 0 || cy > 1) break;
            if (collides(cx, cy, rad)) break;
            points.unshift({ x: cx, y: cy });
          }
          if (points.length < 4) continue;
          for (const p of points) addToGrid(p.x, p.y, rad);
          strokes.push({
            points,
            thickness: seed.thickness,
            mass: seed.mass,
            kind: seed.kind | 0,
          });
        }
        return strokes;
      }

      function _fidenzaAssignPalette(strokes, frame) {
        const stops = frame.palette.map(([r, g, b]) => {
          const R = Math.max(0, Math.min(255, Math.round(r * 255)));
          const G = Math.max(0, Math.min(255, Math.round(g * 255)));
          const B = Math.max(0, Math.min(255, Math.round(b * 255)));
          return "rgb(" + R + "," + G + "," + B + ")";
        });
        if (stops.length === 0) stops.push("rgb(200,200,200)");
        const weights = stops.map((_, i) => {
          if (i === 0) return 0.6;
          if (i <= 3) return 0.35 / Math.min(3, Math.max(1, stops.length - 1));
          return 0.05 / Math.max(1, stops.length - 4);
        });
        let wSum = 0;
        for (const w of weights) wSum += w;
        const normalised = weights.map((w) => w / wSum);
        for (const s of strokes) {
          const r = Math.random();
          let acc = 0;
          s.color = stops[0];
          for (let i = 0; i < stops.length; i++) {
            acc += normalised[i];
            if (r <= acc) {
              s.color = stops[i];
              break;
            }
          }
        }
      }

      function _fidenzaBackground(bg) {
        if (bg === "cream") return "#efe8d5";
        if (bg === "void") return null;
        return "#0a0a12";
      }

      function _fidenzaRender(strokes, opts, frame) {
        const aspect = frame.aspect;
        const longest = opts.resolutionPx;
        let W, H;
        if (aspect >= 1) {
          W = longest;
          H = Math.max(1, Math.round(longest / aspect));
        } else {
          H = longest;
          W = Math.max(1, Math.round(longest * aspect));
        }
        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext("2d");
        const bg = _fidenzaBackground(opts.bg);
        if (bg) {
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, W, H);
        }
        const minDim = Math.min(W, H);
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        for (const s of strokes) {
          ctx.strokeStyle = s.color;
          ctx.lineWidth = Math.max(1, s.thickness * minDim);
          ctx.beginPath();
          // Canvas Y is top-down; NDC-derived Y is bottom-up. Flip.
          ctx.moveTo(s.points[0].x * W, (1 - s.points[0].y) * H);
          for (let i = 1; i < s.points.length; i++) {
            ctx.lineTo(s.points[i].x * W, (1 - s.points[i].y) * H);
          }
          ctx.stroke();
        }
        return canvas;
      }

      let _fidenzaRunning = false;
      function generateFidenza(userOpts) {
        if (_fidenzaRunning) return;
        _fidenzaRunning = true;
        const opts = Object.assign({}, fidenzaOpts, userOpts || {});
        showToast("Fidenza", "generating…");
        // Defer so the toast paints before the main thread blocks.
        setTimeout(() => {
          try {
            const t0 = performance.now();
            const frame = _fidenzaSnapshotFrame();
            const fieldRes = 256;
            const field = _fidenzaBuildFlowField(
              frame,
              fieldRes,
              opts.curlBias,
            );
            const strokes = _fidenzaWalkStrokes(field, fieldRes, frame, opts);
            _fidenzaAssignPalette(strokes, frame);
            const canvas = _fidenzaRender(strokes, opts, frame);
            canvas.toBlob((blob) => {
              if (!blob) {
                showToast("Fidenza", "png encode failed");
                return;
              }
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = `fidenza_${frame.sceneKey}_${Date.now()}.png`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              setTimeout(() => URL.revokeObjectURL(url), 30000);
              const ms = Math.round(performance.now() - t0);
              showToast("Fidenza", strokes.length + " strokes · " + ms + "ms");
            }, "image/png");
          } catch (e) {
            console.error("Fidenza generate failed", e);
            showToast("Fidenza", "failed · see console");
          } finally {
            _fidenzaRunning = false;
          }
        }, 50);
      }

      // ===============================================================
      // 23c. FILAMENT  (same flow field, rendered as bead chains)
      // ===============================================================
      // Sibling to Fidenza per FILAMENT.md. Reuses the snapshot, flow-field
      // build, and stroke walker. The render step is different: each chain
      // becomes a tapered string of decorative circles ("beads"), where
      // every bead picks one of six treatments (solid / rings / split /
      // pie / dots / hollow). Palette bias is per-chain rather than per-
      // stroke, which creates the characteristic colour-region effect.
      const filamentOpts = {
        scale: "mixed", // small | mixed | large  — reshapes density/beadScale/thicknessPreset
        beadMix: "classic", // classic | bold | quiet — treatment weights
        // Render knobs (default to Mixed scale, Classic beads; apply() below
        // overrides these from the current scale preset on every generate).
        density: 800,
        beadScale: 2.2,
        thicknessPreset: "mixed",
        taper: 0.7,
        beadGap: 0.12,
        beadVar: 0.15,
        spineAlpha: 0.22,
        thinRate: 0.1,
        outline: 0.7,
        bg: "ink", // shared with Fidenza
      };

      // Scale preset → chain count / bead size / walker thickness. Each gives
      // a recognisably different composition: small = lattice, mixed =
      // bimodal (default), large = jewellery.
      const FILAMENT_SCALES = {
        small: {
          density: 1400,
          beadScale: 1.2,
          thicknessPreset: "thin",
          thinRate: 0.22,
        },
        mixed: {
          density: 800,
          beadScale: 2.2,
          thicknessPreset: "mixed",
          thinRate: 0.1,
        },
        large: {
          density: 380,
          beadScale: 3.6,
          thicknessPreset: "fat",
          thinRate: 0.05,
        },
      };

      // Bead-mix preset → treatment weights. Three voicings: Classic is the
      // reference default; Bold leans graphic (solid + split, rare rings);
      // Quiet leans airy (more hollow + rings, sparse bright infill).
      const FILAMENT_BEAD_MIXES = {
        classic: {
          solid: 40,
          rings: 18,
          split: 14,
          pie: 10,
          dots: 12,
          hollow: 6,
        },
        bold: { solid: 50, rings: 12, split: 22, pie: 8, dots: 6, hollow: 2 },
        quiet: { solid: 25, rings: 30, split: 10, pie: 4, dots: 6, hollow: 25 },
      };

      function _filamentActiveMix() {
        return (
          FILAMENT_BEAD_MIXES[filamentOpts.beadMix] ||
          FILAMENT_BEAD_MIXES.classic
        );
      }

      // Map RGB (0..1) triples from scene palette to hex strings once per
      // generate so the draw loop doesn't rebuild them per bead.
      function _filamentHexPalette(frame) {
        const stops = frame.palette
          .map(([r, g, b]) => {
            const R = Math.max(0, Math.min(255, Math.round(r * 255)));
            const G = Math.max(0, Math.min(255, Math.round(g * 255)));
            const B = Math.max(0, Math.min(255, Math.round(b * 255)));
            return [R, G, B];
          })
          .map(
            (rgb) =>
              "#" + rgb.map((v) => v.toString(16).padStart(2, "0")).join(""),
          );
        if (stops.length === 0) stops.push("#cccccc");
        return stops;
      }

      function _filamentHueScore(hex) {
        // Warmness: R - B, normalised to roughly [-1, 1].
        const r = parseInt(hex.slice(1, 3), 16) / 255;
        const b = parseInt(hex.slice(5, 7), 16) / 255;
        return r - b;
      }
      function _filamentLightness(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return (r + g + b) / (3 * 255);
      }

      // Pick a curve-local palette: a small subset of the global palette,
      // weighted so the first pick dominates. Kind-biased: BHs favour warm
      // picks, dust favours pale, halos favour cool/dim, everything else
      // is a fair random draw.
      function _filamentPickCurveBias(globalStops, kind, rng) {
        const pool = globalStops.slice();
        if (kind === 2) {
          // BH — sort warmest first so they're more likely picked.
          pool.sort((a, b) => _filamentHueScore(b) - _filamentHueScore(a));
        } else if (kind === 3) {
          // Dust — palest first.
          pool.sort((a, b) => _filamentLightness(b) - _filamentLightness(a));
        } else if (kind === 4) {
          // Halo — darkest/coolest first.
          pool.sort((a, b) => _filamentHueScore(a) - _filamentHueScore(b));
        } else {
          // Stars / galaxy bodies — shuffle fairly.
          for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(rng() * (i + 1));
            const tmp = pool[i];
            pool[i] = pool[j];
            pool[j] = tmp;
          }
        }
        const n = 2 + Math.floor(rng() * 3); // 2..4 picks
        const picks = pool.slice(0, Math.min(n, pool.length));
        // Weight the kind-biased ordering by 0.7^i so pick[0] dominates.
        // For fair shuffles we already shuffled, so weights still apply.
        const weights = picks.map((_, i) => Math.pow(0.7, i));
        return { picks, weights };
      }

      function _filamentPickBiased(bias, rng) {
        let total = 0;
        for (let i = 0; i < bias.weights.length; i++) total += bias.weights[i];
        let r = rng() * total;
        for (let i = 0; i < bias.picks.length; i++) {
          r -= bias.weights[i];
          if (r <= 0) return bias.picks[i];
        }
        return bias.picks[bias.picks.length - 1];
      }

      function _filamentPickTreatment(rng) {
        const mix = _filamentActiveMix();
        const entries = [
          ["solid", mix.solid],
          ["rings", mix.rings],
          ["split", mix.split],
          ["pie", mix.pie],
          ["dots", mix.dots],
          ["hollow", mix.hollow],
        ];
        let total = 0;
        for (const [, w] of entries) total += w;
        let r = rng() * total;
        for (const [name, w] of entries) {
          r -= w;
          if (r <= 0) return name;
        }
        return "solid";
      }

      function _filamentDrawBead(ctx, b, bias, ink, outW, rng) {
        const { x, y, r, tx, ty } = b;
        const along = Math.atan2(ty, tx);
        const treat = _filamentPickTreatment(rng);
        // Guard tiny beads — complex treatments just smudge.
        const effectiveTreat = r < 4 ? "solid" : treat;
        const fill = (cx, cy, rr, color) => {
          ctx.beginPath();
          ctx.arc(cx, cy, Math.max(0.5, rr), 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
        };
        const stroke = (cx, cy, rr, color, lw) => {
          ctx.beginPath();
          ctx.arc(cx, cy, Math.max(0.5, rr), 0, Math.PI * 2);
          ctx.strokeStyle = color;
          ctx.lineWidth = lw;
          ctx.stroke();
        };
        ctx.lineJoin = "miter";
        ctx.lineCap = "butt";

        if (effectiveTreat === "solid") {
          fill(x, y, r, _filamentPickBiased(bias, rng));
          if (outW > 0.05) stroke(x, y, r, ink, outW);
        } else if (effectiveTreat === "rings") {
          const n = 2 + Math.floor(rng() * 4);
          for (let i = 0; i < n; i++) {
            const rr = r * (1 - i / n);
            fill(x, y, rr, _filamentPickBiased(bias, rng));
            if (outW > 0.05 && i > 0)
              stroke(x, y, rr, ink, Math.max(0.6, outW * 0.55));
          }
          if (outW > 0.05) stroke(x, y, r, ink, outW);
        } else if (effectiveTreat === "split") {
          const angle = along + (rng() < 0.5 ? 0 : Math.PI * 0.5);
          const cA = _filamentPickBiased(bias, rng);
          let cB = _filamentPickBiased(bias, rng);
          if (cB === cA && bias.picks.length > 1) {
            cB = _filamentPickBiased(bias, rng);
          }
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.arc(x, y, r, angle, angle + Math.PI);
          ctx.closePath();
          ctx.fillStyle = cA;
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.arc(x, y, r, angle + Math.PI, angle + Math.PI * 2);
          ctx.closePath();
          ctx.fillStyle = cB;
          ctx.fill();
          if (outW > 0.05) {
            ctx.beginPath();
            ctx.moveTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
            ctx.lineTo(
              x + Math.cos(angle + Math.PI) * r,
              y + Math.sin(angle + Math.PI) * r,
            );
            ctx.strokeStyle = ink;
            ctx.lineWidth = outW;
            ctx.stroke();
            stroke(x, y, r, ink, outW);
          }
        } else if (effectiveTreat === "pie") {
          const n = 3 + Math.floor(rng() * 4);
          const start = along;
          for (let i = 0; i < n; i++) {
            const a0 = start + (i / n) * Math.PI * 2;
            const a1 = start + ((i + 1) / n) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.arc(x, y, r, a0, a1);
            ctx.closePath();
            ctx.fillStyle = _filamentPickBiased(bias, rng);
            ctx.fill();
          }
          if (outW > 0.05) {
            for (let i = 0; i < n; i++) {
              const a = start + (i / n) * Math.PI * 2;
              ctx.beginPath();
              ctx.moveTo(x, y);
              ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
              ctx.strokeStyle = ink;
              ctx.lineWidth = Math.max(0.5, outW * 0.6);
              ctx.stroke();
            }
            stroke(x, y, r, ink, outW);
          }
        } else if (effectiveTreat === "dots") {
          fill(x, y, r, _filamentPickBiased(bias, rng));
          if (outW > 0.05) stroke(x, y, r, ink, outW);
          const nDots = 1 + Math.floor(rng() * 2);
          for (let i = 0; i < nDots; i++) {
            const dr = r * (0.28 + rng() * 0.28);
            fill(x, y, dr, _filamentPickBiased(bias, rng));
            if (outW > 0.05) stroke(x, y, dr, ink, Math.max(0.5, outW * 0.55));
          }
        } else if (effectiveTreat === "hollow") {
          const ringW = r * (0.15 + rng() * 0.25);
          ctx.beginPath();
          ctx.arc(x, y, Math.max(0.5, r - ringW * 0.5), 0, Math.PI * 2);
          ctx.strokeStyle = _filamentPickBiased(bias, rng);
          ctx.lineWidth = ringW;
          ctx.stroke();
          if (outW > 0.05) {
            stroke(x, y, r, ink, outW);
            stroke(x, y, Math.max(1, r - ringW), ink, outW);
          }
        }
      }

      function _filamentDrawChain(ctx, stroke, bias, opts, frame, rng, W, H) {
        const pts = stroke.points;
        if (pts.length < 3) return;
        const minDim = Math.min(W, H);
        const chainWidth = stroke.thickness * minDim;
        const baseRadius = chainWidth * 0.5 * opts.beadScale;
        const inkColor = opts.bg === "cream" ? "#1a140c" : "#f4eede"; // dark ink on cream, cream ink on dark
        // Canvas coords for stroke points (Y flipped).
        const cpts = new Array(pts.length);
        for (let i = 0; i < pts.length; i++) {
          cpts[i] = { x: pts[i].x * W, y: (1 - pts[i].y) * H };
        }
        // Arc-length table.
        const arc = new Float32Array(cpts.length);
        for (let i = 1; i < cpts.length; i++) {
          arc[i] =
            arc[i - 1] +
            Math.hypot(cpts[i].x - cpts[i - 1].x, cpts[i].y - cpts[i - 1].y);
        }
        const totalLen = arc[cpts.length - 1];
        if (totalLen < baseRadius * 1.2) return;

        // Thin-chain mode — render as ink spine, skip beads.
        if (rng() < opts.thinRate) {
          ctx.beginPath();
          ctx.moveTo(cpts[0].x, cpts[0].y);
          for (let i = 1; i < cpts.length; i++)
            ctx.lineTo(cpts[i].x, cpts[i].y);
          ctx.strokeStyle = inkColor;
          ctx.lineWidth = Math.max(0.8, chainWidth * 0.14);
          ctx.lineCap = "round";
          ctx.globalAlpha = 0.9;
          ctx.stroke();
          ctx.globalAlpha = 1;
          return;
        }

        // Faint spine underlay so widely-spaced bead chains still read as connected.
        if (opts.spineAlpha > 0.01) {
          const prev = ctx.globalAlpha;
          ctx.globalAlpha = opts.spineAlpha;
          ctx.beginPath();
          ctx.moveTo(cpts[0].x, cpts[0].y);
          for (let i = 1; i < cpts.length; i++)
            ctx.lineTo(cpts[i].x, cpts[i].y);
          ctx.strokeStyle = inkColor;
          ctx.lineWidth = Math.max(0.6, chainWidth * 0.07);
          ctx.lineCap = "round";
          ctx.stroke();
          ctx.globalAlpha = prev;
        }

        // Walk the arc placing beads. Taper radius toward endpoints.
        const sampleAt = (s) => {
          let lo = 0,
            hi = arc.length - 1;
          while (lo < hi) {
            const m = (lo + hi) >> 1;
            if (arc[m] < s) lo = m + 1;
            else hi = m;
          }
          const i1 = Math.max(1, lo);
          const i0 = i1 - 1;
          const span = Math.max(1e-6, arc[i1] - arc[i0]);
          const t = Math.min(1, Math.max(0, (s - arc[i0]) / span));
          const x = cpts[i0].x + (cpts[i1].x - cpts[i0].x) * t;
          const y = cpts[i0].y + (cpts[i1].y - cpts[i0].y) * t;
          const twin = 2;
          const a = Math.max(0, i0 - twin);
          const b = Math.min(cpts.length - 1, i1 + twin);
          let dx = cpts[b].x - cpts[a].x;
          let dy = cpts[b].y - cpts[a].y;
          const L = Math.hypot(dx, dy) || 1;
          dx /= L;
          dy /= L;
          return { x, y, tx: dx, ty: dy };
        };

        let s = Math.min(baseRadius, totalLen * 0.5);
        const endBuf = Math.min(baseRadius * 0.25, totalLen * 0.05);
        const beads = [];
        let iter = 0;
        while (s < totalLen - endBuf && iter++ < 1500) {
          const t = s / totalLen;
          const fromEnd = Math.min(t, 1 - t);
          const taperK = 1 - opts.taper + opts.taper * Math.min(1, fromEnd * 4);
          const vFactor = 1 + (rng() - 0.5) * 2 * opts.beadVar;
          const r = Math.max(1, baseRadius * taperK * vFactor);
          const p = sampleAt(s);
          beads.push({ x: p.x, y: p.y, r, tx: p.tx, ty: p.ty });
          s += Math.max(r * 0.8, r * 2 * (1 + opts.beadGap));
        }

        const outW =
          Math.max(0, opts.outline) *
          Math.max(0.8, Math.min(3.0, baseRadius * 0.05 + 0.6));
        for (const b of beads) {
          _filamentDrawBead(ctx, b, bias, inkColor, outW, rng);
        }
      }

      function _filamentBackground(bg) {
        if (bg === "cream") return "#efe8d5";
        if (bg === "void") return null;
        return "#0a0a12";
      }

      function _filamentRender(strokes, opts, frame) {
        const aspect = frame.aspect;
        const longest = 2560;
        let W, H;
        if (aspect >= 1) {
          W = longest;
          H = Math.max(1, Math.round(longest / aspect));
        } else {
          H = longest;
          W = Math.max(1, Math.round(longest * aspect));
        }
        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext("2d");
        const bg = _filamentBackground(opts.bg);
        if (bg) {
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, W, H);
        }
        const globalStops = _filamentHexPalette(frame);

        // Simple deterministic-ish rng used for per-chain bias + bead rolls.
        let rngSeed = (frame.seed || 12345) >>> 0;
        const rng = () => {
          rngSeed = (rngSeed + 0x6d2b79f5) | 0;
          let t = rngSeed;
          t = Math.imul(t ^ (t >>> 15), 1 | t);
          t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };

        for (const s of strokes) {
          const bias = _filamentPickCurveBias(globalStops, s.kind | 0, rng);
          _filamentDrawChain(ctx, s, bias, opts, frame, rng, W, H);
        }
        return canvas;
      }

      let _filamentRunning = false;
      function generateFilament(userOpts) {
        if (_filamentRunning || _fidenzaRunning) return;
        _filamentRunning = true;
        const opts = Object.assign({}, filamentOpts, userOpts || {});
        // Apply the active Scale preset's knobs on top of defaults, unless
        // the user passed an explicit override in userOpts.
        const scaleCfg = FILAMENT_SCALES[opts.scale] || FILAMENT_SCALES.mixed;
        for (const k of [
          "density",
          "beadScale",
          "thicknessPreset",
          "thinRate",
        ]) {
          if (!userOpts || userOpts[k] === undefined) opts[k] = scaleCfg[k];
        }
        // Honour Fidenza's background if set — users tend to toggle it there.
        opts.bg = (userOpts && userOpts.bg) || fidenzaOpts.bg || opts.bg;
        showToast("Filament", "generating…");
        setTimeout(() => {
          try {
            const t0 = performance.now();
            const frame = _fidenzaSnapshotFrame();
            frame.seed = Math.floor(Math.random() * 0xffffffff);
            const fieldRes = 256;
            const field = _fidenzaBuildFlowField(frame, fieldRes, 0.2);
            // Walk strokes using the filament-tuned thickness preset. We
            // reuse the Fidenza walker verbatim; the difference is all in
            // the render step.
            const walkerOpts = {
              density: opts.density,
              thickness: opts.thicknessPreset,
              seedSource: "bodies",
            };
            const strokes = _fidenzaWalkStrokes(
              field,
              fieldRes,
              frame,
              walkerOpts,
            );
            // Draw longer chains first so their bead placement claims the
            // visual hierarchy (can't re-sort by length until after walking).
            strokes.sort((a, b) => b.points.length - a.points.length);
            const canvas = _filamentRender(strokes, opts, frame);
            canvas.toBlob((blob) => {
              if (!blob) {
                showToast("Filament", "png encode failed");
                return;
              }
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download =
                "filament_" + frame.sceneKey + "_" + Date.now() + ".png";
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              setTimeout(() => URL.revokeObjectURL(url), 30000);
              const ms = Math.round(performance.now() - t0);
              showToast("Filament", strokes.length + " chains · " + ms + "ms");
            }, "image/png");
          } catch (e) {
            console.error("Filament generate failed", e);
            showToast("Filament", "failed · see console");
          } finally {
            _filamentRunning = false;
          }
        }, 50);
      }

      // ===============================================================
      // 24. EMERGENCE PERTURBATION  ("roll the dice")
      // ===============================================================
      function rollDice() {
        // Small random velocity kick to every body, ~0.5% of mean speed.
        const rt = gpu.getCurrentRenderTarget(velVar);
        const buf = new Float32Array(TEX_SIZE * TEX_SIZE * 4);
        renderer.readRenderTargetPixels(rt, 0, 0, TEX_SIZE, TEX_SIZE, buf);
        let sumSp = 0,
          n = 0;
        for (let i = 0; i < MAX_BODIES; i++) {
          const vx = buf[i * 4 + 0],
            vy = buf[i * 4 + 1],
            vz = buf[i * 4 + 2];
          const s = Math.sqrt(vx * vx + vy * vy + vz * vz);
          if (s > 0) {
            sumSp += s;
            n++;
          }
        }
        const avg = n > 0 ? sumSp / n : 1.0;
        const kick = avg * 0.01;
        for (let i = 0; i < MAX_BODIES; i++) {
          buf[i * 4 + 0] += randn() * kick;
          buf[i * 4 + 1] += randn() * kick;
          buf[i * 4 + 2] += randn() * kick;
        }
        const tex = new THREE.DataTexture(
          buf,
          TEX_SIZE,
          TEX_SIZE,
          THREE.RGBAFormat,
          THREE.FloatType,
        );
        tex.needsUpdate = true;
        blit(tex, rt);
        tex.dispose();
      }

      // ===============================================================
      // 25. STATS READOUT  (HUD emergent-state numbers)
      // ===============================================================
      const stats = { ke: 0, temperature: 0, clumpiness: 0, sampled: 0 };
      let statsAccum = 0;
      function computeStats() {
        const rtPos = gpu.getCurrentRenderTarget(posVar);
        const rtVel = gpu.getCurrentRenderTarget(velVar);
        const posBuf = new Float32Array(TEX_SIZE * TEX_SIZE * 4);
        const velBuf = new Float32Array(TEX_SIZE * TEX_SIZE * 4);
        renderer.readRenderTargetPixels(
          rtPos,
          0,
          0,
          TEX_SIZE,
          TEX_SIZE,
          posBuf,
        );
        renderer.readRenderTargetPixels(
          rtVel,
          0,
          0,
          TEX_SIZE,
          TEX_SIZE,
          velBuf,
        );
        let ke = 0,
          spSum = 0,
          sp2Sum = 0,
          live = 0;
        // CoM for clumpiness (rms-distance / radius proxy)
        let cx = 0,
          cy = 0,
          cz = 0,
          mTot = 0;
        for (let i = 0; i < MAX_BODIES; i++) {
          const m = posBuf[i * 4 + 3];
          if (m <= 0) continue;
          live++;
          cx += posBuf[i * 4 + 0] * m;
          cy += posBuf[i * 4 + 1] * m;
          cz += posBuf[i * 4 + 2] * m;
          mTot += m;
          const vx = velBuf[i * 4 + 0],
            vy = velBuf[i * 4 + 1],
            vz = velBuf[i * 4 + 2];
          const v2 = vx * vx + vy * vy + vz * vz;
          ke += 0.5 * m * v2;
          const s = Math.sqrt(v2);
          spSum += s;
          sp2Sum += v2;
        }
        if (mTot > 0) {
          cx /= mTot;
          cy /= mTot;
          cz /= mTot;
        }
        // radial stddev from CoM
        let r2Sum = 0;
        for (let i = 0; i < MAX_BODIES; i++) {
          const m = posBuf[i * 4 + 3];
          if (m <= 0) continue;
          const dx = posBuf[i * 4 + 0] - cx;
          const dy = posBuf[i * 4 + 1] - cy;
          const dz = posBuf[i * 4 + 2] - cz;
          r2Sum += dx * dx + dy * dy + dz * dz;
        }
        const rrms = live > 0 ? Math.sqrt(r2Sum / live) : 0;
        const vMean = live > 0 ? spSum / live : 0;
        const vVar = live > 0 ? sp2Sum / live - vMean * vMean : 0;
        stats.ke = ke;
        stats.temperature = Math.sqrt(Math.max(vVar, 0));
        stats.clumpiness = rrms; // lower = more clustered
        stats.sampled = live;
      }

      // ===============================================================
      // 26. HUD UPDATES
      // ===============================================================
      const hudSceneName = $("#hud-scene-name");
      const hudSceneCaption = $("#hud-scene-caption");
      const hudSceneCount = $("#hud-scene-count");
      const hudStats = $("#hud-stats");
      const hudStateIcon = $("#hud-state-icon");
      const hudStateDt = $("#hud-state-dt");
      const fpsEl = $("#fps-display");

      function fmtBodyCount(n) {
        if (n >= 10000) return (n / 1000).toFixed(0) + "k bodies";
        if (n >= 1000) return (n / 1000).toFixed(1) + "k bodies";
        return n + " bodies";
      }
      function reflectHudBodyCount() {
        if (hudSceneCount)
          hudSceneCount.textContent = fmtBodyCount(state.count);
      }
      const hudFollow = $("#hud-follow");
      function reflectHudFollow() {
        if (!hudFollow) return;
        const on = followCamActive();
        hudFollow.classList.toggle("on", on);
        if (on) hudFollow.textContent = "following #" + followCam.bodyIndex;
      }
      function updateHudFromScene() {
        const sc = SCENES[currentSceneKey];
        if (!sc) return;
        hudSceneName.textContent = sc.name;
        hudSceneCaption.textContent = sc.caption;
        hudSceneCount.textContent = fmtBodyCount(state.count);
        const icon = params.paused
          ? "\u23F8"
          : params.reverse
            ? "\u25C0"
            : "\u25B6";
        hudStateIcon.innerHTML = icon;
        hudStateDt.textContent = `dt ${(params.dt * params.speed).toFixed(3)}${params.reverse ? " rev" : ""}`;
      }
      function updateHudStats() {
        hudStats.innerHTML =
          `ke <span>${stats.ke.toExponential(2)}</span>\u2003` +
          `temp <span>${stats.temperature.toFixed(2)}</span>\u2003` +
          `rms <span>${stats.clumpiness.toFixed(1)}</span>`;
      }

      // ===============================================================
      // 27. VIEW MODES  (Studio / Performance)
      // ===============================================================
      let mouseIdleTimer = 0;
      function markMouseActive() {
        document.body.classList.add("mouse-active");
        document.body.classList.remove("cursor-hidden");
        clearTimeout(mouseIdleTimer);
        mouseIdleTimer = setTimeout(() => {
          if (document.body.classList.contains("performance")) {
            document.body.classList.remove("mouse-active");
            document.body.classList.add("cursor-hidden");
          }
        }, 2000);
      }
      function togglePerformance() {
        const p = document.body.classList.toggle("performance");
        if (p) {
          closePanel();
          markMouseActive();
        } else {
          document.body.classList.remove("cursor-hidden");
          document.body.classList.remove("mouse-active");
        }
      }
      addEventListener("mousemove", () => {
        if (document.body.classList.contains("performance")) markMouseActive();
        markUserActivity();
      });
      addEventListener("wheel", markUserActivity, { passive: true });

      // ===============================================================
      // 28. KEYBOARD HANDLERS
      // ===============================================================
      const SCENE_HOTKEY_ORDER = SCENE_ORDER;

      addEventListener("keydown", (e) => {
        if (
          e.target &&
          (e.target.tagName === "INPUT" ||
            e.target.tagName === "SELECT" ||
            e.target.tagName === "TEXTAREA")
        )
          return;
        const key = e.key;
        const ctrl = e.ctrlKey || e.metaKey;
        const shift = e.shiftKey;

        // Overlays get Esc first
        if (key === "Escape") {
          if (movie.active) {
            stopMovie(false);
            return;
          }
          if (!sceneBrowserEl.classList.contains("hidden")) {
            closeSceneBrowser();
            return;
          }
          if (!hotkeyOverlayEl.classList.contains("hidden")) {
            closeHotkeys();
            return;
          }
          if (activePanel) {
            closePanel();
            return;
          }
          if (followCamActive()) {
            followCamRelease();
            return;
          }
          return;
        }

        if (ctrl && (key === "s" || key === "S")) {
          e.preventDefault();
          exportJSON();
          return;
        }
        if (ctrl && (key === "o" || key === "O")) {
          e.preventDefault();
          importPrompt();
          return;
        }

        // Ctrl+1..9 save viewpoint, Shift+1..9 recall
        if (/^[1-9]$/.test(key)) {
          if (ctrl) {
            e.preventDefault();
            saveViewpoint(parseInt(key));
            return;
          }
          if (shift) {
            e.preventDefault();
            recallViewpoint(parseInt(key));
            return;
          }
          const idx = parseInt(key) - 1;
          if (idx < SCENE_HOTKEY_ORDER.length) {
            applyScene(SCENE_HOTKEY_ORDER[idx]);
            sfx.play("transition");
            return;
          }
        }

        switch (key) {
          case " ":
            e.preventDefault();
            params.paused = !params.paused;
            updateHudFromScene();
            if (activePanel === "scenes") buildPanel("scenes");
            break;
          case "ArrowRight":
          case "ArrowUp":
            if (followCamActive()) {
              e.preventDefault();
              followCamStep(1);
            }
            break;
          case "ArrowLeft":
          case "ArrowDown":
            if (followCamActive()) {
              e.preventDefault();
              followCamStep(-1);
            }
            break;
          case ".":
            stepOnce = true;
            break;
          case ",":
            stepOnce = true;
            stepReverse = true;
            break;
          case "t":
          case "T":
            params.reverse = !params.reverse;
            updateHudFromScene();
            if (activePanel === "scenes") buildPanel("scenes");
            break;
          case "[":
            if (movie.active) {
              cycleMovieSpeed(-1);
            } else {
              params.speed = Math.max(0.05, params.speed * 0.75);
              updateHudFromScene();
              syncUIToScene();
            }
            break;
          case "]":
            if (movie.active) {
              cycleMovieSpeed(+1);
            } else {
              params.speed = Math.min(16.0, params.speed * 1.3);
              updateHudFromScene();
              syncUIToScene();
            }
            break;
          case "r":
          case "R":
            applyScene(currentSceneKey, { immediate: true });
            sfx.play("transition");
            break;
          case "g":
          case "G":
            rollDice();
            break;
          case "h":
          case "H":
            togglePerformance();
            break;
          case "?":
            toggleHotkeys();
            break;
          case "/":
            if (shift) toggleHotkeys();
            break;
          case "c":
          case "C":
            if (shift) {
              // Shift+C — play/stop the currently selected film (per MOVIE.md)
              if (movie.active) stopMovie(false);
              else {
                const keys = Object.keys(FILMS);
                const k = movie.lastSelected || keys[0];
                if (k) startMovie(k);
              }
            } else toggleCinematic();
            break;
          case "b":
          case "B":
            openSceneBrowser();
            break;
          case "v":
          case "V":
            openPanel("camera");
            break;
          case "k":
          case "K":
            openPanel("capture");
            break;
          case "i":
          case "I":
            generateFidenza();
            break;
          case "u":
          case "U":
            generateFilament();
            break;
          case "j":
          case "J":
            openPanel("music");
            break;
          case "~":
          case "`":
            openPanel("settings");
            break;
          case "f":
          case "F":
            if (shift) {
              // Shift+F: release follow-cam (if active) else focus origin.
              if (followCamActive()) followCamRelease();
              else controls.target.set(0, 0, 0);
            } else {
              // F: pick nearest body to current look-at. If already following,
              // pressing F again picks the next-nearest.
              const pick = pickBodyNearTarget();
              if (pick) followCamAttach(pick);
              else showToast("Follow", "nothing in view");
            }
            break;
          case "o":
          case "O":
            params.autoOrbit = !params.autoOrbit;
            if (activePanel === "camera") buildPanel("camera");
            break;
          case "d":
          case "D":
            if (ctrl && shift) {
              dumpDirectorLog();
              showToast("Director", "telemetry dumped");
            } else if (shift) {
              toggleDebugOverlay();
            } else {
              params.cameraDrift = !params.cameraDrift;
              if (activePanel === "camera") buildPanel("camera");
            }
            break;
          case "x":
          case "X":
            if (shift) {
              sfx.setEnabled(!sfx.enabled);
              showToast("SFX", sfx.enabled ? "on" : "off");
              if (activePanel === "camera") buildPanel("camera");
            } else {
              params.showHalo = !params.showHalo;
              pointMat.uniforms.uShowHalo.value = params.showHalo ? 1 : 0;
              if (activePanel === "settings") buildPanel("settings");
            }
            break;
          case "p":
            if (shift) takeScreenshot(4);
            else takeScreenshot(2);
            break;
          case "P":
            takeScreenshot(4);
            break;
          case "m":
          case "M": {
            const list = Object.keys(PALETTES);
            const i = (list.indexOf(params.palette) + 1) % list.length;
            params.palette = list[i];
            applyPalette(list[i]);
            if (activePanel === "palette") buildPanel("palette");
            break;
          }
          case "n":
          case "N": {
            const list = Object.keys(CHANNELS);
            const i = (list.indexOf(params.channel) + 1) % list.length;
            params.channel = list[i];
            pointMat.uniforms.uChannel.value = channelValueFromName(list[i]);
            if (activePanel === "palette") buildPanel("palette");
            break;
          }
        }
      });

      // ===============================================================
      // 29. RESIZE
      // ===============================================================
      addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        composer.setSize(innerWidth, innerHeight);
      });

      // ===============================================================
      // 30. MAIN LOOP
      // ===============================================================
      let lastTime = performance.now();
      let framesAccum = 0,
        fpsAccum = 0;

      function loop() {
        requestAnimationFrame(loop);
        const now = performance.now();
        const realDt = (now - lastTime) / 1000;
        lastTime = now;

        framesAccum++;
        fpsAccum += realDt;
        if (fpsAccum >= 0.5) {
          fpsEl.textContent = (framesAccum / fpsAccum).toFixed(0) + " fps";
          framesAccum = 0;
          fpsAccum = 0;
        }

        const doStep = !params.paused || stepOnce;
        if (doStep) {
          const reverseThisFrame = stepOnce
            ? stepReverse || params.reverse
            : params.reverse;
          const sign = reverseThisFrame ? -1.0 : 1.0;
          const effDt = params.dt * params.speed;
          posVar.material.uniforms.uDt.value = effDt;
          velVar.material.uniforms.uDt.value = effDt;
          posVar.material.uniforms.uSign.value = sign;
          velVar.material.uniforms.uSign.value = sign;
          velVar.material.uniforms.uFrame.value =
            (velVar.material.uniforms.uFrame.value + 1.0) % 65536.0;
          for (let s = 0; s < params.substeps; s++) gpu.compute();
          simTime += effDt * sign * params.substeps;
          stepReverse = false;
          stepOnce = false;
        }

        pointMat.uniforms.uPos.value =
          gpu.getCurrentRenderTarget(posVar).texture;
        pointMat.uniforms.uVel.value =
          gpu.getCurrentRenderTarget(velVar).texture;
        pointMat.uniforms.uTime.value = simTime;
        if (starfieldMat) starfieldMat.uniforms.uTime.value = simTime;
        vigGrainPass.uniforms.uTime.value = now * 0.001;
        updateLensProjection();

        // Pull FFT first so energy/onset are fresh for directorTick.
        audioReact.tick(realDt);

        // Priority: movie > follow-cam > director + drift.
        if (movie.active) {
          movieTick(realDt);
        } else if (followCamActive()) {
          updateFollowCam(realDt);
          // Director-owned follow: keep the director ticking so it can
          // release the follow when its move duration ends. Skips
          // applyDrift via the followOwned guard in updateCameraMotion.
          if (director.followOwned) {
            directorTick(realDt);
            updateCameraMotion(realDt);
          }
        } else {
          directorTick(realDt);
          updateCameraMotion(realDt);
        }
        // Solar-system animation (runs during materialise/active/dissolve).
        updateSolarSystem(realDt);
        controls.update();
        composer.render();

        if (_debugOverlayVisible) updateDebugOverlay();

        // Periodic HUD + stats (throttled)
        statsAccum += realDt;
        if (statsAccum > 1.0) {
          statsAccum = 0;
          try {
            computeStats();
            updateHudStats();
          } catch (e) {}
        }
      }

      // ===============================================================
      // 31. BOOT
      // ===============================================================
      (async function boot() {
        const url = new URL(location.href);
        const sParam = url.searchParams.get("s");
        const seedParam = url.searchParams.get("seed");
        const sceneParam = url.searchParams.get("scene");

        let booted = false;
        if (sParam) {
          try {
            const obj = await decodeShare(sParam);
            booted = await applyShareState(obj);
          } catch (e) {
            console.warn("Invalid share link, falling back to default", e);
          }
        } else if (seedParam || sceneParam) {
          const key =
            sceneParam && sceneParam in SCENES ? sceneParam : "quiet-drift";
          const seed = seedParam
            ? parseInt(seedParam.replace(/^0x/i, ""), 16) >>> 0
            : undefined;
          applyScene(key, { immediate: true, seed });
          booted = true;
        }
        if (!booted) applyScene("quiet-drift", { immediate: true });
        updateHudFromScene();
        // Cinematic mode on by default — the app is meant to be watched.
        if (!director.enabled) toggleCinematic();
        loop();
      })();
    </script>
  </body>
</html>
