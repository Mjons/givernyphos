<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Universe Sim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #05060a;
        --bg-panel: rgba(10, 10, 14, 0.62);
        --bg-overlay: rgba(3, 4, 8, 0.78);
        --border-1: rgba(255, 255, 255, 0.08);
        --border-2: rgba(255, 255, 255, 0.14);
        --text-0: #e8ebf2;
        --text-1: #9ea4b2;
        --text-2: #5a6070;
        --text-3: #363a44;
        --accent: #8ab4ff;
        --accent-dim: rgba(138, 180, 255, 0.55);
        --accent-glow: rgba(138, 180, 255, 0.22);
        --danger: #ff6a70;
        --font-sans: "Inter", -apple-system, "Segoe UI", sans-serif;
        --font-mono: "IBM Plex Mono", ui-monospace, Menlo, Consolas, monospace;
        --r-1: 6px;
        --r-2: 10px;
        --r-3: 14px;
        --shadow-1: 0 10px 32px rgba(0, 0, 0, 0.5);
        --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg-0);
        color: var(--text-0);
        font-family: var(--font-sans);
        font-size: 13px;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        -webkit-user-select: none;
        user-select: none;
      }
      canvas#canvas {
        display: block;
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
      .hud-scene {
        position: absolute;
        top: 16px;
        left: 68px;
        font-variant: small-caps;
        letter-spacing: 0.14em;
        text-shadow: 0 1px 4px #000;
        transition: opacity 220ms var(--ease);
      }
      .hud-scene .name {
        color: var(--text-0);
        font-weight: 500;
        font-size: 13px;
      }
      .hud-scene .caption {
        color: var(--text-2);
        font-size: 9px;
        letter-spacing: 0.22em;
        margin-top: 2px;
      }
      .hud-scene .count {
        color: var(--text-2);
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.08em;
        font-variant: normal;
        margin-top: 6px;
      }
      .hud-scene .stats {
        margin-top: 6px;
        color: var(--text-2);
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.04em;
        font-variant: normal;
        line-height: 1.6;
      }
      .hud-scene .stats span {
        color: var(--text-1);
      }

      .hud-state {
        position: absolute;
        top: 16px;
        right: 18px;
        display: flex;
        gap: 10px;
        align-items: center;
        font-variant: small-caps;
        letter-spacing: 0.12em;
        font-size: 11px;
        color: var(--text-1);
        text-shadow: 0 1px 4px #000;
        transition: opacity 220ms var(--ease);
      }
      .hud-state .icon {
        font-size: 13px;
        color: var(--accent);
        width: 12px;
        text-align: center;
      }
      .hud-state .dt {
        font-family: var(--font-mono);
        color: var(--text-2);
        font-variant: normal;
      }

      .hud-hint {
        position: absolute;
        bottom: 14px;
        left: 68px;
        font-size: 10px;
        color: var(--text-3);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-shadow: 0 1px 4px #000;
        pointer-events: none;
        opacity: 0.7;
      }
      .hud-fps {
        position: absolute;
        bottom: 12px;
        right: 18px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-3);
        letter-spacing: 0.1em;
        text-shadow: 0 1px 4px #000;
      }
      .rec-dot {
        position: absolute;
        bottom: 14px;
        right: 42px;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #ff3b48;
        box-shadow: 0 0 10px #ff3b48;
        animation: blink 1s ease-in-out infinite;
        display: none;
      }
      .rec-dot.active {
        display: block;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      #rail {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 12px 0;
        gap: 2px;
        z-index: 20;
        background: linear-gradient(
          to right,
          rgba(5, 6, 10, 0.72),
          rgba(5, 6, 10, 0)
        );
        transition:
          opacity 220ms var(--ease),
          transform 220ms var(--ease);
      }
      .rail-spacer {
        flex: 1;
      }
      .rail-btn {
        width: 36px;
        height: 36px;
        border: none;
        background: transparent;
        color: var(--text-2);
        border-radius: var(--r-1);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        transition:
          color 150ms var(--ease),
          background 150ms var(--ease);
      }
      .rail-btn:hover {
        color: var(--text-0);
        background: rgba(255, 255, 255, 0.04);
      }
      .rail-btn.active {
        color: var(--accent);
        background: var(--accent-glow);
      }
      .rail-btn.active::before {
        content: "";
        position: absolute;
        left: -6px;
        top: 10px;
        bottom: 10px;
        width: 2px;
        border-radius: 2px;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent-glow);
      }
      .rail-btn svg {
        width: 18px;
        height: 18px;
        display: block;
      }
      .rail-tooltip {
        position: absolute;
        left: 46px;
        top: 50%;
        transform: translate(-4px, -50%);
        background: rgba(12, 14, 20, 0.94);
        color: var(--text-0);
        font-size: 11px;
        padding: 5px 9px;
        border-radius: var(--r-1);
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        border: 1px solid var(--border-1);
        transition:
          opacity 120ms var(--ease),
          transform 120ms var(--ease);
      }
      .rail-btn:hover .rail-tooltip {
        opacity: 1;
        transform: translate(0, -50%);
      }
      .rail-tooltip kbd {
        margin-left: 6px;
        color: var(--text-2);
        font-family: var(--font-mono);
        font-size: 10px;
      }

      #panel {
        position: fixed;
        top: 14px;
        left: 56px;
        bottom: 14px;
        width: 304px;
        background: var(--bg-panel);
        border: 1px solid var(--border-1);
        border-radius: var(--r-3);
        backdrop-filter: blur(20px) saturate(1.2);
        -webkit-backdrop-filter: blur(20px) saturate(1.2);
        box-shadow: var(--shadow-1);
        padding: 20px 18px 18px;
        z-index: 15;
        transform: translateX(-18px);
        opacity: 0;
        pointer-events: none;
        transition:
          transform 180ms var(--ease),
          opacity 180ms var(--ease);
        overflow-y: auto;
        overflow-x: hidden;
      }
      #panel.open {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }
      #panel::-webkit-scrollbar {
        width: 6px;
      }
      #panel::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 3px;
      }
      .panel-title {
        font-size: 10px;
        color: var(--text-2);
        letter-spacing: 0.28em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      .panel-title .hint {
        float: right;
        color: var(--text-3);
        letter-spacing: 0.12em;
        font-family: var(--font-mono);
        text-transform: none;
      }
      .panel-section {
        margin-bottom: 18px;
      }
      .panel-section-title {
        font-size: 9px;
        color: var(--text-2);
        letter-spacing: 0.26em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .slider-row {
        margin-bottom: 10px;
      }
      .slider-row .head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 4px;
      }
      .slider-row label {
        font-size: 11px;
        color: var(--text-1);
        font-weight: 500;
      }
      .slider-row .value {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--accent);
        font-weight: 500;
      }
      .slider-row input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 2px;
        background: var(--border-2);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      .slider-row input[type="range"]::-webkit-slider-runnable-track {
        height: 2px;
        background: linear-gradient(
          to right,
          var(--accent) var(--pct, 50%),
          var(--border-2) var(--pct, 50%)
        );
        border-radius: 2px;
      }
      .slider-row input[type="range"]::-moz-range-track {
        height: 2px;
        background: linear-gradient(
          to right,
          var(--accent) var(--pct, 50%),
          var(--border-2) var(--pct, 50%)
        );
        border-radius: 2px;
      }
      .slider-row input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        background: var(--accent);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 6px var(--accent-glow);
        margin-top: -5px;
      }
      .slider-row input[type="range"]::-moz-range-thumb {
        width: 12px;
        height: 12px;
        background: var(--accent);
        border: none;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 6px var(--accent-glow);
      }

      .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        cursor: pointer;
      }
      .toggle-row label {
        font-size: 11px;
        color: var(--text-1);
        font-weight: 500;
        cursor: pointer;
        flex: 1;
      }
      .toggle-switch {
        position: relative;
        width: 28px;
        height: 16px;
        background: var(--border-2);
        border-radius: 8px;
        transition: background 140ms var(--ease);
        flex-shrink: 0;
      }
      .toggle-switch::after {
        content: "";
        position: absolute;
        left: 2px;
        top: 2px;
        width: 12px;
        height: 12px;
        background: var(--text-2);
        border-radius: 50%;
        transition:
          transform 140ms var(--ease),
          background 140ms var(--ease);
      }
      .toggle-row input {
        display: none;
      }
      .toggle-row input:checked + .toggle-switch {
        background: var(--accent-glow);
      }
      .toggle-row input:checked + .toggle-switch::after {
        transform: translateX(12px);
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent-glow);
      }

      /* Help badge — a tiny "?" next to a control's label.  Hovering it
         pops a glass tooltip explaining what the control does. The
         tooltip itself lives in document.body as a portal so it can
         escape the panel's overflow clipping and slide animation. */
      .help-badge {
        display: inline-flex;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        margin-left: 6px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text-2);
        font-size: 9px;
        font-weight: 600;
        font-family: var(--font-mono);
        align-items: center;
        justify-content: center;
        cursor: help;
        user-select: none;
        vertical-align: middle;
        transition:
          background 140ms var(--ease),
          color 140ms var(--ease);
      }
      .help-badge:hover {
        background: var(--accent-glow);
        color: var(--accent);
      }
      #help-tip {
        position: fixed;
        top: 0;
        left: 0;
        min-width: 180px;
        max-width: 260px;
        padding: 8px 10px;
        background: var(--bg-overlay);
        border: 1px solid var(--border-2);
        border-radius: var(--r-1);
        color: var(--text-0);
        font-family: var(--font-sans);
        font-size: 11px;
        font-weight: 400;
        line-height: 1.45;
        letter-spacing: 0;
        text-transform: none;
        opacity: 0;
        pointer-events: none;
        white-space: normal;
        text-align: left;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
        transform: translateY(4px);
        transition:
          opacity 160ms var(--ease),
          transform 160ms var(--ease);
        z-index: 1000;
      }
      #help-tip.show {
        opacity: 1;
        transform: translateY(0);
      }

      .select-row {
        margin-bottom: 10px;
      }
      .select-row label {
        display: block;
        font-size: 11px;
        color: var(--text-1);
        font-weight: 500;
        margin-bottom: 5px;
      }
      .select-row select {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border-1);
        color: var(--text-0);
        padding: 6px 8px;
        border-radius: var(--r-1);
        font-family: var(--font-sans);
        font-size: 11px;
        outline: none;
        cursor: pointer;
      }
      .select-row select:focus {
        border-color: var(--accent-dim);
      }
      .select-row select option {
        background: #0c0e15;
        color: var(--text-0);
      }

      .button-row {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
      }
      .btn {
        flex: 1;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border-1);
        color: var(--text-0);
        padding: 7px 10px;
        border-radius: var(--r-1);
        font-family: var(--font-sans);
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: all 120ms var(--ease);
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--border-2);
      }
      .btn.primary {
        background: var(--accent-glow);
        border-color: var(--accent-dim);
        color: var(--accent);
      }
      .btn.primary:hover {
        background: rgba(138, 180, 255, 0.3);
      }
      .btn.active {
        background: var(--accent-glow);
        border-color: var(--accent-dim);
        color: var(--accent);
      }

      .pill-row {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .pill {
        padding: 5px 10px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-1);
        border-radius: 999px;
        font-size: 10px;
        color: var(--text-1);
        cursor: pointer;
        letter-spacing: 0.05em;
        transition: all 120ms var(--ease);
      }
      .pill:hover {
        color: var(--text-0);
        border-color: var(--border-2);
      }
      .pill.active {
        background: var(--accent-glow);
        border-color: var(--accent-dim);
        color: var(--accent);
      }

      .read-row {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        padding: 4px 0;
      }
      .read-row label {
        color: var(--text-2);
      }
      .read-row .val {
        font-family: var(--font-mono);
        color: var(--text-1);
      }

      .viewport-slots {
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        gap: 4px;
        margin-bottom: 8px;
      }
      .vp-slot {
        aspect-ratio: 1;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-1);
        border-radius: var(--r-1);
        color: var(--text-2);
        font-family: var(--font-mono);
        font-size: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 120ms var(--ease);
      }
      .vp-slot:hover {
        color: var(--text-0);
        border-color: var(--border-2);
      }
      .vp-slot.saved {
        color: var(--accent);
        border-color: var(--accent-dim);
        background: var(--accent-glow);
      }
      .vp-hint {
        font-size: 10px;
        color: var(--text-3);
        letter-spacing: 0.08em;
        margin-bottom: 10px;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: var(--bg-overlay);
        backdrop-filter: blur(14px) saturate(1.1);
        -webkit-backdrop-filter: blur(14px) saturate(1.1);
        z-index: 50;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms var(--ease);
        overflow-y: auto;
      }
      .overlay:not(.hidden) {
        opacity: 1;
        pointer-events: auto;
      }
      .overlay-close {
        position: absolute;
        top: 20px;
        right: 24px;
        background: transparent;
        border: none;
        color: var(--text-2);
        font-size: 22px;
        cursor: pointer;
        line-height: 1;
        padding: 6px 10px;
        border-radius: var(--r-1);
        transition: all 120ms var(--ease);
      }
      .overlay-close:hover {
        color: var(--text-0);
        background: rgba(255, 255, 255, 0.04);
      }

      .scene-browser-inner {
        max-width: 1100px;
        width: 100%;
        padding: 72px 40px 60px;
      }
      .scene-browser-header {
        text-align: center;
        margin-bottom: 36px;
      }
      .scene-browser-title {
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.24em;
        color: var(--text-0);
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .scene-browser-sub {
        font-size: 10px;
        color: var(--text-2);
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }
      .scene-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(232px, 1fr));
        gap: 14px;
      }
      .scene-card {
        background: rgba(12, 14, 20, 0.5);
        border: 1px solid var(--border-1);
        border-radius: var(--r-2);
        overflow: hidden;
        cursor: pointer;
        transition: all 200ms var(--ease);
        position: relative;
        aspect-ratio: 1;
      }
      .scene-card:hover {
        transform: translateY(-2px);
        border-color: var(--accent-dim);
        box-shadow: 0 14px 36px var(--accent-glow);
      }
      .scene-card.active {
        border-color: var(--accent);
      }
      .scene-card .thumb {
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at center, #1a1d2a 0%, #06070c 70%);
        display: block;
      }
      .scene-card img.thumb {
        object-fit: cover;
        object-position: center;
      }
      .scene-card .meta {
        position: absolute;
        inset: auto 0 0 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.92) 0%,
          rgba(0, 0, 0, 0) 100%
        );
        padding: 28px 14px 12px;
      }
      .scene-card .name {
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.1em;
        color: var(--text-0);
        margin-bottom: 2px;
      }
      .scene-card .caption {
        font-size: 10px;
        color: var(--text-2);
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .scene-card.active .name {
        color: var(--accent);
      }

      .hotkeys-inner {
        max-width: 820px;
        width: 100%;
        padding: 80px 40px 60px;
      }
      .hotkeys-title {
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.28em;
        color: var(--text-0);
        text-transform: uppercase;
        margin-bottom: 36px;
        text-align: center;
      }
      .hotkey-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 36px;
      }
      .hotkey-group {
        margin-bottom: 24px;
      }
      .hotkey-group h3 {
        font-size: 9px;
        color: var(--accent);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin: 0 0 12px;
        font-weight: 500;
      }
      .hotkey-row {
        display: flex;
        align-items: baseline;
        padding: 7px 0;
        border-bottom: 1px solid var(--border-1);
        font-size: 12px;
        color: var(--text-1);
      }
      .hotkey-row .keys {
        flex: 0 0 126px;
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .hotkey-row kbd {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border-1);
        padding: 2px 7px;
        border-radius: 4px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-0);
        letter-spacing: 0;
      }
      .hotkey-row .sep {
        color: var(--text-3);
        font-size: 10px;
      }

      body.performance #rail,
      body.performance #panel,
      body.performance .hud-scene,
      body.performance .hud-state,
      body.performance .hud-hint {
        opacity: 0;
        pointer-events: none;
      }
      body.performance #rail {
        transform: translateX(-6px);
      }
      body.performance.mouse-active #rail,
      body.performance.mouse-active .hud-scene,
      body.performance.mouse-active .hud-state,
      body.performance.mouse-active .hud-hint {

      /* --- Music player --- */
      .music-now {

      .music-transport {

      .btn-trans {
        background: rgba(255, 255, 255, 0.03);

      /* Rail breathing glow — music playing, or cinematic running */
