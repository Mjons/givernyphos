        state.count = i;
      }

      // Coma Cluster — ~40 tight elliptical blobs in a big gaussian cloud.
      function sceneComa() {
        zero();
        const nGalaxies = 40;
        const spread = 520;
        const perGalaxy = Math.floor((MAX_BODIES - 32) / nGalaxies);
        let i = 0;
        for (let g = 0; g < nGalaxies; g++) {
          // Anisotropic gaussian: slightly squashed along y (cluster looks flatter)
          const cx = randn() * spread;
          const cy = randn() * spread * 0.6;
          const cz = randn() * spread;
          // Small mutual velocity dispersion
          const vx = randn() * 1.2;
          const vy = randn() * 0.6;
          const vz = randn() * 1.2;
          // Mass drawn from a rough Schechter-ish spread — few big, many small
          const mag = 0.4 + Math.pow(rng(), 2.2) * 0.9;
          const radius = 14 + mag * 18;
          const bhMass = 600 * Math.pow(mag, 1.5);
          i = makeElliptical(
            i,
            perGalaxy,
            cx,
            cy,
            cz,
            vx,
            vy,
            vz,
            radius,
            bhMass,
            0.0,
          );
        }
        state.count = i;
      }

      // Virgo M87 — one massive BH with a collimated jet + ~12 satellite galaxies.
      function sceneVirgoM87() {
        zero();
        const BH_MASS = 60000;
        // Central BH
        setBody(0, 0, 0, 0, BH_MASS, 0, 0, 0, 2.0);
        let i = 1;
        // Jet (~350 bodies total)
        i = addBipolarJet(i, 0, 0, 0, 0, 0, 0, BH_MASS, {
          perSide: 180,
          rMin: 4,
          rMax: 260,
          e0: 100,
          halfAngle: 0.06,
        });
        // Satellite galaxies in a loose cloud around M87
        const remaining = MAX_BODIES - i;
        const nSats = 12;
        const perSat = Math.floor(remaining / nSats);
        for (let s = 0; s < nSats; s++) {
          // Orbit radius 250–600 from the giant BH
          const r = 250 + rng() * 350;
          const theta = Math.acos(2 * rng() - 1);
          const phi = rng() * 2 * Math.PI;
          const cx = r * Math.sin(theta) * Math.cos(phi);
          const cy = r * Math.cos(theta) * 0.6;
          const cz = r * Math.sin(theta) * Math.sin(phi);
          // Circular-ish velocity around BH
          const vCirc = Math.sqrt(BH_MASS / r) * (0.6 + rng() * 0.4);
          const tx = -Math.sin(phi);
          const tz = Math.cos(phi);
          const vx = tx * vCirc;
          const vy = randn() * vCirc * 0.1;
          const vz = tz * vCirc;
          // Small spiral galaxy: ~200 bodies per satellite
          i = makeSpiralGalaxyCore(
            cx,
            cy,
            cz,
            vx,
            vy,
            vz,
            Math.min(perSat, 220),
            22 + rng() * 10,
            400 + rng() * 500,
            i,
            rng() < 0.5 ? +1 : -1,
          );
        }
        state.count = i;
      }

      // ---- Pack B: one primitive each ----

      // Sombrero — one edge-on spiral with an unusually thick dust lane.
      function sceneSombrero() {
        zero();
        const BH_MASS = 14000;
        const diskR = 160;
        const dustBudget = 2000;
        const stellarBudget = MAX_BODIES - dustBudget - 1;

        // Use the existing spiral-core factory for the stellar disk
        let i = makeSpiralGalaxyCore(
          0,
          0,
          0,
          0,
          0,
          0,
          stellarBudget,
          diskR,
          BH_MASS,
          0,
          +1,
        );

        // Layer a thick equatorial dust lane over the disk plane.
        // Curl-noise velocity field makes it swirl rather than just sit still.
        const curl = makeCurlNoise(rng() * 5 + 1);
        const laneThickness = 6.0; // keep |y| < ±6 for Sombrero's iconic band
        for (let k = 0; k < dustBudget && i < MAX_BODIES; k++) {
          const r = diskR * (0.18 + Math.pow(rng(), 0.6) * 0.85);
          const phi = rng() * 2 * Math.PI;
          const y = randn() * laneThickness * 0.3;
          const px = r * Math.cos(phi);
          const pz = r * Math.sin(phi);
          const vCirc = Math.sqrt(BH_MASS / Math.max(r, 1)) * 0.97;
          const [cvx, cvy, cvz] = curl(px, y, pz);
          setBody(
            i++,
            px,
            y,
            pz,
            0.08 + rng() * 0.12,
            -Math.sin(phi) * vCirc + cvx * 0.15 + randn() * 0.3,
            cvy * 0.15 + randn() * 0.08,
            Math.cos(phi) * vCirc + cvz * 0.15 + randn() * 0.3,
            3.0,
          );
        }
        state.count = i;
      }

      // Antennae — the "prograde" collision scenario, but run forward on GPU
      // for ~300 frames before the first render so tidal tails are already
      // extended at t=0.
      function sceneAntennae() {
        zero();
        // Set up the collision geometry using the Antennae scenario's params
        const s = COLLISION_SCENARIOS["Antennae (prograde)"];
        const prev = { ...collision };
        Object.assign(collision, s);
        collision.scenario = "Antennae (prograde)";
        collision.galaxyMassB = collision.galaxyMassA * collision.massRatio;

        // Build the two galaxies via the existing factory
        const mA = collision.galaxyMassA;
        const mB = collision.galaxyMassB;
        const M = mA + mB;
        const d = collision.initialSep;
        const b = collision.impactParam;
        const xA = -d * (mB / M);
        const xB = +d * (mA / M);
        const zA = +b * (mB / M);
        const zB = -b * (mA / M);
        const v = collision.approachVel;
        const vxA = +v * (mB / M);
        const vxB = -v * (mA / M);
        const budgetA = Math.floor(MAX_BODIES / 2);
        const budgetB = MAX_BODIES - budgetA;
        buildGalaxy(
          0,
          budgetA,
          xA,
          0,
          zA,
          vxA,
          0,
          0,
          collision.diskRadiusA,
          collision.inclinationA,
          collision.azimuthA,
          collision.spinA,
          mA,
          0,
        );
        const end = buildGalaxy(
          budgetA,
          budgetB,
          xB,
          0,
          zB,
          vxB,
          0,
          0,
          collision.diskRadiusB,
          collision.inclinationB,
          collision.azimuthB,
          collision.spinB,
          mB,
          1,
        );
        state.count = end;

        Object.assign(collision, prev);

        // Signal to the apply path that a kickstart should happen after upload
        state._kickstartFrames = 320;
      }

      // Bullet Cluster — two clusters that already passed through each other.
      // Dark-matter halos are offset from their stellar components along the
      // velocity axis: the gas stopped, the halos kept going.
      function sceneBulletCluster() {
        zero();
        const totalMass = 28000;
        const stellarMassA = totalMass * 0.3;
        const stellarMassB = totalMass * 0.3;
        const haloMassA = totalMass * 0.7;
        const haloMassB = totalMass * 0.7;

        const stellarBudget = Math.floor(MAX_BODIES * 0.45);
        const haloBudget = MAX_BODIES - stellarBudget;
        const perStellarSide = Math.floor(stellarBudget / 2);
        const perHaloSide = Math.floor(haloBudget / 2);

        // Geometry: two centres left+right; halos offset further outward
        const sep = 280;
        const haloOffset = 110;
        // Residual velocity — halos still moving outward
        const vHaloA = [-1.4, 0, 0];
        const vHaloB = [+1.4, 0, 0];
        const vStellarA = [-0.3, 0, 0]; // slowed by ram pressure
        const vStellarB = [+0.3, 0, 0];

        let i = 0;
        // Stellar A (uses buildGalaxy; we ignore its halo by giving it zero mass)
        // Simplest path: place a shallow elliptical + BH with kind 5 (galaxy A).
        i = makeElliptical(
          i,
          perStellarSide,
          -sep * 0.5,
          0,
          0,
          vStellarA[0],
          vStellarA[1],
          vStellarA[2],
          90,
          stellarMassA * 0.15,
          5.0,
        );
        i = makeElliptical(
          i,
          perStellarSide,
          +sep * 0.5,
          0,
          0,
          vStellarB[0],
          vStellarB[1],
          vStellarB[2],
          90,
          stellarMassB * 0.15,
          6.0,
        );
        // Halos offset further outward along each cluster's motion
        i = addHaloCloud(
          i,
          perHaloSide,
          -sep * 0.5 - haloOffset,
          0,
          0,
          vHaloA[0],
          vHaloA[1],
          vHaloA[2],
          140,
          haloMassA,
        );
        i = addHaloCloud(
          i,
          perHaloSide,
          +sep * 0.5 + haloOffset,
          0,
          0,
          vHaloB[0],
          vHaloB[1],
          vHaloB[2],
          140,
          haloMassB,
        );
        state.count = i;
      }

      // Horsehead Nebula (Barnard 33) — dark dust cloud silhouetted against
      // the bright emission nebula IC 434.  Evocation, not reproduction:
      // foreground dust (kind 3, very low mass) reads black on ember+mass,
      // a dense background starfield emits the orange glow, and a subtle
      // head-bulge at the top of the dust cloud evokes the silhouette.
      // Gentle physics + custom K matrix hold the shape over long dwells.
      function sceneHorsehead() {
        zero();
        let i = 0;

        // --- IC 434 equivalent: bright background emission field ---
        // Positioned mostly behind the dust (z < 0).  Mass range lands these
        // bodies in the red/orange stops of the ember palette on the mass channel.
        const bgCount = 4200;
        for (let k = 0; k < bgCount && i < MAX_BODIES; k++) {
          const x = randn() * 150 + (rng() - 0.5) * 80;
          const y = randn() * 120 + 15;
          const z = -30 - rng() * 200;
          // Heavy tail so a few bodies pop as "hotspots"
          const m = 2.8 + Math.pow(rng(), 2.3) * 16.0;
          setBody(
            i++,
            x,
            y,
            z,
            m,
            randn() * 0.06,
            randn() * 0.06,
            randn() * 0.06,
            0.0,
          );
        }

        // --- Barnard 33 foreground dust ---
        const dustBudget = Math.min(3800, MAX_BODIES - i);
        const curl = makeCurlNoise(rng() * 5 + 1);

        // Main body (neck + jaw): tall oblong, slight forward tilt
        const bodyN = Math.floor(dustBudget * 0.7);
        const bodyCenter = { x: 0, y: -5, z: 10 };
        const bodyRadii = { x: 22, y: 56, z: 18 };
        for (let k = 0; k < bodyN && i < MAX_BODIES; k++) {
          const theta = Math.acos(2 * rng() - 1);
          const phi = rng() * 2 * Math.PI;
          const rr = Math.pow(rng(), 1.35);
          const px =
            bodyCenter.x + rr * Math.sin(theta) * Math.cos(phi) * bodyRadii.x;
          const py = bodyCenter.y + rr * Math.cos(theta) * bodyRadii.y;
          const pz =
            bodyCenter.z + rr * Math.sin(theta) * Math.sin(phi) * bodyRadii.z;
          const [cvx, cvy, cvz] = curl(px * 0.8, py * 0.8, pz * 0.8);
          setBody(
            i++,
            px,
            py,
            pz,
            0.04 + rng() * 0.09,
            cvx * 0.18,
            cvy * 0.18,
            cvz * 0.18,
            3.0,
          );
        }

        // Head bulge: smaller cluster offset upward and outward (toward -x,
        // the silhouette's "nose" side in the canonical astrophoto orientation)
        const headN = dustBudget - bodyN;
        const headCenter = { x: -14, y: 68, z: 4 };
        const headRadii = { x: 18, y: 22, z: 15 };
        for (let k = 0; k < headN && i < MAX_BODIES; k++) {
          const dir = new THREE.Vector3(randn(), randn(), randn()).normalize();
          const rr = Math.abs(randn()) * 0.88;
          const px = headCenter.x + dir.x * rr * headRadii.x;
          const py = headCenter.y + dir.y * rr * headRadii.y;
          const pz = headCenter.z + dir.z * rr * headRadii.z;
          const [cvx, cvy, cvz] = curl(px * 0.8, py * 0.8, pz * 0.8);
          setBody(
            i++,
            px,
            py,
            pz,
            0.04 + rng() * 0.09,
            cvx * 0.18,
            cvy * 0.18,
            cvz * 0.18,
            3.0,
          );
        }

        state.count = i;
        // Brief kickstart: let curl-noise + gravity deposit a little structure
        // (soft pulls on the head, slight wisps off the edges) before first render.
        state._kickstartFrames = 80;
      }

      // Milky Way — a dedicated barred-spiral portrait.  Logarithmic spiral
      // arms (pitch ≈ 12°), elongated central bar aligned with +X, thin dust
      // lanes on the trailing edge of the major arms, sparse spheroidal halo.
      //
      // Rendering uses the "mass" channel, so brighter stars come from
      // higher body masses.  Mass is carefully tiered so arms stand out
      // against inter-arm gaps: bulge >> arm-major > arm-minor > inter-arm.
      // Sgr A* is intentionally tiny (mass 80, bhHighlight 0) so the core
      // doesn't swallow the frame — real galaxies' central BH is visually
      // negligible next to the surrounding stellar mass.
      function sceneMilkyWay() {
        zero();
        const R_DISK = 240;
        const R_BAR = 48;
        const PITCH = (13 * Math.PI) / 180; // arm pitch angle (MW is ~12–13°)
        const COT_PITCH = 1 / Math.tan(PITCH); // ≈ 4.3
        // Central anchor mass.  Heavy enough to dominate the 91 nucleus
        // bulge stars around it (combined ~2400) so close encounters kick
        // the *stars*, not the BH.  Rendered as kind 5 (bulge) instead of
        // kind 2 so the shader's size×5 BH bonus doesn't turn it into a
        // crater — it still reads as the galactic core via the warm
        // TINT_MILKYWAY gold tint.
        const BH_MASS = 3200;
        const SPIN = +1;
        const SOFTENING = 2.5;
        const EPS2 = SOFTENING * SOFTENING;

        // Temporary crude v_circ estimate for use during placement; real
        // velocities are overwritten by the force-sum pass at the end.
        const mEncGuess = (r) =>
          BH_MASS + (25000 * (r * r)) / (r * r + 50 * 50);

        // Sgr A* — placed as kind 5 (bulge) so it picks up the warm gold
        // tint and avoids the shader's kind-2 size×5 multiplier.  Heavy
        // enough that neighbour stars bounce off it, not the other way.
        setBody(0, 0, 0, 0, BH_MASS, 0, 0, 0, 5.0);
        let i = 1;

        // ----- Bulge + bar (kind 5 → warm gold via TINT_MILKYWAY) -----
        // Elongated gaussian along X, thin vertically.  High masses = bright
        // gold bulge.  Inner dense core uses a tighter gaussian subset.
        const BAR_N = 260;
        for (let k = 0; k < BAR_N && i < MAX_BODIES; k++) {
          // 35% of bulge stars form a tight inner nucleus
          const nucleus = k < BAR_N * 0.35;
          const x = randn() * (nucleus ? 16 : 44);
          const y = randn() * 3.0;
          const z = randn() * (nucleus ? 9 : 18);
          const r = Math.sqrt(x * x + z * z);
          const safeR = Math.max(r, 6);
          const v = Math.sqrt(mEncGuess(safeR) / safeR) * 0.9;
          const tx = -z / Math.max(r, 0.5);
          const tz = x / Math.max(r, 0.5);
          const disp = v * 0.14;
          setBody(
            i++,
            x,
            y,
            z,
            // Heavy mass so bulge stars map to the bright end of the palette
            nucleus ? 18 + rng() * 18 : 10 + rng() * 14,
            tx * v * SPIN + randn() * disp,
            randn() * disp * 0.3,
            tz * v * SPIN + randn() * disp,
            5.0,
          );
        }

        // ----- Disk + spiral arms (kind 0) -----
        // Two major arms + two minor + sparse inter-arm field.  Arm stars
        // get heavier mass so they *read* as arms on the mass channel.
        const DISK_N = 3300;
        for (let k = 0; k < DISK_N && i < MAX_BODIES; k++) {
          let r = R_BAR + Math.pow(rng(), 0.55) * (R_DISK - R_BAR);
          r = Math.min(Math.max(r, R_BAR + 2), R_DISK);

          // Arm selection — 70% major, 15% minor, 15% inter-arm
          const armRoll = rng();
          let armK, armSpread, starMass;
          if (armRoll < 0.35) {
            armK = 0;
            armSpread = 0.11 + 0.0005 * r;
            starMass = 4.5 + rng() * 6.5;
          } else if (armRoll < 0.7) {
            armK = 1;
            armSpread = 0.11 + 0.0005 * r;
            starMass = 4.5 + rng() * 6.5;
          } else if (armRoll < 0.82) {
            armK = 2;
            armSpread = 0.18 + 0.0006 * r;
            starMass = 2.0 + rng() * 3.5;
          } else if (armRoll < 0.93) {
            armK = 3;
            armSpread = 0.18 + 0.0006 * r;
            starMass = 2.0 + rng() * 3.5;
          } else {
            // Inter-arm field star — scatters broadly, dim
            armK = Math.floor(rng() * 4);
            armSpread = 1.2;
            starMass = 0.8 + rng() * 1.3;
          }

          const thetaArm =
            SPIN * COT_PITCH * Math.log(r / R_BAR) + (armK * Math.PI) / 2;
          const theta = thetaArm + randn() * armSpread;

          const x = r * Math.cos(theta);
          const z = r * Math.sin(theta);
          // Thin disk, flares gently outward (real disks do this)
          const y = randn() * (2.6 + r * 0.008);

          const v = Math.sqrt(mEncGuess(r) / r);
          const tx = -Math.sin(theta) * SPIN;
          const tz = Math.cos(theta) * SPIN;
          // Toomre Q ~ 1.5: dispersion ~12% of circular velocity keeps
          // the disk marginally stable (hot enough not to fragment,
          // cold enough that arms still read).
          const disp = v * 0.12;

          setBody(
            i++,
            x,
            y,
            z,
            starMass,
            tx * v + randn() * disp,
            randn() * disp * 0.25,
            tz * v + randn() * disp,
            0.0,
          );
        }

        // ----- Dust lanes (kind 3) -----
        // Ride the trailing edge of each major arm — the tell-tale dark
        // stripe in edge-on spiral photos.
        const DUST_N = 180;
        for (let k = 0; k < DUST_N && i < MAX_BODIES; k++) {
          let r = R_BAR * 1.2 + Math.pow(rng(), 0.5) * (R_DISK * 0.8 - R_BAR);
          const armK = rng() < 0.5 ? 0 : 1;
          const thetaArm =
            SPIN * COT_PITCH * Math.log(r / R_BAR) + (armK * Math.PI) / 2;
          const theta = thetaArm + randn() * 0.07 - 0.1 * SPIN;
          const x = r * Math.cos(theta);
          const z = r * Math.sin(theta);
          const y = randn() * 1.3;
          const v = Math.sqrt(mEncGuess(r) / r);
          const tx = -Math.sin(theta) * SPIN;
          const tz = Math.cos(theta) * SPIN;
          setBody(
            i++,
            x,
            y,
            z,
            0.2 + rng() * 0.3,
            tx * v + randn() * v * 0.02,
            randn() * v * 0.01,
            tz * v + randn() * v * 0.02,
            3.0,
          );
        }

        // ----- Stellar halo (kind 4) -----
        // Spheroidal, dispersion-supported.  Very sparse + dim — provides
        // a faint spherical glow only visible in wide shots with showHalo.
        const HALO_BUDGET = MAX_BODIES - i;
        const HALO_N = Math.min(355, HALO_BUDGET);
        for (let k = 0; k < HALO_N && i < MAX_BODIES; k++) {
          const theta = Math.acos(2 * rng() - 1);
          const phi = rng() * 2 * Math.PI;
          const r = 80 + Math.pow(rng(), 0.55) * 280;
          const x = r * Math.sin(theta) * Math.cos(phi);
          const y = r * Math.cos(theta);
          const z = r * Math.sin(theta) * Math.sin(phi);
          const v = Math.sqrt(mEncGuess(r) / r) * 0.55;
          const pos = new THREE.Vector3(x, y, z);
          const rand = new THREE.Vector3(randn(), randn(), randn());
          const tang = new THREE.Vector3()
            .crossVectors(pos, rand)
            .normalize()
            .multiplyScalar(v);
          setBody(
            i++,
            x,
            y,
            z,
            0.6 + rng() * 0.8,
            tang.x + randn() * v * 0.22,
            tang.y + randn() * v * 0.22,
            tang.z + randn() * v * 0.22,
            4.0,
          );
        }

        state.count = i;

        // ----- Force-sum pass: set stable circular velocities -----
        // Compute the actual radial gravitational force at each disk/bulge/
        // dust body's position from every other placed body (same softened
        // Newtonian formula the GPU shader uses), then derive v_circ =
        // sqrt(F_inward · r).  This replaces the crude mEncGuess estimate
        // with velocities matched to whatever mass distribution we actually
        // ended up with — the disk can't collapse because v_circ is by
        // construction the circular speed for the real potential here.
        const N = state.count;
        const P = state.positions;
        const V = state.velocities;
        for (let k = 1; k < N; k++) {
          // 1 = skip BH itself (stays at 0,0,0 with zero velocity)
          const kindK = Math.floor(V[k * 4 + 3]);
          if (kindK === 4) continue; // halo keeps its dispersion-only velocity
          const px = P[k * 4 + 0];
          const py = P[k * 4 + 1];
          const pz = P[k * 4 + 2];
          let Fx = 0;
          let Fz = 0;
          for (let j = 0; j < N; j++) {
            if (j === k) continue;
            const dx = P[j * 4 + 0] - px;
            const dy = P[j * 4 + 1] - py;
            const dz = P[j * 4 + 2] - pz;
            const mj = P[j * 4 + 3];
            if (mj <= 0) continue;
            const r2 = dx * dx + dy * dy + dz * dz + EPS2;
            const inv = mj / (r2 * Math.sqrt(r2));
            Fx += dx * inv;
            Fz += dz * inv;
          }
          const r_xz = Math.sqrt(px * px + pz * pz);
          if (r_xz < 0.5) continue;
          // F · r_hat = (Fx·px + Fz·pz) / r_xz (negative = inward).
          // v² = F_inward · r = -(Fx·px + Fz·pz).
          const v2 = Math.max(0, -(Fx * px + Fz * pz));
          const vcirc = Math.sqrt(v2);
          const tx = (-pz / r_xz) * SPIN;
          const tz = (px / r_xz) * SPIN;
          // Keep kind-appropriate dispersion from the placement loop.
          const dispFrac =
            kindK === 3
              ? 0.02 // dust — cold
              : kindK === 5
                ? 0.14 // bulge — pressure-supported
                : 0.12; // disk — Toomre Q ~ 1.5
          const disp = vcirc * dispFrac;
          V[k * 4 + 0] = tx * vcirc + randn() * disp;
          V[k * 4 + 1] = randn() * disp * 0.25;
          V[k * 4 + 2] = tz * vcirc + randn() * disp;
          // .w (kind) left as-is
        }
      }

        const posRT = gpu.getCurrentRenderTarget(posVar);

          state.positions,

          state.velocities,

        const immediate = !!opts.immediate;
        // A scene change rewrites every texel — the body we were
        // following no longer exists at that slot. Release quietly, and
        // wipe any frozen trail since its world-space anchors are about
        // to be meaningless.
        if (typeof followCamActive === "function" && followCamActive()) {
          followCamRelease();
        }
        if (typeof clearTrail === "function") clearTrail();
        if (typeof disposeSolarSystem === "function") disposeSolarSystem();

        // Seed the PRNG before body construction so shared seeds reproduce
        // identical initial bodies. Caller-supplied seed wins; otherwise a
        // fresh random 32-bit seed keeps each load unique.
        const seed =
          opts.seed != null ? opts.seed | 0 : (Math.random() * 0xffffffff) | 0;
        seedRng(seed);

        // If collision scene, also apply its scenario config (first available)
        if (key === "collision") {
          const scenarioName =
            opts.scenario || collision.scenario || "Antennae (prograde)";
          applyCollisionScenarioRaw(scenarioName);
        }

        // Build body state immediately
        sc.make();

        if (immediate) {
          uploadStateToGPU();
          uploadK(K_PRESETS[sc.K] || K_PRESETS.neutral);
          applySceneLook(sc);
          applyScenePhysics(sc);
          setPostParams(sc.post);
          clearTrails();
          pointMat.uniforms.uBHHighlight.value =
            sc.bhHighlight !== undefined ? sc.bhHighlight : 1.0;
          pointMat.uniforms.uSpeedMax.value =
            sc.speedMax !== undefined ? sc.speedMax : 30.0;
          pointMat.uniforms.uDoppler.value =
            sc.doppler !== undefined ? sc.doppler : 0.0;
          setPhotonRing(sc.photonRing || null);
          setLensStatic(sc.lens || null);
          lensPass.uniforms.uStrength.value = lensState.targetStrength;
          params.bloomStrength = sc.post.bloom;
          params.bloomRadius = sc.post.bloomRadius;
          params.exposure = sc.post.exposure;
          params.ca = sc.post.ca;
          params.vignette = sc.post.vignette;
          params.grain = sc.post.grain;
          params.trail = sc.post.trail ?? 0;
          params.doppler = sc.doppler ?? 0;
          params.lens = sc.lens?.strength ?? 0;
          camera.position.fromArray(sc.camera.pos);
          controls.target.fromArray(sc.camera.tgt);
          camera.fov = sc.camera.fov;
          params.fov = sc.camera.fov;
          camera.updateProjectionMatrix();
          currentSceneKey = key;
          syncUIToScene();
          return;
        }

        // Eased transition
        if (transitionRaf) cancelAnimationFrame(transitionRaf);

        const fromCam = {
          pos: camera.position.clone(),
          tgt: controls.target.clone(),
          fov: camera.fov,
        };
        const toCam = {
          pos: new THREE.Vector3().fromArray(sc.camera.pos),
          tgt: new THREE.Vector3().fromArray(sc.camera.tgt),
          fov: sc.camera.fov,
        };
        const startPost = snapshotPost();
        const endPost = {
          bloom: sc.post.bloom,
          bloomRadius: sc.post.bloomRadius,
          exposure: sc.post.exposure,
          ca: sc.post.ca,
          vignette: sc.post.vignette,
          grain: sc.post.grain,
        };
        const startK = kSnapshot();
        const endK = (K_PRESETS[sc.K] || K_PRESETS.neutral).slice();
        const startFlock = velVar.material.uniforms.uFlock.value;
        const endFlock = sc.flock || 0;
        const startRad = velVar.material.uniforms.uRadiation.value;
        const endRad = sc.radiation || 0;
        const startBH = pointMat.uniforms.uBHHighlight.value;
        const endBH = sc.bhHighlight !== undefined ? sc.bhHighlight : 1.0;
        const startSM = pointMat.uniforms.uSpeedMax.value;
        const endSM = sc.speedMax !== undefined ? sc.speedMax : 30.0;
        const startDop = pointMat.uniforms.uDoppler.value;
        const endDop = sc.doppler !== undefined ? sc.doppler : 0.0;
        const startRingOpacity = ringMat.uniforms.uOpacity.value;
        const endRingCfg = sc.photonRing || null;
        const endRingOpacity = endRingCfg ? (endRingCfg.opacity ?? 1.0) : 0.0;
        let ringSwapped = false;
        const startLensStrength = lensPass.uniforms.uStrength.value;
        const endLensCfg = sc.lens || null;
        const endLensStrength = endLensCfg ? (endLensCfg.strength ?? 1.0) : 0.0;
        let lensSwapped = false;

        // Transition flavour — chosen by director or opts, defaulting to dissolve.
        const flavour = opts.flavour || "dissolve";
        const FLAVOUR_DURATIONS = {
          dissolve: 3200,
          flare: 1600,
          pullback: 2400,
          pushin: 2400,
        };
        const FLAVOUR_FOV_OVERSHOOT = {
          dissolve: 0,
          flare: 0,
          pullback: 20, // widens mid-transition
          pushin: -15, // narrows mid-transition
        };
        const FLAVOUR_EXP_SPIKE = {
          dissolve: 0,
          flare: 2.0, // at t ≈ 0.7
          pullback: 0,
          pushin: 0,
        };
        const FLAVOUR_SWAP_T = {
          dissolve: 0.76, // palette lingers slightly on old
          flare: 0.72,
          pullback: 0.74,
          pushin: 0.74,
        };
        const startTime = performance.now();
        const duration = opts.durationMs || FLAVOUR_DURATIONS[flavour] || 1600;
        const fovOvershoot = FLAVOUR_FOV_OVERSHOOT[flavour] || 0;
        const expSpike = FLAVOUR_EXP_SPIKE[flavour] || 0;
        const swapT = FLAVOUR_SWAP_T[flavour] || 0.72;
        let swapped = false;
        let prevPaletteApplied = false;

        function tick() {
          const t = clamp((performance.now() - startTime) / duration, 0, 1);
          const e = easeInOutCubic(t);

          camera.position.lerpVectors(fromCam.pos, toCam.pos, e);
          controls.target.lerpVectors(fromCam.tgt, toCam.tgt, e);
          // FOV overshoot for pullback/pushin flavours — peaks mid-transition
          const fovArc = Math.sin(e * Math.PI) * fovOvershoot;
          camera.fov = lerp(fromCam.fov, toCam.fov, e) + fovArc;
          camera.updateProjectionMatrix();

          const p = lerpPost(startPost, endPost, e);
          setPostParams(p);
          // Flare flavour: exposure spike at t ≈ 0.7
          if (expSpike > 0) {
            const spike = Math.max(0, 1 - Math.abs(t - 0.7) / 0.15) * expSpike;
            renderer.toneMappingExposure = p.exposure + spike;
          }

          uploadK(lerpK(startK, endK, e));
          velVar.material.uniforms.uFlock.value = lerp(startFlock, endFlock, e);
          velVar.material.uniforms.uRadiation.value = lerp(startRad, endRad, e);
          pointMat.uniforms.uBHHighlight.value = lerp(startBH, endBH, e);
          pointMat.uniforms.uSpeedMax.value = lerp(startSM, endSM, e);
          pointMat.uniforms.uDoppler.value = lerp(startDop, endDop, e);

          // Photon ring: fade out to 0 before the body swap, then fade in the new one.
          if (t < swapT) {
            const k = t / swapT;
            ringMat.uniforms.uOpacity.value = lerp(startRingOpacity, 0.0, k);
          } else {
            const k = (t - swapT) / (1 - swapT);
            ringMat.uniforms.uOpacity.value = lerp(
              0.0,
              endRingOpacity,
              clamp(k, 0, 1),
            );
          }

          // Flash + body swap at swapT so the camera finishes its move into the new scene
          if (!swapped && t >= swapT) {
            swapped = true;
            const flash = $("#flash");
            flash.classList.add("active");
            // Dissolve uses a gentler flash; flare cranks it
            const flashMs = flavour === "dissolve" ? 120 : 200;
            setTimeout(() => flash.classList.remove("active"), flashMs);
            uploadStateToGPU();
            clearTrails();
          }
          if (!ringSwapped && t >= swapT) {
            ringSwapped = true;
            setPhotonRing(endRingCfg);
            ringMat.uniforms.uOpacity.value = 0.0;
          }

          // Gravitational lens: fade through zero at swapT, then swap static params
          if (t < swapT) {
            const k = t / swapT;
            lensPass.uniforms.uStrength.value = lerp(startLensStrength, 0.0, k);
          } else {
            const k = (t - swapT) / (1 - swapT);
            lensPass.uniforms.uStrength.value = lerp(
              0.0,
              endLensStrength,
              clamp(k, 0, 1),
            );
          }
          if (!lensSwapped && t >= swapT) {
            lensSwapped = true;
            setLensStatic(endLensCfg);
          }
          // Palette + tint swap slightly before body swap
          const palSwapT = Math.max(0.01, swapT - 0.04);
          if (!prevPaletteApplied && t >= palSwapT) {
            prevPaletteApplied = true;
            applySceneLook(sc);
          }

          if (t < 1) {
            transitionRaf = requestAnimationFrame(tick);
          } else {
            transitionRaf = null;
            applyScenePhysics(sc);
            params.bloomStrength = sc.post.bloom;
            params.bloomRadius = sc.post.bloomRadius;
            params.exposure = sc.post.exposure;
            params.ca = sc.post.ca;
            params.vignette = sc.post.vignette;
            params.grain = sc.post.grain;
            params.trail = sc.post.trail ?? 0;
            params.doppler = sc.doppler ?? 0;
            params.lens = sc.lens?.strength ?? 0;
            params.fov = sc.camera.fov;
            currentSceneKey = key;
            syncUIToScene();
          }
        }
        tick();
      }

      function applyCollisionScenarioRaw(name) {
        const s = COLLISION_SCENARIOS[name];
        if (!s) return;
        Object.assign(collision, s);
        collision.scenario = name;
        collision.galaxyMassB = collision.galaxyMassA * collision.massRatio;
      }

      // ===============================================================
      // 17. UI FRAMEWORK  (tiny DOM factory helpers)
      // ===============================================================
      function stepDecimals(step) {
        const s = String(step);
        const dot = s.indexOf(".");
        return dot < 0 ? 0 : s.length - dot - 1;
      }
      function fmtNum(v, step) {
        const d = stepDecimals(step);
        return (+v).toFixed(d);
      }

      function addHelpBadge(labelEl, hint) {
        if (!hint) return;
        const badge = el("span", "help-badge");
        badge.textContent = "?";
        badge.setAttribute("data-hint", hint);
        // Don't let a click on the badge toggle the parent input (e.g. in
        // toggle-rows where the whole row is a <label>).
        badge.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
        });
        labelEl.appendChild(badge);
      }

      // Help tooltip is a portal in document.body so it escapes the
      // panel's overflow clipping (panel has overflow: hidden/auto and
      // a transform, which would otherwise contain and clip a descendant
      // tooltip even with position: fixed).
      const helpTip = el("div");
      helpTip.id = "help-tip";
      document.body.appendChild(helpTip);
      function positionHelpTip(badgeEl) {
        const rect = badgeEl.getBoundingClientRect();
        const pad = 8;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        // Measure the tip after setting its text so we know its size.
        const tipW = helpTip.offsetWidth;
        const tipH = helpTip.offsetHeight;
        // Horizontal: centre on badge, clamp to viewport with 8px margin.
        let x = rect.left + rect.width / 2 - tipW / 2;
        x = Math.max(pad, Math.min(x, vw - tipW - pad));
        // Vertical: above the badge by default; below if not enough room.
        let y = rect.top - tipH - 10;
        if (y < pad) y = rect.bottom + 10;
        // Clamp vertically too (very short screens).
        y = Math.max(pad, Math.min(y, vh - tipH - pad));
        helpTip.style.left = x + "px";
        helpTip.style.top = y + "px";
      }
      document.addEventListener(
        "mouseover",
        (e) => {
          const badge = e.target.closest?.(".help-badge");
          if (!badge) return;
          helpTip.textContent = badge.getAttribute("data-hint") || "";
          // Force layout so offsetWidth/offsetHeight are correct before positioning.
          helpTip.classList.add("show");
          positionHelpTip(badge);
        },
        true,
      );
      document.addEventListener(
        "mouseout",
        (e) => {
          const badge = e.target.closest?.(".help-badge");
          if (!badge) return;
          helpTip.classList.remove("show");
        },
        true,
      );

      function Slider({
        label,
        min,
        max,
        step,
        get,
        set,
        onChange,
        fmt,
        hint,
      }) {
        const row = el("div", "slider-row");
        row.innerHTML = `
          <div class="head">
            <label></label>
            <span class="value"></span>
          </div>
          <input type="range" />
        `;
        const labelEl = row.querySelector("label");
        labelEl.textContent = label;
        addHelpBadge(labelEl, hint);
        const input = row.querySelector("input");
        const valueSpan = row.querySelector(".value");
        input.min = min;
        input.max = max;
        input.step = step;

        function render(v) {
          input.value = v;
          const pct = ((v - min) / (max - min)) * 100;
          input.style.setProperty("--pct", pct + "%");
          valueSpan.textContent = fmt ? fmt(v) : fmtNum(v, step);
        }

        input.addEventListener("input", () => {
          const v = parseFloat(input.value);
          set(v);
          render(v);
          if (onChange) onChange(v);
        });

        render(get());
        return { el: row, refresh: () => render(get()) };
      }

      function Toggle({ label, get, set, onChange, hint }) {
        const row = el("label", "toggle-row");
        row.innerHTML = `
          <label></label>
          <input type="checkbox" />
          <span class="toggle-switch"></span>
        `;
        const labelEl = row.querySelector("label");
        labelEl.textContent = label;
        addHelpBadge(labelEl, hint);
        const input = row.querySelector("input");
        input.checked = !!get();
        input.addEventListener("change", () => {
          set(input.checked);
          if (onChange) onChange(input.checked);
        });
        return {
          el: row,
          refresh: () => {
            input.checked = !!get();
          },
        };
      }

      function Pills({ options, get, set, onChange }) {
        const row = el("div", "pill-row");
        const buttons = [];
        const makePill = (opt) => {
          const b = el("button", "pill");
          b.textContent = opt.label;
          b.dataset.value = opt.value;
          b.addEventListener("click", () => {
            set(opt.value);
            render();
            if (onChange) onChange(opt.value);
          });
          row.appendChild(b);
          buttons.push(b);
        };
        options.forEach(makePill);
        function render() {
          const cur = String(get());
          for (const b of buttons) {
            b.classList.toggle("active", b.dataset.value === cur);
          }
        }
        render();
        return { el: row, refresh: render };
      }

      function Select({ label, options, get, set, onChange }) {
        const row = el("div", "select-row");
        const lb = el("label");
        lb.textContent = label;
        row.appendChild(lb);
        const sel = el("select");
        for (const opt of options) {
          const o = el("option");
          o.value = opt.value;
          o.textContent = opt.label;
          sel.appendChild(o);
        }
        sel.value = get();
        sel.addEventListener("change", () => {
          set(sel.value);
          if (onChange) onChange(sel.value);
        });
        row.appendChild(sel);
        return {
          el: row,
          refresh: () => {
            sel.value = get();
          },
        };
      }

      function ButtonRow(buttons) {
        const row = el("div", "button-row");
        for (const b of buttons) {
          const btn = el("button", "btn" + (b.primary ? " primary" : ""));
          btn.textContent = b.label;
          btn.addEventListener("click", b.onClick);
          row.appendChild(btn);
        }
        return { el: row };
      }

      function SectionTitle(text) {
        const t = el("div", "panel-section-title");
        t.textContent = text;
        return t;
      }
      function Section() {
        return el("div", "panel-section");
      }
      function ReadRow(label) {
        const r = el("div", "read-row");
        const l = el("label");
        l.textContent = label;
        const v = el("span", "val");
        v.textContent = "—";
        r.appendChild(l);
        r.appendChild(v);
        return { el: r, set: (txt) => (v.textContent = txt) };
      }

      // ===============================================================
      // 18. LEFT RAIL
      // ===============================================================
      const ICONS = {
        scenes: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="8" r="3"/><circle cx="16" cy="10" r="4"/><circle cx="10" cy="17" r="2"/></svg>`,
        palette: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="8" cy="9" r="1.2" fill="currentColor"/><circle cx="15" cy="8" r="1.2" fill="currentColor"/><circle cx="16" cy="14" r="1.2" fill="currentColor"/><circle cx="10" cy="16" r="1.2" fill="currentColor"/></svg>`,
        camera: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="12" rx="2"/><circle cx="12" cy="13" r="3.5"/><path d="M8 7 l1.5 -2 h5 L16 7"/></svg>`,
        capture: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3 v11 m0 0 l-4 -4 m4 4 l4 -4"/><path d="M4 17 v3 h16 v-3"/></svg>`,
        settings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="7"  x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9"  cy="7"  r="2" fill="#05060a"/><circle cx="14" cy="12" r="2" fill="#05060a"/><circle cx="8"  cy="17" r="2" fill="#05060a"/></svg>`,
        music: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="4"  y1="12" x2="4"  y2="12"/><line x1="8"  y1="8"  x2="8"  y2="16"/><line x1="12" y1="5"  x2="12" y2="19"/><line x1="16" y1="9"  x2="16" y2="15"/><line x1="20" y1="11" x2="20" y2="13"/></svg>`,
        movie: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="M3 9 h3 M3 13 h3 M3 17 h3 M18 9 h3 M18 13 h3 M18 17 h3 M9 9 l4 3 l-4 3 z" stroke-linejoin="round"/></svg>`,
        keyboard: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M7 10 h.01 M11 10 h.01 M15 10 h.01 M7 14 h10"/></svg>`,
      };

      const railEl = $("#rail");
      const panelEl = $("#panel");
      const RAIL_SECTIONS = [
        { id: "scenes", key: "B", label: "Scenes", icon: ICONS.scenes },
        { id: "palette", key: "P", label: "Palette", icon: ICONS.palette },
        { id: "camera", key: "V", label: "Camera", icon: ICONS.camera },
        { id: "music", key: "J", label: "Music", icon: ICONS.music },
        { id: "movie", key: "⇧C", label: "Movie", icon: ICONS.movie },
        { id: "capture", key: "K", label: "Capture", icon: ICONS.capture },
        { id: "settings", key: "~", label: "Settings", icon: ICONS.settings },
      ];
      const RAIL_BOTTOM = [
        { id: "_hotkeys", key: "?", label: "Hotkeys", icon: ICONS.keyboard },
      ];

      let activePanel = null; // id or null

      function buildRail() {
        railEl.innerHTML = "";
        RAIL_SECTIONS.forEach((s) => {
          const b = el("button", "rail-btn");
          b.dataset.id = s.id;
          b.innerHTML =
            s.icon +
            `<span class="rail-tooltip">${s.label}<kbd>${s.key}</kbd></span>`;
          b.addEventListener("click", () => togglePanel(s.id));
          railEl.appendChild(b);
        });
        const spacer = el("div", "rail-spacer");
        railEl.appendChild(spacer);
        RAIL_BOTTOM.forEach((s) => {
          const b = el("button", "rail-btn");
          b.dataset.id = s.id;
          b.innerHTML =
            s.icon +
            `<span class="rail-tooltip">${s.label}<kbd>${s.key}</kbd></span>`;
          b.addEventListener("click", () => toggleHotkeys());
          railEl.appendChild(b);
        });
      }
      buildRail();

      function togglePanel(id) {
        if (activePanel === id) {
          closePanel();
        } else {
          openPanel(id);
        }
      }
      function openPanel(id) {
        activePanel = id;
        buildPanel(id);
        panelEl.classList.add("open");
        for (const b of railEl.querySelectorAll(".rail-btn")) {
          b.classList.toggle("active", b.dataset.id === id);
        }
      }
      function closePanel() {
        activePanel = null;
        panelEl.classList.remove("open");
        for (const b of railEl.querySelectorAll(".rail-btn"))
          b.classList.remove("active");
      }

      // ===============================================================
      // 19. PANEL BUILDERS
      // ===============================================================
      const panelRefreshers = []; // callbacks to re-read UI values from params

      function syncUIToScene() {
        for (const fn of panelRefreshers) fn();
        updateHudFromScene();
      }

      function buildPanel(id) {
        panelEl.innerHTML = "";
        panelRefreshers.length = 0;
        switch (id) {
          case "scenes":
            return buildScenesPanel();
          case "palette":
            return buildPalettePanel();
          case "camera":
            return buildCameraPanel();
          case "music":
            return buildMusicPanel();
          case "movie":
            return buildMoviePanel();
          case "capture":
            return buildCapturePanel();
          case "settings":
            return buildSettingsPanel();
        }
      }

      function headerTitle(text, hint) {
        const t = el("div", "panel-title");
        t.textContent = text;
        if (hint) {
          const h = el("span", "hint");
          h.textContent = hint;
          t.appendChild(h);
        }
        return t;
      }

      function buildScenesPanel() {
        panelEl.appendChild(headerTitle("Scenes", "C"));

        const sc = SCENES[currentSceneKey];
        const browseSec = Section();
        browseSec.appendChild(
          ButtonRow([
            {
              label: "Browse all scenes",
              primary: true,
              onClick: () => openSceneBrowser(),
            },
          ]).el,
        );
        panelEl.appendChild(browseSec);

        // Current scene
        const curSec = Section();
        curSec.appendChild(SectionTitle("Current"));
        const nameRow = el("div");
        nameRow.style.cssText =
          "color: var(--text-0); font-size: 13px; font-weight: 500; letter-spacing: 0.08em; margin-bottom: 2px;";
        nameRow.textContent = sc.name;
        const capRow = el("div");
        capRow.style.cssText =
          "color: var(--text-2); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 10px;";
        capRow.textContent = sc.caption;
        curSec.appendChild(nameRow);
        curSec.appendChild(capRow);

        curSec.appendChild(
          ButtonRow([
            {
              label: "Reset",
              onClick: () => applyScene(currentSceneKey, { immediate: true }),
            },
            {
              label: "Roll dice",
              onClick: () => rollDice(),
            },
          ]).el,
        );
        panelEl.appendChild(curSec);

        // Share — copy a URL that reproduces the current shot elsewhere
        const shareSec = Section();
        shareSec.appendChild(SectionTitle("Share"));
        const seedRow = ReadRow("Seed");
        seedRow.set(seedToHex(currentSeed()));
        shareSec.appendChild(seedRow.el);
        shareSec.appendChild(
          ButtonRow([
            {
              label: "Copy link",
              primary: true,
              onClick: () => copyShareLinkToClipboard(),
            },
            {
              label: "Paste link",
              onClick: () => pasteAndApplyShareLink(),
            },
          ]).el,
        );
        shareSec.appendChild(
          ButtonRow([
            {
              label: "Copy seed",
              onClick: async () => {
                try {

      function buildCameraPanel() {

        const idxInput = el("input");
        idxInput.type = "number";

        followRow.appendChild(prevBtn);
        followRow.appendChild(idxInput);
        followRow.appendChild(nextBtn);

        const submitIdx = () => {
          const v = parseInt(idxInput.value, 10);
          if (Number.isFinite(v)) followCamAttachByIndex(v);
        };
        idxInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") submitIdx();

          e.stopPropagation();

          paceLabel.textContent = "Pace";
          motionSec.appendChild(paceLabel);
          for (const p of PACE_ORDER) {
            const pill = el(
              "button",
              "pill" + (director.pace === p ? " active" : ""),
            );
            pill.textContent = p;
            pill.addEventListener("click", () => {
              director.pace = p;
              if (activePanel === "camera") buildPanel("camera");

            paceRow.appendChild(pill);

          // State readout

          const v = el("span", "val");

            return `${m}:${r.toString().padStart(2, "0")}`;
          };
          v.textContent =
            director.state === "DWELL"
              ? `DWELL ${fmtMin(director.stateTimer)} / ${fmtMin(director.dwellDuration)}`

                ? "TRANSITION"

      function fmtTime(sec) {
        if (!isFinite(sec) || sec < 0) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s.toString().padStart(2, "0")}`;
      }

      function buildMusicPanel() {
        panelEl.appendChild(headerTitle("Music", "J"));

        // --- Now Playing hero ---
        const now = el("div", "music-now");
        const pulseDot = el("div", "music-pulse");
        const title = el("div", "music-title");
        const subtitle = el("div", "music-subtitle");
        subtitle.textContent = "ssi · ambient";
        const timing = el("div", "music-timing");
        const curT = el("span");
        curT.textContent = "0:00";
        const durT = el("span");
        durT.textContent = "0:00";
        timing.appendChild(curT);
        timing.appendChild(durT);
        const progress = el("div", "music-progress");
        const fill = el("div", "fill");
        progress.appendChild(fill);
        progress.addEventListener("click", (ev) => {
          const rect = progress.getBoundingClientRect();
          music.seek((ev.clientX - rect.left) / rect.width);
        });
        now.appendChild(pulseDot);
        now.appendChild(title);
        now.appendChild(subtitle);
        now.appendChild(timing);
        now.appendChild(progress);
        panelEl.appendChild(now);

        // --- Transport ---
        const trans = el("div", "music-transport");
        const prevBtn = el("button", "btn-trans");
        prevBtn.innerHTML = "&#9664;&#9664;";
        prevBtn.title = "Previous";
        prevBtn.addEventListener("click", () => music.prev());
        const pBtn = el("button", "btn-trans primary");
        const syncPBtn = () => {
          pBtn.innerHTML = music.playing ? "&#10074;&#10074;" : "&#9654;";
        };
        syncPBtn();
        pBtn.addEventListener("click", () => music.playPause());
        const nextBtn = el("button", "btn-trans");
        nextBtn.innerHTML = "&#9654;&#9654;";
        nextBtn.title = "Next";
        nextBtn.addEventListener("click", () => music.next());
        trans.appendChild(prevBtn);
        trans.appendChild(pBtn);
        trans.appendChild(nextBtn);
        panelEl.appendChild(trans);

        // --- Volume + shuffle ---
        const ctrlSec = Section();
        const volS = Slider({
          label: "Volume",
          min: 0,
          max: 1,
          step: 0.01,
          hint: "Soundtrack loudness.",
          get: () => music.volume,
          set: (v) => music.setVolume(v),
          fmt: (v) => Math.round(v * 100) + "%",
        });
        ctrlSec.appendChild(volS.el);
        const shufT = Toggle({
          label: "Shuffle",
          hint: "Play tracks in a random order instead of the listed one.",
          get: () => music.shuffle,
          set: (v) => music.setShuffle(v),
        });
        ctrlSec.appendChild(shufT.el);
        panelEl.appendChild(ctrlSec);

        // --- Track list ---
        const listSec = Section();
        listSec.appendChild(SectionTitle("Tracks"));
        const list = el("div", "music-list");
        TRACKS.forEach((t, i) => {
          const item = el("div", "music-item");
          const num = el("span", "num");
          num.textContent = String(i + 1).padStart(2, "0");
          const name = el("span", "name");
          name.textContent = t.title;
          item.appendChild(num);
          item.appendChild(name);
          item.addEventListener("click", () => music.load(i, true));
          list.appendChild(item);
        });
        listSec.appendChild(list);
        panelEl.appendChild(listSec);

        // --- Live update loop tied to panel lifecycle ---
        const refresh = () => {
          title.textContent = TRACKS[music.index].title;
          curT.textContent = fmtTime(music.time);
          durT.textContent = fmtTime(music.duration);
          const frac = music.duration > 0 ? music.time / music.duration : 0;
          fill.style.width = (frac * 100).toFixed(2) + "%";
          now.classList.toggle("playing", music.playing);
          syncPBtn();
          list.querySelectorAll(".music-item").forEach((node, i) => {
            node.classList.toggle("active", i === music.index);
          });
        };
        refresh();
        // Subscribe to audio events for snappy UI; tear down when panel rebuilds.
        const onTime = () => {

        }
        for (const key of filmKeys) {

          if (

            (!movie.lastSelected && filmKeys[0] === key)
          ) {

          }

          }
          const name = el("span", "fname");
          name.textContent = f.name.toUpperCase();
          const dur = el("span", "fdur");
          dur.textContent = fmtMmSs(f.duration);
          item.appendChild(name);
          item.appendChild(dur);
          item.addEventListener("click", () => {
            movie.lastSelected = key;
            // Refresh list highlight
            list.querySelectorAll(".film-item").forEach((n, idx) => {
              n.classList.toggle("selected", filmKeys[idx] === key);
            });
          });
          list.appendChild(item);
        }
        panelEl.appendChild(list);

        // Controls
        const sec = Section();
        if (movie.active) {
          sec.appendChild(
            ButtonRow([
              {
                label: "Stop",
                primary: true,
                onClick: () => stopMovie(false),
              },
            ]).el,
          );

          // Elapsed readout
          const rr = ReadRow("Elapsed");
          rr.set(`${fmtMmSs(movie.elapsed)} / ${fmtMmSs(movie.film.duration)}`);
          sec.appendChild(rr.el);

          // Scrub bar — reuses music progress styling for visual consistency
          const scrub = el("div", "music-progress scrub-bar");
          scrub.style.cursor = "pointer";
          const scrubFill = el("div", "fill");
          scrub.appendChild(scrubFill);
          sec.appendChild(scrub);

          const fracAt = (ev) => {
            const rect = scrub.getBoundingClientRect();
            return clamp((ev.clientX - rect.left) / rect.width, 0, 1);
          };
          const onMove = (ev) => {
            if (!movie.scrubbing) return;
            const f = fracAt(ev);
            const t = f * movie.film.duration;
            scrubFill.style.width = (f * 100).toFixed(2) + "%";
            rr.set(`${fmtMmSs(t)} / ${fmtMmSs(movie.film.duration)}`);
          };
          const onUp = (ev) => {
            if (!movie.scrubbing) return;
            const f = fracAt(ev);
            seekMovie(f * movie.film.duration);
            movie.scrubbing = false;
            // Restore music if it was playing before the drag
            if (movie.musicWasPlaying) {
              const p = music.audio.play();
              if (p && p.catch) p.catch(() => {});
            }
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
          };
          scrub.addEventListener("pointerdown", (ev) => {
            movie.scrubbing = true;
            movie.musicWasPlaying = !music.audio.paused;
            if (movie.musicWasPlaying) music.audio.pause();
            onMove(ev);
            window.addEventListener("pointermove", onMove);
            window.addEventListener("pointerup", onUp);
          });

          // Speed pills — 1× / 2× / 4× / 8×
          const spRow = Pills({
            options: [
              { value: "1", label: "1×" },
              { value: "2", label: "2×" },

          spWrap.appendChild(spLabel);
          spWrap.appendChild(spRow.el);

          panelRefreshers.push(() => {
            if (!movie.scrubbing) {

                movie.film.duration > 0

                  : 0;
              scrubFill.style.width =

              rr.set(
                `${fmtMmSs(movie.elapsed)} / ${fmtMmSs(movie.film.duration)}`,
              );
            }
          });
        } else {
          sec.appendChild(
            ButtonRow([

      // Thumbnail capture: renders off-screen at 256x256 on request
      function thumbStorageKey(key) {
        return `universe-thumb-v1-${key}`;
      }
      function maybeCaptureThumbnail(key) {
        // Capture ~800ms after scene settles, then store.
        setTimeout(() => {
          try {
            const size = 256;
            const rt = new THREE.WebGLRenderTarget(size, size, { samples: 0 });
            const saved = {
              w: renderer.getSize(new THREE.Vector2()).x,
              h: renderer.getSize(new THREE.Vector2()).y,
              expo: renderer.toneMappingExposure,
            };
            renderer.setSize(size, size, false);
            composer.setSize(size, size);
            composer.render();
            const gl = renderer.getContext();
            const buf = new Uint8Array(size * size * 4);
            gl.readPixels(0, 0, size, size, gl.RGBA, gl.UNSIGNED_BYTE, buf);
            // Flip vertically + to canvas
            const c = document.createElement("canvas");
            c.width = size;
            c.height = size;
            const ctx = c.getContext("2d");
            const img = ctx.createImageData(size, size);
            for (let y = 0; y < size; y++) {
              for (let x = 0; x < size; x++) {
                const si = ((size - 1 - y) * size + x) * 4;
                const di = (y * size + x) * 4;
                img.data[di + 0] = buf[si + 0];
                img.data[di + 1] = buf[si + 1];
                img.data[di + 2] = buf[si + 2];
                img.data[di + 3] = 255;
              }
            }
            ctx.putImageData(img, 0, 0);
            const data = c.toDataURL("image/jpeg", 0.7);
            try {
              localStorage.setItem(thumbStorageKey(key), data);
            } catch (e) {}
            renderer.setSize(saved.w, saved.h, false);
            composer.setSize(saved.w, saved.h);
            rt.dispose();
          } catch (e) {
            /* thumbnail capture is best-effort */
          }
        }, 800);
      }
